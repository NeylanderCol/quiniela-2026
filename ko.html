.btn-sm{padding:5px 12px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px;line-height:1.5;}
.al-ok{background:rgba(74,219,138,.15);border:1px solid var(--green);color:var(--green);}

.part-meta{font-size:11px;color:var(--gm);margin-bottom:8px;}
.pin-display{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:3px;}

.score-box{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);padding:6px 14px;border-radius:8px;min-width:84px;justify-content:center;flex-shrink:0;}
.score-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;}
.score-sep{font-size:20px;color:var(--gm);font-weight:300;}
.score-vs{font-size:13px;color:var(--gm);font-style:italic;}

/* POSICIONES */

// ── HELPERS ──────────────────────────────────────────────
function nowIQ() {
  const n = new Date();
  return new Date(n.getTime() + n.getTimezoneOffset()*60000 + 10800000);
}
function todayIQ() {
  const iq = nowIQ();
  return `${iq.getFullYear()}-${String(iq.getMonth()+1).padStart(2,'0')}-${String(iq.getDate()).padStart(2,'0')}`;
}
function tomorrowIQ() {
  const iq = nowIQ();
  iq.setDate(iq.getDate()+1);
  return `${iq.getFullYear()}-${String(iq.getMonth()+1).padStart(2,'0')}-${String(iq.getDate()).padStart(2,'0')}`;
}
function formatCountdown(ms) {
  if (ms <= 0) return '🔒 Cerrado';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}
function cierreEtapa(fecha, hora) {
  return new Date(`${fecha}T${hora}:00+03:00`);
}
function calcPtsKO(pa, pb, ra, rb) {
  if (pa===ra && pb===rb) return 5;
  const pGanA=pa>pb, pGanB=pb>pa, pEmp=pa===pb;
  const rGanA=ra>rb, rGanB=rb>ra, rEmp=ra===rb;
  if (!((pGanA&&rGanA)||(pGanB&&rGanB)||(pEmp&&rEmp))) return 0;
  return (pa-pb)===(ra-rb) ? 4 : 3;
}
function clasificadoImplicito(pa, pb, equipoA, equipoB) {
  if (pa>pb) return equipoA;
  if (pb>pa) return equipoB;
  return null;
}
function etapaLabel(nombre) {
  const m={'16avos':'16avos','8vos':'8vos','4tos':'4tos','Semis':'Semis','3er Puesto':'3er P.','Final':'Final'};
  return m[nombre]||nombre;
}
function etapaBadgeClass(nombre) {
  const m={'16avos':'eb-16','8vos':'eb-8','4tos':'eb-4','Semis':'eb-S','3er Puesto':'eb-3','Final':'eb-F'};
  return m[nombre]||'eb-16';
}
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function fLarga(f){const[y,m,d]=f.split('-').map(Number);const dt=new Date(y,m-1,d);return`${DIAS[dt.getDay()]}, ${d} de ${MESES[m-1]}`;}

async function sb(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method: opts.method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation'},
    body: opts.body,
  });
  if (!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
  const t = await r.text();
  return t ? JSON.parse(t) : [];
}

function Toggle({on, onToggle, label}) {
  return (
    <div className="toggle-row">
      <button className={`toggle ${on?'on':'off'}`} onClick={onToggle}/>
      <span className="toggle-lbl">{label}</span>
    </div>
  );
}

function useCountdown(targetDate) {
  const [ms, setMs] = useState(() => targetDate ? targetDate - Date.now() : 0);
  useEffect(() => {
    if (!targetDate) return;
    const id = setInterval(() => setMs(targetDate - Date.now()), 1000);
    return () => clearInterval(id);
  }, [targetDate]);
  return ms;
}

// ── PANEL PRONÓSTICOS (reutilizable en Hoy, Calendario y Bracket) ──
function PanelPronosticos({partido, pronosticos, participantes, userKO, pronsCerradosEtapa, forceOpen=false}) {
  const [open, setOpen] = React.useState(false);
  const isOpen = forceOpen || open;
  const done = partido.finalizado && partido.goles_a !== null;

  // Visibilidad: si el partido finalizó → siempre público
  // Si pronósticos de la etapa están cerrados (primer partido ya arrancó) → público
  // Si no → solo el propio si está logueado
  const esPublico = done || pronsCerradosEtapa;

  // Construir lista de pronósticos visibles
  const items = participantes
    .filter(pt => pt.aprobado)
    .map(pt => {
      const pr = pronosticos.find(x => x.participante_ko_id===pt.id && x.partido_ko_id===partido.id);
      if (!pr) return null;
      const esMio = userKO && pt.id === userKO.id;
      if (!esPublico && !esMio) return null; // ocultar ajeno antes del cierre
      const ptsMarcador = done ? (pr.puntos_marcador||0) : null;
      const ptsClas = done ? (pr.puntos_clasificado||0) : null;
      const total = done ? (pr.puntos_total||0) : null;
      return { nombre: pt.nombre, pa: pr.pred_a, pb: pr.pred_b,
               clasPred: pr.clasificado_pred, ptsMarcador, ptsClas, total, esMio };
    }).filter(Boolean);

  const hayPropios = participantes.some(pt=>pt.aprobado&&userKO&&pt.id===userKO.id&&
    pronosticos.some(x=>x.participante_ko_id===pt.id&&x.partido_ko_id===partido.id));

  if (!esPublico && !hayPropios) {
    // No logueado y no cerrado → no mostrar toggle
    return (
      <div style={{marginTop:8,fontSize:10,color:'var(--gm)',textAlign:'center',fontStyle:'italic'}}>
        🔒 Pronósticos se revelan al inicio de la etapa
      </div>
    );
  }

  const label = esPublico
    ? `${items.length} pronóstico${items.length!==1?'s':''}`
    : 'Mi pronóstico';

  return (
    <div style={{marginTop:8}}>
      {!forceOpen && (
        <button
          style={{background:'none',border:'1px solid rgba(255,255,255,.15)',borderRadius:5,
            color:'var(--gm)',fontSize:11,padding:'4px 10px',cursor:'pointer',
            fontFamily:"Barlow Condensed",letterSpacing:.5,width:'100%',
            transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.color='var(--gold)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,.15)';e.currentTarget.style.color='var(--gm)';}}
          onClick={()=>setOpen(!open)}>
          {isOpen ? '▲ Ocultar' : `▼ Ver ${label}`}
        </button>
      )}
      {isOpen && (
        <div style={{marginTop:6,background:'rgba(0,0,0,.25)',borderRadius:8,padding:'8px 10px'}}>
          {!esPublico && (
            <div style={{fontSize:10,color:'var(--gold)',marginBottom:6,textAlign:'center',fontFamily:'Barlow Condensed',letterSpacing:1}}>
              🔒 Solo tu pronóstico — se revelan todos al iniciar la etapa
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:5}}>
            {items.map((it,i)=>{
              const pts = it.total;
              const cls = pts===7?'pi-7':pts===5?'pi-5':pts===4?'pi-4':pts===3?'pi-3':done&&pts===0?'pi-0':'';
              return (
                <div key={i} style={{
                  background: it.esMio ? 'rgba(245,166,35,.1)' : 'rgba(255,255,255,.04)',
                  border: it.esMio ? '1px solid rgba(245,166,35,.4)' : '1px solid rgba(255,255,255,.07)',
                  borderRadius:6, padding:'5px 8px',
                  display:'flex', alignItems:'center', justifyContent:'space-between', gap:6
                }}>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700,
                    color: it.esMio ? 'var(--gold)' : 'var(--white)',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:70}}>
                    {it.nombre.split(' ')[0]}{it.esMio?' ★':''}
                  </span>
                  <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:800,
                      color: it.esMio ? 'var(--gold)' : 'var(--white)'}}>
                      {it.pa}–{it.pb}
                    </span>
                    {done && (
                      <span style={{
                        fontFamily:'Barlow Condensed',fontSize:11,fontWeight:800,
                        padding:'1px 5px',borderRadius:4,
                        background: pts>=5?'rgba(74,219,138,.2)':pts>=3?'rgba(245,166,35,.2)':'rgba(204,0,0,.15)',
                        color: pts>=5?'var(--green)':pts>=3?'var(--gold)':'#FF6666'
                      }}>
                        {pts>0?`+${pts}`:'✗'}
                      </span>
                    )}
                    {it.clasPred && !done && (
                      <span style={{fontSize:9,color:'var(--gm)'}}>→{it.clasPred.split(' ')[0]}</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function TabHoy({partidos, etapas, participantes, pronosticos, userKO, pronsCerradosEtapa}) {
  const today = todayIQ(), tomorrow = tomorrowIQ();
  const [tick, setTick] = useState(Date.now());
  useEffect(() => { const id = setInterval(()=>setTick(Date.now()), 1000); return ()=>clearInterval(id); }, []);

  const etapaMap = useMemo(() => {
    const m={}; etapas.forEach(e=>m[e.id]=e); return m;
  }, [etapas]);

  const relevantes = partidos.filter(p => p.fecha===today || p.fecha===tomorrow)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));

  if (relevantes.length === 0) {
    const prox = partidos.filter(p=>p.fecha>today&&!p.finalizado).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0];
    return (
      <div>
        <div className="empty">
          <div style={{fontSize:40,marginBottom:12}}>🏆</div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:700,marginBottom:8}}>Sin partidos hoy ni mañana</div>
          {prox && <div style={{fontSize:12,color:'var(--gm)'}}>
            Próximo: <strong style={{color:'var(--gold)'}}>{prox._eqA||prox.slot_a||'?'} vs {prox._eqB||prox.slot_b||'?'}</strong><br/>
            {fLarga(prox.fecha)} — {prox.hora} (Irak)
          </div>}
        </div>
      </div>
    );
  }

  return (
    <div>
      {relevantes.map(p => {
        const etapa = etapaMap[p.etapa_id];
        const done = p.finalizado && p.goles_a !== null;
        const kickoffUTC = new Date(`${p.fecha}T${p.hora}:00+03:00`);
        const msLeft = kickoffUTC - tick;
        const eqA = (done?p.equipo_a:p._eqA) || p.slot_a || '?';
        const eqB = (done?p.equipo_b:p._eqB) || p.slot_b || '?';
        const provA = p._provA, provB = p._provB;
        return (
          <div key={p.id} className="match-ko-card">
            <div className="match-meta">
              {etapa && <span className={`etapa-badge ${etapaBadgeClass(etapa.nombre)}`}>{etapa.nombre.toUpperCase()}</span>}
              <span style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--gm)',letterSpacing:1}}>{p.numero}</span>
              <span className="match-time">⏰ {p.hora} (Irak)</span>
              <span style={{fontSize:9,color:p.fecha===today?'var(--gold)':'var(--gm)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:1}}>
                {p.fecha===today?'HOY':'MAÑANA'}
              </span>
              <span className={done?'st-done':'st-pend'}>{done?'✓ FINALIZADO':'PENDIENTE'}</span>
            </div>
            <div className="match-teams">
              <div className="team-blk">
                <Flag name={eqA} size={26}/>
                <span className="team-name" style={{opacity:provA?.65:1}}>{eqA}</span>
                {provA&&<span style={{fontSize:9,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>P</span>}
              </div>
              <div className="score-box">
                {done
                  ? <><span className="score-n">{p.goles_a}</span><span className="score-sep">–</span><span className="score-n">{p.goles_b}</span></>
                  : <span className="score-vs">vs</span>}
              </div>
              <div className="team-blk">
                <Flag name={eqB} size={26}/>
                <span className="team-name" style={{opacity:provB?.65:1}}>{eqB}</span>
                {provB&&<span style={{fontSize:9,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>P</span>}
              </div>
            </div>
            {!done&&(provA||provB)&&(
              <div style={{textAlign:'center',marginTop:4,fontSize:9,color:'var(--gold)',
                fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.8,
                background:'rgba(245,166,35,.07)',borderRadius:4,padding:'2px 8px',
                border:'1px solid rgba(245,166,35,.15)'}}>
                ⏳ puede cambiar
              </div>
            )}
            {done && p.clasificado && (
              <div style={{textAlign:'center',marginTop:8,fontSize:11}}>
                <span style={{color:'var(--green)',fontWeight:700}}>✓ Clasifica: {p.clasificado}</span>
                {p.hubo_penales && <span style={{marginLeft:8,color:'var(--gm)'}}>⚡ Penales</span>}
                {p.hubo_prorroga && !p.hubo_penales && <span style={{marginLeft:8,color:'var(--gm)'}}>⏱ Prórroga</span>}
              </div>
            )}
            {!done && msLeft > 0 && (
              <div className="countdown-box">
                <div className="countdown-num">{formatCountdown(msLeft)}</div>
                <div className="countdown-lbl">para el inicio del partido</div>
              </div>
            )}
            {!done && msLeft <= 0 && (
              <div className="countdown-box" style={{background:'rgba(204,0,0,.08)',borderColor:'rgba(204,0,0,.3)'}}>
                <div style={{fontSize:12,color:'#FF6666',fontWeight:700}}>⚽ En juego / Esperando resultado</div>
              </div>
            )}
            <PanelPronosticos
              partido={p}
              pronosticos={pronosticos}
              participantes={participantes}
              userKO={userKO}
              pronsCerradosEtapa={pronsCerradosEtapa}
            />
          </div>
        );
      })}
    </div>
  );
}

// ── TAB BRACKET VISUAL ────────────────────────────────────
// REEMPLAZA la función TabBracket completa en ko.html
// Busca: "function TabBracket({partidos, etapas, partidosGrupos=[], pronosticos=[], participantes=[], userKO=null, pronsCerradosEtapa=false}) {"
// Reemplaza todo hasta el cierre "}" que corresponde a esa función

function TabBracket({partidos, etapas, partidosGrupos=[], pronosticos=[], participantes=[], userKO=null, pronsCerradosEtapa=false}) {
  const [tick, setTick] = React.useState(Date.now());
  React.useEffect(()=>{ const id=setInterval(()=>setTick(Date.now()),1000); return()=>clearInterval(id); },[]);

  const etapaMap = React.useMemo(()=>{ const m={}; etapas.forEach(e=>m[e.id]=e); return m; },[etapas]);

  // Indexar partidos por número
  const pMap = React.useMemo(()=>{ const m={}; partidos.forEach(p=>m[p.numero]=p); return m; },[partidos]);

  // Standings en vivo desde partidos de fase grupos
  const standings = React.useMemo(()=>{
    const g={};
    partidosGrupos.forEach(p=>{
      if(!g[p.grupo])g[p.grupo]={};
      [p.equipo_a,p.equipo_b].forEach(eq=>{
        if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0};
      });
      if(!p.finalizado||p.goles_a===null)return;
      const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
      a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
      if(p.goles_a>p.goles_b){a.pts+=3;}else if(p.goles_b>p.goles_a){b.pts+=3;}else{a.pts++;b.pts++;}
    });
    const result={};
    Object.keys(g).sort().forEach(grupo=>{
      result[grupo]=[...Object.entries(g[grupo])
        .map(([n,s])=>({n,...s,dg:s.gf-s.gc}))
        .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf)];
      result[grupo].completo=result[grupo].every(e=>e.j===3);
    });
    return result;
  },[partidosGrupos]);

  // Terceros ordenados para slots
  const terceros3 = React.useMemo(()=>{
    return Object.keys(standings).sort()
      .filter(g=>standings[g].length>=3)
      .map(g=>({grupo:g,...standings[g][2]}))
      .sort((a,b)=>b.pts-a.pts||(a.dg===undefined?0:b.dg-a.dg)||b.gf-a.gf);
  },[standings]);
  const top8grupos = terceros3.slice(0,8).map(t=>t.grupo);

  // ── resolverSlot ────────────────────────────────────────────────
  // Regla única: si el partido está FINALIZADO, los equipos en BD son el dato real.
  // En cualquier otro caso (pendiente, incluso con equipo_a/b pre-populados como estimación)
  // SIEMPRE recalculamos desde standings en vivo.
  // Así, las estimaciones del admin nunca se muestran como "confirmadas".
  //
  // provisional = true  → el grupo de ese equipo aún no terminó (puede cambiar)
  // provisional = false → grupo completo, equipo definitivo

  // Greedy assignment de terceros: más restrictivo primero, sin duplicados de grupo ni de slot
  const asig3 = React.useMemo(()=>{
    const SLOTS3={'P74':['A','B','C','D','F'],'P77':['C','D','F','G','H'],
      'P79':['C','E','F','H','I'],'P80':['E','H','I','J','K'],
      'P81':['B','E','F','I','J'],'P82':['A','E','H','I','J'],
      'P85':['E','F','G','I','J'],'P87':['D','E','I','J','L']};
    const t8=new Set(terceros3.slice(0,8).map(t=>t.grupo));
    // Provisional mientras no estén los 12 grupos completos
    const todosCompletos = Object.keys(standings).length===12 &&
      Object.values(standings).every(g=>g.completo);
    const asig={};const slotsUsados=new Set();const gruposUsados=new Set();
    const ord=Object.entries(SLOTS3).sort((a,b)=>a[1].length-b[1].length);
    for(const [slot,grupos] of ord){
      const cand=terceros3.find(t=>grupos.includes(t.grupo)&&t8.has(t.grupo)&&!slotsUsados.has(slot)&&!gruposUsados.has(t.grupo));
      if(cand){
        asig[slot]={equipo:cand.n, provisional:!todosCompletos};
        slotsUsados.add(slot);gruposUsados.add(cand.grupo);
      }
    }
    return asig;
  },[terceros3,standings]);

  function resolverSlot(partido) {
    // Partido finalizado → datos reales en BD, usar siempre
    if (partido.finalizado) return partido;

    const slotA = partido.slot_a||'';
    const slotB = partido.slot_b||'';

    function fromSlot(slot, esA) {
      // Si hay equipo cargado en BD → usarlo directo (grupos cerrados o propagado)
      const eqBD = esA ? partido.equipo_a : partido.equipo_b;
      if(eqBD) return {equipo: eqBD, provisional: false};
      // Sin dato en BD → calcular desde standings
      const m1 = slot.match(/^([12])°\s*Grupo\s*([A-L])$/);
      if(m1){
        const pos=parseInt(m1[1])-1, grp=m1[2];
        const t=standings[grp];
        if(!t||t.length<=pos) return null;
        return {equipo:t[pos].n, provisional:!t.completo};
      }
      if(slot.startsWith('3°')) return asig3[partido.numero]||null;
      if(slot.startsWith('Gan.')||slot.startsWith('Per.')){
        const eq = esA ? partido.equipo_a : partido.equipo_b;
        return eq ? {equipo:eq, provisional:false} : null;
      }
      return null;
    }
    return { ...partido, _slotA: fromSlot(slotA, true), _slotB: fromSlot(slotB, false) };
  }

  // Etapa activa para countdown
  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);
  const etapaActiva = etapasOrden.find(e=>partidos.filter(p=>p.etapa_id===e.id).some(p=>!p.finalizado));
  const primerPendiente = etapaActiva
    ? partidos.filter(p=>p.etapa_id===etapaActiva.id&&!p.finalizado&&p.fecha&&p.hora)
        .sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0]
    : null;
  const cierreMs = primerPendiente ? cierreEtapa(primerPendiente.fecha, primerPendiente.hora) - tick : null;

  // Modal de pronósticos del bracket
  const [modalPartido, setModalPartido] = React.useState(null);

  // ── MATCH CARD ─────────────────────────────────────────
  function BMatch({numero, side='left', highlight=false}) {
    const pRaw = pMap[numero];
    if (!pRaw) return <div className="bm-empty"/>;
    const p = resolverSlot(pRaw);
    const done = p.finalizado && p.goles_a !== null;
    const sA = p._slotA, sB = p._slotB;
    // _eqA/_eqB/_provA/_provB vienen pre-calculados desde App (partidosResueltos).
    // Para 8vos+ (slots Gan./Per.) se complementa con resolverSlot local.
    const eqA = done ? (p.equipo_a||'?') : (p._eqA || sA?.equipo || p.slot_a || '?');
    const eqB = done ? (p.equipo_b||'?') : (p._eqB || sB?.equipo || p.slot_b || '?');
    const provA = !done && (p._provA || sA?.provisional);
    const provB = !done && (p._provB || sB?.provisional);
    const hasTeams = done ? !!(p.equipo_a && p.equipo_b) : !!(eqA!=='?'||eqB!=='?');
    return (
      <div className={`bm ${done?'bm-done':''} ${highlight?'bm-highlight':''} ${!hasTeams?'bm-pending':''}`}>
        <div className="bm-num">{numero}</div>
        <div className={`bm-team ${done&&p.clasificado===p.equipo_a?'bm-winner':''}`}>
          <Flag name={done?p.equipo_a:sA?.equipo} size={13}/>
          <span className="bm-tname" style={{color:provA?'rgba(255,255,255,.6)':undefined}}>{eqA}</span>
          {provA&&<span style={{fontSize:7,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>P</span>}
          {done && <span className="bm-score">{p.goles_a}</span>}
        </div>
        <div className="bm-sep"/>
        <div className={`bm-team ${done&&p.clasificado===p.equipo_b?'bm-winner':''}`}>
          <Flag name={done?p.equipo_b:sB?.equipo} size={13}/>
          <span className="bm-tname" style={{color:provB?'rgba(255,255,255,.6)':undefined}}>{eqB}</span>
          {provB&&<span style={{fontSize:7,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>P</span>}
          {done && <span className="bm-score">{p.goles_b}</span>}
        </div>
        {done && (p.hubo_penales||p.hubo_prorroga) && (
          <div className="bm-extra">{p.hubo_penales?'⚡ Pen.':'⏱ Prórr.'}</div>
        )}
        {!done && (provA||provB) && (
          <div style={{marginTop:4,textAlign:'center',fontSize:8,color:'var(--gold)',
            fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.8,
            background:'rgba(245,166,35,.08)',borderRadius:3,padding:'2px 4px',
            border:'1px solid rgba(245,166,35,.2)'}}>
            ⏳ puede cambiar
          </div>
        )}
        {(eqA!=='?'||eqB!=='?') && (
          <button
            onClick={e=>{e.stopPropagation();setModalPartido(pRaw);}}
            style={{width:'100%',marginTop:4,background:'rgba(245,166,35,.08)',
              border:'1px solid rgba(245,166,35,.2)',borderRadius:4,
              color:'var(--gold)',fontSize:9,padding:'3px 0',cursor:'pointer',
              fontFamily:'Barlow Condensed',letterSpacing:.5,transition:'all .2s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(245,166,35,.18)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(245,166,35,.08)'}>
            🎯 Pronósticos
          </button>
        )}
      </div>
    );
  }

  // ── CONNECTOR LINE (SVG) ───────────────────────────────
  // Dibuja las líneas de conexión entre rondas
  // side: 'left' lines go right→, 'right' lines go left←
  function Connector({rows, side='left'}) {
    // rows = número de partidos en esta columna
    // Genera líneas horizontales + verticales simuladas con CSS
    return (
      <div className={`bc-col bc-${side}`} style={{display:'flex',flexDirection:'column',justifyContent:'space-around',alignItems:side==='left'?'flex-start':'flex-end'}}>
        {Array.from({length:rows}).map((_,i)=>(
          <div key={i} className={`bc-line bc-line-${side}`}/>
        ))}
      </div>
    );
  }

  // ── COLUMN: stack de partidos ──────────────────────────
  function BCol({numeros, label, side='left', colClass=''}) {
    return (
      <div className={`bcol ${colClass}`}>
        <div className="bcol-label">{label}</div>
        <div className="bcol-matches">
          {numeros.map(n=>(
            <div key={n} className="bcol-slot">
              <BMatch numero={n} side={side}/>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── CENTRO: Final + 3er puesto ─────────────────────────
  function BCenter() {
    const pF = pMap['P104'];
    const p3 = pMap['P103'];
    const doneF = pF?.finalizado && pF?.goles_a !== null;
    const done3 = p3?.finalizado && p3?.goles_a !== null;

    function FinalCard({p, title, icon, done}) {
      if (!p) return null;
      const eqA = p.equipo_a || p.slot_a || '?';
      const eqB = p.equipo_b || p.slot_b || '?';
      return (
        <div className={`bm-final ${done?'bm-done':''}`}>
          <div className="bm-final-title">{icon} {title}</div>
          <div className={`bm-team bm-team-lg ${done&&p.clasificado===p.equipo_a?'bm-winner':''}`}>
            <Flag name={p.equipo_a} size={16}/>
            <span className="bm-tname">{eqA}</span>
            {done && <span className="bm-score">{p.goles_a}</span>}
          </div>
          <div className="bm-sep"/>
          <div className={`bm-team bm-team-lg ${done&&p.clasificado===p.equipo_b?'bm-winner':''}`}>
            <Flag name={p.equipo_b} size={16}/>
            <span className="bm-tname">{eqB}</span>
            {done && <span className="bm-score">{p.goles_b}</span>}
          </div>
          {done && p.clasificado && (
            <div className="bm-campeon">
              <Flag name={p.clasificado} size={18}/>
              <span>{title==='GRAN FINAL'?'🏆 Campeón':'🥉 3er lugar'}: {p.clasificado}</span>
            </div>
          )}
          {done && (p.hubo_penales||p.hubo_prorroga) && (
            <div className="bm-extra">{p.hubo_penales?'⚡ Penales':'⏱ Prórroga'}</div>
          )}
        </div>
      );
    }

    return (
      <div className="bcol bcol-center">
        <div className="bcol-label" style={{color:'var(--gold)'}}>FINAL</div>
        <div className="bcol-matches">
          <div className="bcol-slot bcol-slot-center">
            <FinalCard p={pF} title="GRAN FINAL" icon="🏆" done={doneF}/>
          </div>
          <div className="bcol-slot bcol-slot-center" style={{marginTop:12}}>
            <FinalCard p={p3} title="3ER PUESTO" icon="🥉" done={done3}/>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Countdown banner */}
      {cierreMs !== null && cierreMs > 0 && etapaActiva && (
        <div style={{background:'rgba(245,166,35,.08)',border:'1px solid rgba(245,166,35,.3)',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:800,color:'var(--gold)',letterSpacing:1}}>
            🟢 PRONÓSTICOS ABIERTOS — {etapaActiva.nombre.toUpperCase()}
          </span>
          <span style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'#fff'}}>{formatCountdown(cierreMs)}</span>
          {primerPendiente && <span style={{fontSize:11,color:'var(--gm)'}}>cierra {fLarga(primerPendiente.fecha)} {primerPendiente.hora} IQ</span>}
        </div>
      )}
      {cierreMs !== null && cierreMs <= 0 && etapaActiva && (
        <div style={{background:'rgba(204,0,0,.08)',border:'1px solid rgba(204,0,0,.3)',borderRadius:10,padding:'10px 16px',marginBottom:14}}>
          <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:800,color:'#FF6666',letterSpacing:1}}>🔒 PRONÓSTICOS CERRADOS — {etapaActiva.nombre.toUpperCase()}</span>
        </div>
      )}

      {/* Leyenda */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,fontSize:10,color:'var(--gm)',alignItems:'center'}}>
        <span><span style={{display:'inline-block',width:9,height:9,background:'rgba(245,166,35,.4)',borderRadius:2,marginRight:4,verticalAlign:'middle'}}/>Clasificado</span>
        <span>⚡ Penales</span>
        <span>⏱ Prórroga</span>
        <span style={{background:'rgba(245,166,35,.08)',border:'1px solid rgba(245,166,35,.2)',borderRadius:3,padding:'1px 5px',fontFamily:'Barlow Condensed',fontSize:9,fontWeight:700,color:'var(--gold)'}}>
          P = provisional
        </span>
        <span style={{fontSize:10,color:'var(--gm)'}}>⏳ puede cambiar = grupo incompleto</span>
        <span>? = sin datos aún</span>
      </div>

      {/* Modal pronósticos bracket */}
      {modalPartido && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:200,
          display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
          onClick={()=>setModalPartido(null)}>
          <div style={{background:'var(--navy)',border:'1px solid rgba(245,166,35,.3)',
            borderRadius:14,padding:20,width:'100%',maxWidth:480,maxHeight:'80vh',
            overflowY:'auto'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div>
                <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:800,
                  color:'var(--gold)',letterSpacing:1}}>{modalPartido.numero}</span>
                <div style={{display:'flex',alignItems:'center',gap:10,marginTop:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <Flag name={modalPartido.equipo_a} size={18}/>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:700}}>{modalPartido.equipo_a||modalPartido.slot_a||'?'}</span>
                  </div>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:800,
                    color: modalPartido.finalizado ? 'var(--gold)' : 'var(--gm)'}}>
                    {modalPartido.finalizado && modalPartido.goles_a!==null
                      ? `${modalPartido.goles_a} – ${modalPartido.goles_b}`
                      : 'vs'}
                  </span>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:700}}>{modalPartido.equipo_b||modalPartido.slot_b||'?'}</span>
                    <Flag name={modalPartido.equipo_b} size={18}/>
                  </div>
                </div>
                {modalPartido.finalizado && modalPartido.clasificado && (
                  <div style={{fontSize:10,color:'var(--green)',marginTop:4}}>
                    ✓ Clasifica: {modalPartido.clasificado}
                  </div>
                )}
              </div>
              <button onClick={()=>setModalPartido(null)}
                style={{background:'rgba(255,255,255,.1)',border:'none',borderRadius:6,
                  color:'#fff',fontSize:16,width:28,height:28,cursor:'pointer',flexShrink:0}}>✕</button>
            </div>
            <PanelPronosticos
              partido={modalPartido}
              pronosticos={pronosticos}
              participantes={participantes}
              userKO={userKO}
              pronsCerradosEtapa={pronsCerradosEtapa}
              forceOpen={true}
            />
          </div>
        </div>
      )}

      {/* Bracket */}
      <div className="bracket-scroll">
        <div className="bracket-tree">

          {/* IZQUIERDA: 16avos → 8vos → 4tos → Semi
              Pares correctos FIFA:
              P74+P77 → P89 | P73+P75 → P90 | P83+P84 → P93 | P81+P82 → P94
              P97=W89vsW90 | P98=W93vsW94 | P101=W97vsW98 */}
          <BCol numeros={['P74','P77','P73','P75','P83','P84','P81','P82']} label="16AVOS" side="left" colClass="bcol-16"/>
          <Connector rows={4} side="left"/>
          <BCol numeros={['P89','P90','P93','P94']} label="8VOS" side="left" colClass="bcol-8"/>
          <Connector rows={2} side="left"/>
          <BCol numeros={['P97','P98']} label="4TOS" side="left" colClass="bcol-4"/>
          <Connector rows={1} side="left"/>
          <BCol numeros={['P101']} label="SEMIS" side="left" colClass="bcol-semi"/>
          <Connector rows={1} side="left"/>

          {/* CENTRO */}
          <BCenter/>

          {/* DERECHA: Semi → 4tos → 8vos → 16avos
              Pares correctos FIFA:
              P76+P78 → P91 | P79+P80 → P92 | P86+P88 → P95 | P85+P87 → P96
              P99=W91vsW92 | P100=W95vsW96 | P102=W99vsW100 */}
          <Connector rows={1} side="right"/>
          <BCol numeros={['P102']} label="SEMIS" side="right" colClass="bcol-semi"/>
          <Connector rows={1} side="right"/>
          <BCol numeros={['P99','P100']} label="4TOS" side="right" colClass="bcol-4"/>
          <Connector rows={2} side="right"/>
          <BCol numeros={['P91','P92','P95','P96']} label="8VOS" side="right" colClass="bcol-8"/>
          <Connector rows={4} side="right"/>
          <BCol numeros={['P76','P78','P79','P80','P86','P88','P85','P87']} label="16AVOS" side="right" colClass="bcol-16"/>

        </div>
      </div>
    </div>
  );
}


// ── TAB CALENDARIO ───────────────────────────────────────
function TabCalendario({partidos, etapas, participantes, pronosticos, userKO, pronsCerradosEtapa}) {
  const [filtroEtapa, setFiltroEtapa] = useState('TODOS');
  const today = todayIQ();

  const etapaMap = useMemo(()=>{ const m={}; etapas.forEach(e=>m[e.id]=e); return m; },[etapas]);
  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);

  const filtrados = partidos
    .filter(p => filtroEtapa==='TODOS' || String(p.etapa_id)===filtroEtapa)
    .sort((a,b)=>a.fecha?.localeCompare(b.fecha)||a.hora?.localeCompare(b.hora));

  const porFecha = {};
  filtrados.forEach(p=>{
    const f = p.fecha||'Sin fecha';
    if(!porFecha[f]) porFecha[f]=[];
    porFecha[f].push(p);
  });

  return (
    <div>
      {/* Filtro etapa */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
        <button className={`btn btn-sm ${filtroEtapa==='TODOS'?'btn-p':'btn-s'}`} onClick={()=>setFiltroEtapa('TODOS')}>Todos</button>
        {etapasOrden.map(e=>(
          <button key={e.id} className={`btn btn-sm ${filtroEtapa===String(e.id)?'btn-p':'btn-s'}`}
            onClick={()=>setFiltroEtapa(String(e.id))}>{e.nombre}</button>
        ))}
      </div>

      {Object.keys(porFecha).sort().map(fecha=>{
        const ps = porFecha[fecha];
        const esHoy = fecha===today;
        return (
          <div key={fecha}>
            <div style={{fontFamily:'Barlow Condensed',fontSize:15,fontWeight:700,color:'var(--gold)',padding:'8px 0 6px',borderBottom:'1px solid rgba(245,166,35,.3)',marginBottom:8,marginTop:18,display:'flex',alignItems:'center',gap:8}}>
              <span>{fLarga(fecha)}</span>
              {esHoy&&<span style={{background:'var(--red)',fontSize:9,padding:'2px 7px',borderRadius:3,fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:1,color:'#fff'}}>HOY</span>}
            </div>
            {ps.map(p=>{
              const etapa = etapaMap[p.etapa_id];
              const done = p.finalizado && p.goles_a!==null;
              const eqA = (done?p.equipo_a:p._eqA) || p.slot_a || 'Por confirmar';
              const eqB = (done?p.equipo_b:p._eqB) || p.slot_b || 'Por confirmar';
              const provA = p._provA, provB = p._provB;
              const hasTeams = done ? !!(p.equipo_a&&p.equipo_b) : !!(p._eqA&&p._eqB);
              return (
                <div key={p.id} style={{background:'rgba(255,255,255,.04)',border:`1px solid ${done?'rgba(74,219,138,.25)':'rgba(255,255,255,.08)'}`,borderRadius:10,padding:'11px 14px',marginBottom:7,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                  {/* Número y etapa */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,minWidth:52}}>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:800,color:'var(--gold)'}}>{p.numero}</span>
                    {etapa&&<span className={`etapa-badge ${etapaBadgeClass(etapa.nombre)}`} style={{fontSize:9}}>{etapa.nombre}</span>}
                  </div>
                  {/* Hora */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:44}}>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:15,fontWeight:700,color:'var(--white)'}}>{p.hora}</span>
                    <span style={{fontSize:9,color:'var(--gm)',letterSpacing:.5}}>Irak</span>
                  </div>
                  {/* Equipos */}
                  <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:200}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flex:1,justifyContent:'flex-end'}}>
                      {provA&&<span style={{fontSize:9,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700}}>P</span>}
                      <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:700,textAlign:'right',opacity:hasTeams?(provA?.65:1):.45}}>{eqA}</span>
                      <Flag name={eqA} size={20}/>
                    </div>
                    <div style={{background:'rgba(0,0,0,.35)',padding:'5px 10px',borderRadius:6,minWidth:60,textAlign:'center',flexShrink:0}}>
                      {done
                        ? <span style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:800,color:'var(--gold)'}}>{p.goles_a}–{p.goles_b}</span>
                        : <span style={{fontFamily:'Barlow Condensed',fontSize:12,color:'var(--gm)'}}>vs</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
                      <Flag name={eqB} size={20}/>
                      <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:700,opacity:hasTeams?(provB?.65:1):.45}}>{eqB}</span>
                      {provB&&<span style={{fontSize:9,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700}}>P</span>}
                    </div>
                  </div>
                  {/* Estado */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,minWidth:80}}>
                    <span className={done?'st-done':'st-pend'}>{done?'✓ Final':'Pendiente'}</span>
                    {!done&&(provA||provB)&&<span style={{fontSize:9,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700}}>⏳ puede cambiar</span>}
                    {done&&p.clasificado&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>→ {p.clasificado}</span>}
                    {done&&p.hubo_penales&&<span style={{fontSize:9,color:'var(--gm)'}}>⚡ Pen.</span>}
                    {done&&p.hubo_prorroga&&!p.hubo_penales&&<span style={{fontSize:9,color:'var(--gm)'}}>⏱ Prórr.</span>}
                  </div>
                  {/* Pronósticos expandibles */}
                  <div style={{width:'100%',paddingTop:2}}>
                    <PanelPronosticos
                      partido={p}
                      pronosticos={pronosticos}
                      participantes={participantes}
                      userKO={userKO}
                      pronsCerradosEtapa={pronsCerradosEtapa}
                    />
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── TAB MIS PRONÓSTICOS ───────────────────────────────────
function TabMisPron({partidos, etapas, participantes, pronosticos, podios, onRefresh}) {
  const [modo, setModo] = useState('inicio'); // inicio | registro | login | logueado
  const [userKO, setUserKO] = useState(null);

  // Al montar, verificar si hay sesión guardada en sessionStorage
  useEffect(()=>{
    try {
      const saved = sessionStorage.getItem('quiniela_ko_user');
      if (saved) {
        const u = JSON.parse(saved);
        // Verificar que sigue aprobado
        const found = participantes.find(p=>p.id===u.id&&p.aprobado);
        if (found) { setUserKO(found); setModo('logueado'); }
        else sessionStorage.removeItem('quiniela_ko_user');
      }
    } catch(e){}
  }, [participantes]);

  function login(user) {
    setUserKO(user);
    setModo('logueado');
    try { sessionStorage.setItem('quiniela_ko_user', JSON.stringify({id:user.id,nombre:user.nombre})); } catch(e){}
  }
  function logout() {
    setUserKO(null);
    setModo('inicio');
    try { sessionStorage.removeItem('quiniela_ko_user'); } catch(e){}
  }

  // Etapa activa = primera etapa abierta con partidos pendientes
  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);
  const etapaActiva = etapasOrden.find(e=>e.abierta&&partidos.filter(p=>p.etapa_id===e.id).some(p=>!p.finalizado));
  const primerPartidoActivo = etapaActiva
    ? partidos.filter(p=>p.etapa_id===etapaActiva.id&&p.fecha&&p.hora&&!p.finalizado)
        .sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0]
    : null;

  // ¿Pronósticos cerrados? → cuando ya pasó la hora del primer partido
  const pronsCerrados = primerPartidoActivo
    ? Date.now() >= cierreEtapa(primerPartidoActivo.fecha, primerPartidoActivo.hora)
    : true;

  // ¿16avos? primera etapa
  const es16avos = etapaActiva?.orden === 1;

  if (modo==='inicio') return (
    <PronInicio
      etapaActiva={etapaActiva}
      primerPartidoActivo={primerPartidoActivo}
      pronsCerrados={pronsCerrados}
      es16avos={es16avos}
      participantes={participantes}
      onRegistro={()=>setModo('registro')}
      onLogin={()=>setModo('login')}
    />
  );

  if (modo==='registro') return (
    <PronRegistro
      etapaActiva={etapaActiva}
      partidos={partidos}
      participantes={participantes}
      pronsCerrados={pronsCerrados}
      onBack={()=>setModo('inicio')}
      onSuccess={()=>setModo('inicio')}
      onRefresh={onRefresh}
    />
  );

  if (modo==='login') return (
    <PronLogin
      participantes={participantes}
      onBack={()=>setModo('inicio')}
      onLogin={login}
    />
  );

  if (modo==='logueado') return (
    <PronLogueado
      user={userKO}
      partidos={partidos}
      etapas={etapas}
      etapaActiva={etapaActiva}
      primerPartidoActivo={primerPartidoActivo}
      pronsCerrados={pronsCerrados}
      pronosticos={pronosticos}
      podios={podios}
      participantes={participantes}
      onLogout={logout}
      onRefresh={onRefresh}
    />
  );

  return null;
}

// ── PANTALLA INICIO ───────────────────────────────────────
function PronInicio({etapaActiva, primerPartidoActivo, pronsCerrados, es16avos, participantes, onRegistro, onLogin}) {
  const [tick, setTick] = useState(Date.now());
  useEffect(()=>{ const id=setInterval(()=>setTick(Date.now()),1000); return()=>clearInterval(id); },[]);
  const cierreMs = primerPartidoActivo ? cierreEtapa(primerPartidoActivo.fecha, primerPartidoActivo.hora) - tick : null;

  return (
    <div style={{maxWidth:420,margin:'0 auto'}}>
      {/* Estado etapa */}
      {etapaActiva && (
        <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'16px',marginBottom:16,textAlign:'center'}}>
          <div style={{fontFamily:'Barlow Condensed',fontSize:12,color:'var(--gm)',letterSpacing:2,marginBottom:4}}>ETAPA ACTIVA</div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:'var(--gold)',marginBottom:8}}>{etapaActiva.nombre.toUpperCase()}</div>
          {cierreMs!==null&&cierreMs>0 ? (
            <>
              <div style={{fontFamily:'Barlow Condensed',fontSize:28,fontWeight:800,color:'#fff',marginBottom:4}}>{formatCountdown(cierreMs)}</div>
              <div style={{fontSize:11,color:'var(--gm)'}}>para el cierre de pronósticos</div>
              {primerPartidoActivo&&<div style={{fontSize:11,color:'var(--gm)',marginTop:2}}>{fLarga(primerPartidoActivo.fecha)} · {primerPartidoActivo.hora} IQ</div>}
            </>
          ) : (
            <div style={{background:'rgba(204,0,0,.15)',border:'1px solid rgba(204,0,0,.3)',borderRadius:6,padding:'8px',color:'#FF6666',fontFamily:'Barlow Condensed',fontWeight:700,fontSize:13}}>
              🔒 Pronósticos cerrados para esta etapa
            </div>
          )}
        </div>
      )}
      {!etapaActiva && (
        <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'20px',marginBottom:16,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:8}}>⏳</div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'var(--gm)'}}>No hay etapa activa en este momento</div>
          <div style={{fontSize:11,color:'var(--gm)',marginTop:4}}>El admin abrirá los pronósticos cuando comience cada ronda</div>
        </div>
      )}

      {/* Botones */}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {es16avos&&!pronsCerrados&&(
          <button className="btn btn-p" style={{padding:'14px',fontSize:15,width:'100%'}} onClick={onRegistro}>
            ✍️ REGISTRARME Y HACER PRONÓSTICOS
          </button>
        )}
        {participantes.filter(p=>p.aprobado).length>0&&(
          <button className="btn btn-s" style={{padding:'14px',fontSize:15,width:'100%'}} onClick={onLogin}>
            🔑 INGRESAR CON MI PIN
          </button>
        )}
      </div>

      <div style={{marginTop:20,padding:'12px 14px',background:'rgba(0,0,0,.2)',borderRadius:8,fontSize:11,color:'var(--gm)',lineHeight:1.9}}>
        <strong style={{color:'var(--gold)'}}>¿Primera vez?</strong> Regístrate antes del inicio de 16avos.<br/>
        <strong style={{color:'var(--gold)'}}>¿Ya tienes PIN?</strong> Ingresa para ver y editar tus pronósticos.<br/>
        <strong style={{color:'var(--gold)'}}>Puntos:</strong> Exacto 5pts · Ganador+dif 4pts · Ganador 3pts · Clasifica +2pts · Podio +5pts c/u
      </div>
    </div>
  );
}

// ── REGISTRO (solo 16avos) ────────────────────────────────
function PronRegistro({etapaActiva, partidos, participantes, pronsCerrados, onBack, onSuccess, onRefresh}) {
  const [paso, setPaso] = useState(1); // 1=datos, 2=pronósticos, 3=podio, 4=confirmado
  const [nombre, setNombre] = useState('');
  const [pin, setPin] = useState('');
  const [pinConfirm, setPinConfirm] = useState('');
  const [preds, setPreds] = useState({}); // partido_id -> {pa, pb, clasif}
  const [podio, setPodio] = useState({campeon:'',subcampeon:'',tercero:''});
  const [msg, setMsg] = useState(null);
  const [saving, setSaving] = useState(false);

  const showMsg = (t,type='error')=>{ setMsg({t,type}); setTimeout(()=>setMsg(null),4000); };

  const partidos16 = partidos
    .filter(p=>p.etapa_id===etapaActiva?.id)
    .sort((a,b)=>a.fecha?.localeCompare(b.fecha)||a.hora?.localeCompare(b.hora));

  if (pronsCerrados) return (
    <div style={{maxWidth:420,margin:'0 auto'}}>
      <button className="btn btn-s btn-sm" style={{marginBottom:14}} onClick={onBack}>← Volver</button>
      <div className="card" style={{textAlign:'center',padding:30}}>
        <div style={{fontSize:32,marginBottom:10}}>🔒</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:700,color:'#FF6666'}}>Registro cerrado</div>
        <div style={{fontSize:12,color:'var(--gm)',marginTop:8}}>Los pronósticos de 16avos ya cerraron. Contacta al admin si tienes dudas.</div>
      </div>
    </div>
  );

  // Verificar que nombre no esté duplicado
  function nombreValido() {
    return nombre.trim().length>=3 && !participantes.find(p=>p.nombre.toLowerCase()===nombre.trim().toLowerCase());
  }

  function paso1Ok() {
    if (!nombre.trim()||nombre.trim().length<3) { showMsg('Ingresa tu nombre completo (mínimo 3 caracteres)'); return false; }
    if (participantes.find(p=>p.nombre.toLowerCase()===nombre.trim().toLowerCase())) { showMsg('Ese nombre ya está registrado'); return false; }
    if (!pin||pin.length<4) { showMsg('El PIN debe tener al menos 4 dígitos'); return false; }
    if (pin!==pinConfirm) { showMsg('Los PINs no coinciden'); return false; }
    return true;
  }

  function paso2Ok() {
    const faltantes = partidos16.filter(p=>{
      const pr = preds[p.id];
      if (!pr||pr.pa===''||pr.pb==='') return true;
      // Si hay empate, debe elegir clasificado
      if (parseInt(pr.pa)===parseInt(pr.pb)&&!pr.clasif) return true;
      return false;
    });
    if (faltantes.length>0) { showMsg(`Faltan ${faltantes.length} pronósticos (recuerda elegir clasificado en empates)`); return false; }
    return true;
  }

  function paso3Ok() {
    if (!podio.campeon) { showMsg('Selecciona tu campeón'); return false; }
    if (!podio.subcampeon) { showMsg('Selecciona tu subcampeón'); return false; }
    if (!podio.tercero) { showMsg('Selecciona el 3er lugar'); return false; }
    if (new Set([podio.campeon,podio.subcampeon,podio.tercero]).size<3) { showMsg('El campeón, subcampeón y 3er lugar deben ser equipos diferentes'); return false; }
    return true;
  }

  async function enviar() {
    if (!paso3Ok()) return;
    setSaving(true);
    try {
      // 1. Crear participante
      const res = await sb('participantes_ko',{method:'POST',body:JSON.stringify({nombre:nombre.trim(),pin,aprobado:false})});
      const part = Array.isArray(res)?res[0]:res;

      // 2. Guardar podio
      await sb('pronostico_podio',{method:'POST',prefer:'return=minimal',
        body:JSON.stringify({participante_ko_id:part.id,pred_campeon:podio.campeon,pred_subcampeon:podio.subcampeon,pred_tercero:podio.tercero})});

      // 3. Guardar pronósticos
      const rows = partidos16.map(p=>{
        const pr = preds[p.id]||{};
        const pa = parseInt(pr.pa)||0, pb = parseInt(pr.pb)||0;
        let clasifPred = pr.clasif||null;
        if (!clasifPred) clasifPred = clasificadoImplicito(pa,pb,p.equipo_a,p.equipo_b);
        return {participante_ko_id:part.id,partido_ko_id:p.id,pred_a:pa,pred_b:pb,clasificado_pred:clasifPred};
      });
      for (let i=0;i<rows.length;i+=20)
        await sb('pronosticos_ko',{method:'POST',prefer:'return=minimal',body:JSON.stringify(rows.slice(i,i+20))});

      setPaso(4);
      onRefresh();
    } catch(e){ showMsg('Error al guardar: '+e.message); }
    setSaving(false);
  }

  function setPred(pid, campo, valor) {
    setPreds(prev=>({...prev,[pid]:{...prev[pid],[campo]:valor}}));
  }

  if (paso===4) return (
    <div style={{maxWidth:420,margin:'0 auto'}}>
      <div className="card" style={{textAlign:'center',padding:30}}>
        <div style={{fontSize:44,marginBottom:14}}>✅</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:'var(--green)',marginBottom:8}}>¡Registro enviado!</div>
        <div style={{fontSize:13,color:'var(--gm)',lineHeight:1.8,marginBottom:16}}>
          Tus pronósticos fueron guardados.<br/>
          El admin los aprobará pronto.<br/>
          Una vez aprobado, podrás ingresar con tu nombre y PIN <strong style={{color:'var(--gold)'}}>{pin}</strong>.
        </div>
        <div style={{background:'rgba(245,166,35,.08)',border:'1px solid rgba(245,166,35,.25)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--gold)'}}>
          ⚠️ Guarda tu PIN: <strong style={{fontSize:18,letterSpacing:3}}>{pin}</strong>
        </div>
        <button className="btn btn-p" style={{width:'100%'}} onClick={onSuccess}>Volver al inicio</button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:500,margin:'0 auto'}}>
      <button className="btn btn-s btn-sm" style={{marginBottom:14}} onClick={onBack}>← Volver</button>

      {/* Indicador de pasos */}
      <div style={{display:'flex',gap:6,marginBottom:18}}>
        {['Datos','Pronósticos','Podio'].map((l,i)=>(
          <div key={i} style={{flex:1,textAlign:'center',padding:'6px 0',borderRadius:6,fontFamily:'Barlow Condensed',fontSize:11,fontWeight:700,letterSpacing:1,
            background:paso===i+1?'var(--gold)':paso>i+1?'rgba(74,219,138,.2)':'rgba(255,255,255,.06)',
            color:paso===i+1?'var(--navy)':paso>i+1?'var(--green)':'var(--gm)'}}>
            {paso>i+1?'✓ ':''}{l.toUpperCase()}
          </div>
        ))}
      </div>

      {msg&&<div className={`alert al-${msg.type==='error'?'err':'ok'}`}>{msg.t}</div>}

      {/* PASO 1 — Datos */}
      {paso===1&&(
        <div className="card">
          <div className="card-title">✍️ Tus datos</div>
          <div className="form-group" style={{marginBottom:12}}>
            <label className="lbl">Nombre completo</label>
            <input className="inp" placeholder="Ej. Pedro García" value={nombre} onChange={e=>setNombre(e.target.value)}/>
            {nombre.length>=3&&participantes.find(p=>p.nombre.toLowerCase()===nombre.trim().toLowerCase())&&
              <span style={{fontSize:10,color:'#FF6666',marginTop:3}}>⚠️ Ese nombre ya está registrado</span>}
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="lbl">PIN (mínimo 4 dígitos)</label>
              <input className="inp" type="password" placeholder="••••" maxLength={10} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,''))}
                style={{fontFamily:'Barlow Condensed',fontSize:22,letterSpacing:4,textAlign:'center'}}/>
            </div>
            <div className="form-group">
              <label className="lbl">Confirmar PIN</label>
              <input className="inp" type="password" placeholder="••••" maxLength={10} value={pinConfirm} onChange={e=>setPinConfirm(e.target.value.replace(/\D/g,''))}
                style={{fontFamily:'Barlow Condensed',fontSize:22,letterSpacing:4,textAlign:'center'}}/>
            </div>
          </div>
          {pin&&pinConfirm&&pin!==pinConfirm&&<div style={{fontSize:10,color:'#FF6666',marginBottom:8}}>Los PINs no coinciden</div>}
          <button className="btn btn-p" style={{width:'100%',marginTop:8}} onClick={()=>{if(paso1Ok())setPaso(2);}}>SIGUIENTE →</button>
        </div>
      )}

      {/* PASO 2 — Pronósticos 16avos */}
      {paso===2&&(
        <div className="card">
          <div className="card-title">⚽ Pronósticos — {etapaActiva?.nombre} ({partidos16.length} partidos)</div>
          <div style={{fontSize:11,color:'var(--gm)',marginBottom:14,lineHeight:1.7}}>
            Pronostica el marcador a 90 min (sin prórroga ni penales).<br/>
            En caso de <strong style={{color:'var(--white)'}}>empate</strong>, elige también quién clasifica.
          </div>
          {partidos16.map(p=>{
            const pr = preds[p.id]||{};
            const paVal = pr.pa!==undefined?pr.pa:'';
            const pbVal = pr.pb!==undefined?pr.pb:'';
            const esEmpate = paVal!==''&&pbVal!==''&&parseInt(paVal)===parseInt(pbVal);
            const hasTeams = !!(p.equipo_a&&p.equipo_b);
            return (
              <div key={p.id} style={{background:'rgba(0,0,0,.2)',borderRadius:8,padding:'10px 12px',marginBottom:8,border:`1px solid ${esEmpate&&!pr.clasif?'rgba(245,166,35,.4)':'rgba(255,255,255,.06)'}`}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--gold)',fontWeight:700}}>{p.numero}</span>
                  <span style={{fontSize:10,color:'var(--gm)'}}>{fLarga(p.fecha)} · {p.hora} IQ</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <div style={{display:'flex',alignItems:'center',gap:5,flex:1,justifyContent:'flex-end',minWidth:100}}>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,textAlign:'right',opacity:hasTeams?1:.6}}>
                      {p.equipo_a||p.slot_a||'?'}
                    </span>
                    <Flag name={p.equipo_a} size={18}/>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={paVal}
                      onChange={e=>setPred(p.id,'pa',e.target.value)} style={{width:44,fontSize:18,padding:'4px 6px'}}/>
                    <span style={{color:'var(--gm)',fontSize:14}}>–</span>
                    <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={pbVal}
                      onChange={e=>setPred(p.id,'pb',e.target.value)} style={{width:44,fontSize:18,padding:'4px 6px'}}/>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flex:1,minWidth:100}}>
                    <Flag name={p.equipo_b} size={18}/>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,opacity:hasTeams?1:.6}}>
                      {p.equipo_b||p.slot_b||'?'}
                    </span>
                  </div>
                </div>
                {esEmpate&&hasTeams&&(
                  <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700}}>Empate → ¿Quién clasifica?</span>
                    <div style={{display:'flex',gap:6}}>
                      <button className={`btn btn-xs ${pr.clasif===p.equipo_a?'btn-p':'btn-s'}`}
                        onClick={()=>setPred(p.id,'clasif',p.equipo_a)}>{p.equipo_a}</button>
                      <button className={`btn btn-xs ${pr.clasif===p.equipo_b?'btn-p':'btn-s'}`}
                        onClick={()=>setPred(p.id,'clasif',p.equipo_b)}>{p.equipo_b}</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <button className="btn btn-s" style={{flex:1}} onClick={()=>setPaso(1)}>← Atrás</button>
            <button className="btn btn-p" style={{flex:2}} onClick={()=>{if(paso2Ok())setPaso(3);}}>SIGUIENTE →</button>
          </div>
        </div>
      )}

      {/* PASO 3 — Podio */}
      {paso===3&&(
        <div className="card">
          <div className="card-title">🏅 Pronóstico de Podio</div>
          <div style={{fontSize:11,color:'var(--gm)',marginBottom:14,lineHeight:1.7}}>
            Solo puedes enviarlo una vez. No es modificable después.<br/>
            <strong style={{color:'var(--gold)'}}>+5 pts por cada acierto</strong> (campeón, subcampeón, 3er lugar).
          </div>
          {[['campeon','🥇 Campeón del Mundo'],['subcampeon','🥈 Subcampeón'],['tercero','🥉 3er Lugar']].map(([k,lbl])=>(
            <div className="form-group" style={{marginBottom:12}} key={k}>
              <label className="lbl">{lbl}</label>
              <select className="inp" value={podio[k]} onChange={e=>setPodio(prev=>({...prev,[k]:e.target.value}))}>
                <option value="">— Selecciona un equipo —</option>
                {TODOS_EQUIPOS.map(eq=><option key={eq} value={eq}>{eq}</option>)}
              </select>
            </div>
          ))}
          {podio.campeon&&podio.subcampeon&&podio.tercero&&new Set([podio.campeon,podio.subcampeon,podio.tercero]).size<3&&(
            <div className="alert al-err">Los tres equipos deben ser diferentes</div>
          )}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <button className="btn btn-s" style={{flex:1}} onClick={()=>setPaso(2)}>← Atrás</button>
            <button className="btn btn-p" style={{flex:2}} onClick={enviar} disabled={saving}>
              {saving?'Enviando...':'✅ ENVIAR PRONÓSTICOS'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────
function PronLogin({participantes, onBack, onLogin}) {
  const [selNombre, setSelNombre] = useState('');
  const [pin, setPin] = useState('');
  const [err, setErr] = useState('');

  const aprobados = participantes.filter(p=>p.aprobado).sort((a,b)=>a.nombre.localeCompare(b.nombre));

  function intentarLogin() {
    if (!selNombre) { setErr('Selecciona tu nombre'); return; }
    if (!pin) { setErr('Ingresa tu PIN'); return; }
    const user = aprobados.find(p=>p.nombre===selNombre&&p.pin===pin);
    if (!user) { setErr('PIN incorrecto'); return; }
    onLogin(user);
  }

  return (
    <div style={{maxWidth:360,margin:'0 auto'}}>
      <button className="btn btn-s btn-sm" style={{marginBottom:14}} onClick={onBack}>← Volver</button>
      <div className="card" style={{textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:10}}>🔑</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,marginBottom:4}}>Ingresar</div>
        <div style={{fontSize:12,color:'var(--gm)',marginBottom:20}}>Selecciona tu nombre e ingresa tu PIN</div>
        {err&&<div className="alert al-err">{err}</div>}
        <div className="form-group" style={{marginBottom:12,textAlign:'left'}}>
          <label className="lbl">Tu nombre</label>
          <select className="inp" value={selNombre} onChange={e=>{setSelNombre(e.target.value);setErr('');}}>
            <option value="">— Selecciona —</option>
            {aprobados.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}
          </select>
        </div>
        <div className="form-group" style={{marginBottom:16,textAlign:'left'}}>
          <label className="lbl">PIN</label>
          <input className="inp" type="password" placeholder="••••" maxLength={10}
            value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,''));setErr('');}}
            onKeyDown={e=>e.key==='Enter'&&intentarLogin()}
            style={{fontFamily:'Barlow Condensed',fontSize:24,letterSpacing:6,textAlign:'center'}}/>
        </div>
        <button className="btn btn-p" style={{width:'100%',padding:12,fontSize:14}} onClick={intentarLogin}>ENTRAR</button>
      </div>
    </div>
  );
}

// ── VISTA LOGUEADO ────────────────────────────────────────
function PronLogueado({user, partidos, etapas, etapaActiva, primerPartidoActivo, pronsCerrados, pronosticos, podios, participantes, onLogout, onRefresh}) {
  const [subTab, setSubTab] = useState('mis');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);
  const [localPreds, setLocalPreds] = useState({});

  const showMsg=(t,type='success')=>{ setMsg({t,type}); setTimeout(()=>setMsg(null),4000); };

  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);

  // Mis pronósticos de la etapa activa
  const misProns = pronosticos.filter(pr=>pr.participante_ko_id===user.id);
  const miPodio = podios.find(p=>p.participante_ko_id===user.id);

  // Partidos de etapa activa con mis predicciones
  const partidosActivos = etapaActiva
    ? partidos.filter(p=>p.etapa_id===etapaActiva.id&&p.equipo_a&&p.equipo_b)
        .sort((a,b)=>a.fecha?.localeCompare(b.fecha)||a.hora?.localeCompare(b.hora))
    : [];

  // Inicializar local preds desde BD
  useEffect(()=>{
    if (!etapaActiva) return;
    const init={};
    partidosActivos.forEach(p=>{
      const pr=misProns.find(x=>x.partido_ko_id===p.id);
      if(pr) init[p.id]={pa:String(pr.pred_a??''),pb:String(pr.pred_b??''),clasif:pr.clasificado_pred||''};
      else init[p.id]={pa:'',pb:'',clasif:''};
    });
    setLocalPreds(init);
  },[etapaActiva?.id, pronosticos.length]);

  function setPred(pid,campo,valor){ setLocalPreds(prev=>({...prev,[pid]:{...prev[pid],[campo]:valor}})); }

  async function guardarProns() {
    setSaving(true);
    try {
      for (const p of partidosActivos) {
        const pr=localPreds[p.id]||{};
        const pa=parseInt(pr.pa), pb=parseInt(pr.pb);
        if(isNaN(pa)||isNaN(pb)) continue;
        let clasif=pr.clasif||null;
        if(!clasif) clasif=clasificadoImplicito(pa,pb,p.equipo_a,p.equipo_b);
        const existe=misProns.find(x=>x.partido_ko_id===p.id);
        if(existe){
          await sb(`pronosticos_ko?id=eq.${existe.id}`,{method:'PATCH',prefer:'return=minimal',
            body:JSON.stringify({pred_a:pa,pred_b:pb,clasificado_pred:clasif})});
        } else {
          await sb('pronosticos_ko',{method:'POST',prefer:'return=minimal',
            body:JSON.stringify({participante_ko_id:user.id,partido_ko_id:p.id,pred_a:pa,pred_b:pb,clasificado_pred:clasif})});
        }
      }
      showMsg('✓ Pronósticos guardados');
      onRefresh();
    } catch(e){ showMsg('Error: '+e.message,'error'); }
    setSaving(false);
  }

  // Calcular mis puntos acumulados
  const misPuntos = misProns.reduce((s,pr)=>s+(pr.puntos_total||0),0);
  const misPtosPodio = miPodio ? (miPodio.pts_campeon||0)+(miPodio.pts_subcampeon||0)+(miPodio.pts_tercero||0) : 0;

  // ¿Pronósticos públicos? → después del cierre de la etapa ACTIVA
  // O si no hay etapa activa (todas terminadas) → siempre público
  const pPublicos = pronsCerrados || !etapaActiva;

  // Para el historial: una etapa es pública si ya terminó o no es la activa
  function etapaEsPublica(etapaId) {
    if (!etapaActiva) return true;           // sin etapa activa → todo público
    if (etapaId !== etapaActiva.id) return true; // etapa pasada → público
    return pronsCerrados;                    // etapa activa → solo si cerró
  }

  return (
    <div>
      {/* Header usuario */}
      <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:800}}>{user.nombre}</div>
          <div style={{fontSize:11,color:'var(--gm)'}}>Puntos KO: <strong style={{color:'var(--gold)',fontSize:16}}>{misPuntos+misPtosPodio}</strong> (marcador {misPuntos} + podio {misPtosPodio})</div>
        </div>
        <button className="btn btn-s btn-xs" onClick={onLogout}>Cerrar sesión</button>
      </div>

      {msg&&<div className={`alert al-${msg.type==='success'?'ok':'err'}`}>{msg.t}</div>}

      <div className="adm-tabs">
        <button className={`btn btn-sm ${subTab==='mis'?'btn-p':'btn-s'}`} onClick={()=>setSubTab('mis')}>⚽ Mis Pronósticos</button>
        <button className={`btn btn-sm ${subTab==='historial'?'btn-p':'btn-s'}`} onClick={()=>setSubTab('historial')}>📋 Historial</button>
        {pPublicos&&<button className={`btn btn-sm ${subTab==='todos'?'btn-p':'btn-s'}`} onClick={()=>setSubTab('todos')}>👥 Todos</button>}
        <button className={`btn btn-sm ${subTab==='podio'?'btn-p':'btn-s'}`} onClick={()=>setSubTab('podio')}>🏅 Podio</button>
      </div>

      {/* MIS PRONÓSTICOS ETAPA ACTIVA */}
      {subTab==='mis'&&(
        <div className="card">
          {!etapaActiva&&<div className="empty" style={{padding:20}}>No hay etapa activa. Espera a que el admin abra la siguiente ronda.</div>}
          {etapaActiva&&pronsCerrados&&<div className="alert al-warn" style={{marginBottom:12}}>🔒 Los pronósticos de {etapaActiva.nombre} están cerrados.</div>}
          {etapaActiva&&!pronsCerrados&&(
            <>
              <div className="card-title">⚽ {etapaActiva.nombre} — Ingresa tus pronósticos</div>
              <div style={{fontSize:11,color:'var(--gm)',marginBottom:14}}>
                Puedes guardar y volver a editar hasta que cierren. En empates elige quién clasifica.
              </div>
              {partidosActivos.length===0&&<div className="empty" style={{padding:16}}>Los equipos de esta ronda aún no están confirmados.</div>}
              {partidosActivos.map(p=>{
                const pr=localPreds[p.id]||{};
                const paVal=pr.pa!==undefined?pr.pa:'';
                const pbVal=pr.pb!==undefined?pr.pb:'';
                const esEmpate=paVal!==''&&pbVal!==''&&parseInt(paVal)===parseInt(pbVal);
                return (
                  <div key={p.id} style={{background:'rgba(0,0,0,.2)',borderRadius:8,padding:'10px 12px',marginBottom:8,border:`1px solid ${esEmpate&&!pr.clasif?'rgba(245,166,35,.4)':'rgba(255,255,255,.06)'}`}}>
                    <div style={{fontSize:10,color:'var(--gm)',marginBottom:6}}>
                      <strong style={{color:'var(--gold)',fontFamily:'Barlow Condensed'}}>{p.numero}</strong> · {fLarga(p.fecha)} · {p.hora} IQ
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <div style={{display:'flex',alignItems:'center',gap:5,flex:1,justifyContent:'flex-end',minWidth:100}}>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,textAlign:'right'}}>{p.equipo_a}</span>
                        <Flag name={p.equipo_a} size={18}/>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:4}}>
                        <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={paVal}
                          onChange={e=>setPred(p.id,'pa',e.target.value)} style={{width:44,fontSize:18,padding:'4px 6px'}}/>
                        <span style={{color:'var(--gm)',fontSize:14}}>–</span>
                        <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={pbVal}
                          onChange={e=>setPred(p.id,'pb',e.target.value)} style={{width:44,fontSize:18,padding:'4px 6px'}}/>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:5,flex:1,minWidth:100}}>
                        <Flag name={p.equipo_b} size={18}/>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700}}>{p.equipo_b}</span>
                      </div>
                    </div>
                    {esEmpate&&(
                      <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:11,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700}}>Empate → ¿Quién clasifica?</span>
                        <div style={{display:'flex',gap:6}}>
                          <button className={`btn btn-xs ${pr.clasif===p.equipo_a?'btn-p':'btn-s'}`} onClick={()=>setPred(p.id,'clasif',p.equipo_a)}>{p.equipo_a}</button>
                          <button className={`btn btn-xs ${pr.clasif===p.equipo_b?'btn-p':'btn-s'}`} onClick={()=>setPred(p.id,'clasif',p.equipo_b)}>{p.equipo_b}</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              {partidosActivos.length>0&&(
                <button className="btn btn-p" style={{width:'100%',marginTop:8,padding:12,fontSize:14}} onClick={guardarProns} disabled={saving}>
                  {saving?'Guardando...':'💾 GUARDAR PRONÓSTICOS'}
                </button>
              )}
            </>
          )}
        </div>
      )}

      {/* HISTORIAL */}
      {subTab==='historial'&&(
        <div className="card">
          <div className="card-title">📋 Mi historial de pronósticos</div>
          {etapasOrden.map(etapa=>{
            const psEtapa=partidos.filter(p=>p.etapa_id===etapa.id).sort((a,b)=>a.numero.localeCompare(b.numero));
            const tieneAlguno=psEtapa.some(p=>misProns.find(pr=>pr.partido_ko_id===p.id));
            if(!tieneAlguno)return null;
            return(
              <div key={etapa.id} style={{marginBottom:16}}>
                <div style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:800,letterSpacing:2,color:'var(--gold)',marginBottom:8,paddingBottom:4,borderBottom:'1px solid rgba(245,166,35,.2)'}}>{etapa.nombre.toUpperCase()}</div>
                {psEtapa.map(p=>{
                  const pr=misProns.find(x=>x.partido_ko_id===p.id);
                  if(!pr)return null;
                  const done=p.finalizado&&p.goles_a!==null;
                  const pts=pr.puntos_total||0;
                  return(
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,.04)',flexWrap:'wrap'}}>
                      <span style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--gm)',minWidth:32}}>{p.numero}</span>
                      <div style={{display:'flex',alignItems:'center',gap:4,flex:1,minWidth:160}}>
                        <Flag name={p.equipo_a} size={14}/>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700}}>{p.equipo_a||p.slot_a}</span>
                        <span style={{color:'var(--gm)',fontSize:11,margin:'0 4px'}}>vs</span>
                        <Flag name={p.equipo_b} size={14}/>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700}}>{p.equipo_b||p.slot_b}</span>
                      </div>
                      <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:700,color:'var(--white)'}}>{pr.pred_a}–{pr.pred_b}</span>
                      {pr.clasificado_pred&&<span style={{fontSize:10,color:'var(--gm)'}}>→{pr.clasificado_pred.split(' ')[0]}</span>}
                      {done&&<span style={{fontFamily:'Barlow Condensed',fontSize:12,color:'var(--gm)'}}>{p.goles_a}–{p.goles_b}</span>}
                      {done&&<span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:800,
                        color:pts>=5?'var(--gold)':pts>=3?'var(--green)':pts>0?'var(--blue)':'#FF6666',
                        background:pts>=5?'rgba(245,166,35,.1)':pts>=3?'rgba(74,219,138,.1)':'rgba(255,255,255,.05)',
                        padding:'1px 6px',borderRadius:4}}>
                        {pts>0?'+'+pts:'✗'}
                      </span>}
                    </div>
                  );
                })}
              </div>
            );
          })}
          {miPodio&&(
            <div style={{marginTop:8,background:'rgba(245,166,35,.06)',border:'1px solid rgba(245,166,35,.2)',borderRadius:8,padding:'10px 12px'}}>
              <div style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:800,letterSpacing:2,color:'var(--gold)',marginBottom:8}}>MI PODIO</div>
              {[['🥇 Campeón',miPodio.pred_campeon,miPodio.pts_campeon],['🥈 Subcampeón',miPodio.pred_subcampeon,miPodio.pts_subcampeon],['🥉 3er lugar',miPodio.pred_tercero,miPodio.pts_tercero]].map(([lbl,eq,pts])=>(
                <div key={lbl} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <span style={{fontSize:12}}>{lbl}:</span>
                  <Flag name={eq} size={14}/>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,flex:1}}>{eq||'—'}</span>
                  {pts>0&&<span style={{color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:800}}>+{pts}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* TODOS (solo post-cierre) */}
      {subTab==='todos'&&pPublicos&&(
        <div className="card">
          <div className="card-title">👥 Pronósticos de todos</div>
          {etapasOrden.map(etapa=>{
            const psEtapa=partidos.filter(p=>p.etapa_id===etapa.id&&p.finalizado).sort((a,b)=>a.numero.localeCompare(b.numero));
            if(!psEtapa.length) return null;
            return(
              <div key={etapa.id} style={{marginBottom:20}}>
                <div style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:800,letterSpacing:2,color:'var(--gold)',marginBottom:10,paddingBottom:4,borderBottom:'1px solid rgba(245,166,35,.2)'}}>{etapa.nombre.toUpperCase()}</div>
                {psEtapa.map(p=>{
                  if(!etapaEsPublica(etapa.id)) return null; // no revelar si etapa no cerró
                  const aprobados=participantes.filter(x=>x.aprobado);
                  return(
                    <div key={p.id} style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontFamily:'Barlow Condensed',color:'var(--gm)',marginBottom:5}}>
                        {p.numero} · {p.equipo_a||p.slot_a} <strong style={{color:'var(--gold)'}}>{p.goles_a}–{p.goles_b}</strong> {p.equipo_b||p.slot_b}
                        {p.clasificado&&<span style={{color:'var(--green)',marginLeft:6}}>→ {p.clasificado}</span>}
                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                        {aprobados.map(part=>{
                          const pr=pronosticos.find(x=>x.participante_ko_id===part.id&&x.partido_ko_id===p.id);
                          if(!pr) return null;
                          const pts=pr.puntos_total||0;
                          return(
                            <div key={part.id} style={{background:'rgba(255,255,255,.04)',borderRadius:6,padding:'4px 8px',display:'flex',alignItems:'center',gap:5,
                              border:`1px solid ${pts>=5?'rgba(245,166,35,.4)':pts>=3?'rgba(74,219,138,.3)':'rgba(255,255,255,.08)'}`}}>
                              <span style={{fontSize:10,color:'var(--gm)'}}>{part.nombre.split(' ')[0]}</span>
                              <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700}}>{pr.pred_a}–{pr.pred_b}</span>
                              <span style={{fontSize:10,fontWeight:700,color:pts>=5?'var(--gold)':pts>=3?'var(--green)':pts>0?'var(--blue)':'#FF6666'}}>
                                {pts>0?'+'+pts:'✗'}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* PODIO */}
      {subTab==='podio'&&(
        <div className="card">
          <div className="card-title">🏅 Pronósticos de Podio</div>
          {!pPublicos&&(
            <div className="alert al-inf" style={{marginBottom:12}}>Los pronósticos de podio de los demás se revelan cuando cierren los pronósticos de 16avos.</div>
          )}
          {(pPublicos?participantes.filter(p=>p.aprobado):[user]).map(part=>{
            const pod=podios.find(p=>p.participante_ko_id===part.id);
            if(!pod) return null;
            const total=(pod.pts_campeon||0)+(pod.pts_subcampeon||0)+(pod.pts_tercero||0);
            return(
              <div key={part.id} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:8,padding:'12px 14px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontWeight:700,fontSize:14}}>{part.nombre}</span>
                  {total>0&&<span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:800,color:'var(--gold)'}}>+{total} pts</span>}
                </div>
                {[['🥇',pod.pred_campeon,pod.pts_campeon],['🥈',pod.pred_subcampeon,pod.pts_subcampeon],['🥉',pod.pred_tercero,pod.pts_tercero]].map(([ic,eq,pts],i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                    <span style={{fontSize:14}}>{ic}</span>
                    <Flag name={eq} size={14}/>
                    <span style={{fontFamily:'Barlow Condensed',fontSize:13,flex:1}}>{eq||'—'}</span>
                    {pts>0&&<span style={{color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,fontSize:12}}>+{pts}</span>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ── TAB POSICIONES ───────────────────────────────────────
function TabPosiciones({participantes, pronosticos, partidos, podios, etapas}) {
