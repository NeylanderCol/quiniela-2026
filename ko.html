  const [vista, setVista] = useState('general');

  // Calcular puntos por participante con desglose
  function calcularPuntos(filtroEtapaId=null) {
    return participantes.filter(p=>p.aprobado).map(part => {
      let ptsMarcador=0, ptsClasificado=0, ptsPodio=0, pend=0;
      let c5=0, c4=0, c3=0, c0=0, cCls2=0, jugados=0;

      pronosticos.filter(pr=>pr.participante_ko_id===part.id).forEach(pr=>{
        const pa = partidos.find(x=>x.id===pr.partido_ko_id);
        if (!pa) return;
        if (filtroEtapaId && pa.etapa_id !== filtroEtapaId) return;
        if (!pa.finalizado || pa.goles_a===null) { pend++; return; }
        const pm = pr.puntos_marcador||0;
        const pc = pr.puntos_clasificado||0;
        ptsMarcador += pm;
        ptsClasificado += pc;
        jugados++;
        if (pm===5) c5++; else if (pm===4) c4++; else if (pm===3) c3++; else c0++;
        if (pc===2) cCls2++;
      });

      if (!filtroEtapaId) {
        const pod = podios.find(p=>p.participante_ko_id===part.id);
        if (pod) ptsPodio = (pod.pts_campeon||0)+(pod.pts_subcampeon||0)+(pod.pts_tercero||0);
      }

      return {...part, ptsMarcador, ptsClasificado, ptsPodio, pend, jugados,
        c5, c4, c3, c0, cCls2,
        total:ptsMarcador+ptsClasificado+ptsPodio};
    }).sort((a,b)=>b.total-a.total||b.ptsMarcador-a.ptsMarcador||b.c5-a.c5||b.c4-a.c4);
  }

  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);

  function TablaPos({rows, showPodio=false}) {
    return (
      <div style={{overflowX:'auto'}}>
        <table className="st-table">
          <thead><tr>
            <th>#</th>
            <th>Participante</th>
            <th style={{textAlign:'center'}}>Total</th>
            <th style={{textAlign:'center'}}>⭐<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>5pts</span></th>
            <th style={{textAlign:'center'}}>🎯<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>4pts</span></th>
            <th style={{textAlign:'center'}}>✓<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>3pts</span></th>
            <th style={{textAlign:'center'}}>✗<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>0pts</span></th>
            <th style={{textAlign:'center'}}>🏃<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>Clasif.</span></th>
            {showPodio && <th style={{textAlign:'center'}}>🏅<br/><span style={{fontSize:9,fontWeight:400,color:'var(--gm)'}}>Podio</span></th>}
            <th style={{textAlign:'center'}}>J</th>
            <th style={{textAlign:'center'}}>⏳</th>
          </tr></thead>
          <tbody>{rows.map((p,i)=>(
            <tr key={p.id}>
              <td><div className={`pos-b ${i===0?'p1':i===1?'p2':i===2?'p3':'px'}`}>{i+1}</div></td>
              <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{p.nombre}</td>
              <td style={{textAlign:'center'}}><span className="pts-big">{p.total}</span></td>
              <td style={{textAlign:'center',color:'var(--green)',fontWeight:700}}>{p.c5||0}</td>
              <td style={{textAlign:'center',color:'var(--gold)',fontWeight:700}}>{p.c4||0}</td>
              <td style={{textAlign:'center',color:'var(--blue)',fontWeight:700}}>{p.c3||0}</td>
              <td style={{textAlign:'center',color:'var(--gt)',fontWeight:700}}>{p.c0||0}</td>
              <td style={{textAlign:'center',color:'var(--green)',fontWeight:700}}>{p.cCls2||0}</td>
              {showPodio && <td style={{textAlign:'center',color:'#FFD700',fontWeight:700}}>{p.ptsPodio||0}</td>}
              <td style={{textAlign:'center',color:'var(--gm)',fontSize:11}}>{p.jugados||0}</td>
              <td style={{textAlign:'center',color:'var(--gm)'}}>{p.pend}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    );
  }

  if (participantes.filter(p=>p.aprobado).length === 0) {
    return <div className="card"><div className="empty" style={{padding:20}}>Sin participantes aprobados aún.</div></div>;
  }

  return (
    <div>
      <div className="adm-tabs">
        <button className={`btn btn-sm ${vista==='general'?'btn-p':'btn-s'}`} onClick={()=>setVista('general')}>🏆 KO General</button>
        {etapasOrden.map(e=>(
          <button key={e.id} className={`btn btn-sm ${vista===String(e.id)?'btn-p':'btn-s'}`} onClick={()=>setVista(String(e.id))}>{e.nombre}</button>
        ))}
      </div>
      <div className="card">
        {vista==='general' && <>
          <div className="card-title">🏆 Tabla KO General (marcador + clasificado + podio)</div>
          <TablaPos rows={calcularPuntos(null)} showPodio={true}/>
          <div style={{marginTop:12,padding:'10px 12px',background:'rgba(0,0,0,.2)',borderRadius:8,fontSize:11,color:'var(--gm)',lineHeight:1.9}}>
            <strong style={{color:'var(--gold)'}}>Puntuación KO:</strong> ⭐ Exacto = 5pts · 🎯 Ganador+dif = 4pts · ✓ Ganador/empate = 3pts · Clasifica correcto +2pts<br/>
            <strong style={{color:'var(--gold)'}}>Podio:</strong> Campeón +5 · Subcampeón +5 · 3er lugar +5
          </div>
        </>}
        {etapasOrden.map(e => vista===String(e.id) && (
          <div key={e.id}>
            <div className="card-title">{e.nombre} — Puntos de esta etapa</div>
            <TablaPos rows={calcularPuntos(e.id)} showPodio={false}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── TAB ADMIN ────────────────────────────────────────────
function TabAdmin({partidos, etapas, participantes, pronosticos, podios, partidosGrupos, onRefresh}) {
  const [authed, setAuthed] = useState(false);
  const [pass, setPass] = useState('');
  const [passErr, setPassErr] = useState(false);
  const [atab, setAtab] = useState('grupos');
  const [msg, setMsg] = useState(null);

  const showMsg = (t, type='success') => { setMsg({t,type}); setTimeout(()=>setMsg(null), 5000); };

  if (!authed) return (
    <div className="login-wrap">
      <div className="login-box">
        <div style={{fontSize:34,marginBottom:10}}>🔐</div>
        <h2>Panel Admin KO</h2>
        <p>Acceso restringido</p>
        {passErr && <div className="alert al-err">Contraseña incorrecta</div>}
        <input className="inp" type="password" placeholder="Contraseña" value={pass}
          onChange={e=>{setPass(e.target.value);setPassErr(false);}}
          onKeyDown={e=>{if(e.key==='Enter'){if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}}
          style={{marginBottom:10}}/>
        <button className="btn btn-p" style={{width:'100%',marginTop:6}}
          onClick={()=>{if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}>ENTRAR</button>
      </div>
    </div>
  );

  return (
    <div>
      {msg && <div className={`alert al-${msg.type==='success'?'ok':msg.type==='error'?'err':msg.type==='warn'?'warn':'inf'}`}>{msg.t}</div>}
      <div className="adm-tabs">
        {[['grupos','🌍 Grupos'],['terceros','3° Lugar'],['resultados',`⚽ Resultados`],['fixture_adm','🗂 Fixture'],['participantes_adm','👥 Participantes'],['etapas_adm','⏱ Etapas']].map(([id,lbl])=>(
          <button key={id} className={`btn btn-sm ${atab===id?'btn-p':'btn-s'}`} onClick={()=>setAtab(id)}>{lbl}</button>
        ))}
      </div>

      {atab==='grupos' && <AdminGrupos partidosGrupos={partidosGrupos} showMsg={showMsg} onRefresh={onRefresh}/>}
      {atab==='terceros' && <AdminTerceros partidosGrupos={partidosGrupos} showMsg={showMsg} onRefresh={onRefresh}/>}
      {atab==='resultados' && <AdminResultados partidos={partidos} etapas={etapas} pronosticos={pronosticos} podios={podios} showMsg={showMsg} onRefresh={onRefresh}/>}
      {atab==='fixture_adm' && <AdminFixture partidos={partidos} showMsg={showMsg} onRefresh={onRefresh}/>}
      {atab==='participantes_adm' && <AdminParticipantes participantes={participantes} podios={podios} showMsg={showMsg} onRefresh={onRefresh}/>}
      {atab==='etapas_adm' && <AdminEtapas etapas={etapas} partidos={partidos} showMsg={showMsg} onRefresh={onRefresh}/>}
    </div>
  );
}

// ── ADMIN: GRUPOS (live desde partidos, solo confirmar) ───────
function AdminGrupos({partidosGrupos, showMsg, onRefresh}) {
  const [bgData, setBgData] = useState({});
  const [saving, setSaving] = useState(null);
  const [loadingBg, setLoadingBg] = useState(true);
  // Por grupo: orden local que el admin puede ajustar
  const [ordenLocal, setOrdenLocal] = useState({}); // grupo -> [eq0,eq1,eq2,eq3]
  const [modoEdicion, setModoEdicion] = useState({}); // grupo -> bool

  useEffect(()=>{
    sb('bracket_grupos?select=*&order=grupo').then(rows=>{
      const m={}; rows.forEach(r=>m[r.grupo]=r);
      setBgData(m); setLoadingBg(false);
    }).catch(e=>{showMsg('Error: '+e.message,'error');setLoadingBg(false);});
  },[]);

  // Calcular standings en vivo
  const standings = useMemo(()=>{
    const g={};
    partidosGrupos.forEach(p=>{
      if(!g[p.grupo])g[p.grupo]={};
      [p.equipo_a,p.equipo_b].forEach(eq=>{
        if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0,gn:0,e:0,pe:0};
      });
      if(!p.finalizado||p.goles_a===null)return;
      const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
      a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
      if(p.goles_a>p.goles_b){a.pts+=3;a.gn++;b.pe++;}
      else if(p.goles_b>p.goles_a){b.pts+=3;b.gn++;a.pe++;}
      else{a.pts++;b.pts++;a.e++;b.e++;}
    });
    const result={};
    Object.keys(g).sort().forEach(grupo=>{
      result[grupo]=[...Object.entries(g[grupo])
        .map(([n,s])=>({n,...s,dg:s.gf-s.gc}))
        .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf)];
      result[grupo].completo=result[grupo].every(e=>e.j===3);
      result[grupo].jugados=result[grupo][0]?.j||0;
    });
    return result;
  },[partidosGrupos]);

  // Detectar empates técnicos (mismo pts+dg+gf entre equipos adyacentes)
  function hayEmpate(tabla) {
    if(!tabla||tabla.length<2) return false;
    for(let i=0;i<tabla.length-1;i++){
      const a=tabla[i],b=tabla[i+1];
      if(a.pts===b.pts&&a.dg===b.dg&&a.gf===b.gf) return true;
    }
    return false;
  }

  // Obtener orden activo para un grupo (local si existe, si no standings)
  function getOrden(grupo) {
    return ordenLocal[grupo] || (standings[grupo]||[]).map(e=>e.n);
  }

  // Mover equipo arriba/abajo en el orden local
  function moverEquipo(grupo, idx, dir) {
    const orden = [...getOrden(grupo)];
    const newIdx = idx+dir;
    if(newIdx<0||newIdx>=orden.length) return;
    [orden[idx],orden[newIdx]]=[orden[newIdx],orden[idx]];
    setOrdenLocal(prev=>({...prev,[grupo]:orden}));
  }

  // Resetear orden local al calculado
  function resetOrden(grupo) {
    setOrdenLocal(prev=>{const n={...prev};delete n[grupo];return n;});
  }

  // slotMap: grupo -> {posicion -> 'PXX_a/b'}
  const slotMap = {
    A:{0:'P79_a',1:'P73_a'},
    B:{0:'P85_a',1:'P73_b'},
    C:{0:'P76_a',1:'P75_b'},
    D:{0:'P81_a',1:'P88_a'},
    E:{0:'P74_a',1:'P78_a'},
    F:{0:'P75_a',1:'P76_b'},
    G:{0:'P82_a',1:'P88_b'},
    H:{0:'P84_a',1:'P86_b'},
    I:{0:'P77_a',1:'P78_b'},
    J:{0:'P86_a',1:'P84_b'},
    K:{0:'P87_a',1:'P83_a'},
    L:{0:'P80_a',1:'P83_b'},
  };

  async function confirmarGrupo(grupo) {
    const tablaBase = standings[grupo];
    if(!tablaBase||tablaBase.length<4){showMsg('No hay datos para el Grupo '+grupo,'error');return;}
    if(!tablaBase.completo){
      if(!confirm(`El Grupo ${grupo} aún no terminó (${tablaBase.jugados}/3 partidos). ¿Confirmar provisional?`)) return;
    }
    const orden = getOrden(grupo);
    if(orden.length<4){showMsg('Orden incompleto','error');return;}

    // Construir objetos completos en el orden elegido
    const statsMap={};
    tablaBase.forEach(e=>statsMap[e.n]=e);
    const [p1n,p2n,p3n,p4n]=orden;

    setSaving(grupo);
    try {
      await sb(`bracket_grupos?grupo=eq.${grupo}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({primero:p1n,segundo:p2n,tercero:p3n,cuarto:p4n,confirmado:true})});

      // Actualizar partidos_ko
      const slotsGrupo=slotMap[grupo]||{};
      const equiposPorPos=[p1n,p2n,p3n,p4n];
      for(const [posStr,target] of Object.entries(slotsGrupo)){
        const equipo=equiposPorPos[parseInt(posStr)];
        if(!equipo) continue;
        const [num,campo]=target.split('_');
        await sb(`partidos_ko?numero=eq.${num}`,{method:'PATCH',prefer:'return=minimal',
          body:JSON.stringify(campo==='a'?{equipo_a:equipo}:{equipo_b:equipo})});
      }

      setBgData(prev=>({...prev,[grupo]:{...prev[grupo],primero:p1n,segundo:p2n,tercero:p3n,cuarto:p4n,confirmado:true}}));
      setModoEdicion(prev=>({...prev,[grupo]:false}));
      showMsg(`✓ Grupo ${grupo}: ${p1n} (1°) · ${p2n} (2°) · ${p3n} (3°)`);
      onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
    setSaving(null);
  }

  async function desconfirmarGrupo(grupo) {
    if(!confirm(`¿Editar Grupo ${grupo}? Se quitará la confirmación y podrás ajustar el orden.`)) return;
    setSaving(grupo);
    try {
      await sb(`bracket_grupos?grupo=eq.${grupo}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({confirmado:false})});
      setBgData(prev=>({...prev,[grupo]:{...prev[grupo],confirmado:false}}));
      // Inicializar orden local con lo que estaba confirmado
      const bg=bgData[grupo];
      if(bg?.primero) setOrdenLocal(prev=>({...prev,[grupo]:[bg.primero,bg.segundo,bg.tercero,bg.cuarto]}));
      setModoEdicion(prev=>({...prev,[grupo]:true}));
      showMsg(`Grupo ${grupo} listo para editar`,'warn');
      onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
    setSaving(null);
  }

  if(loadingBg) return <div className="loading"><div className="spinner"/></div>;
  const totalConfirmados=Object.values(bgData).filter(d=>d.confirmado).length;

  return (
    <div className="card">
      <div className="card-title">🌍 Confirmar Tabla de Grupos</div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div style={{flex:1,background:'rgba(0,0,0,.2)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'var(--gm)'}}>
          Confirmados: <strong style={{color:totalConfirmados===12?'var(--green)':'var(--gold)',fontSize:16,fontFamily:'Barlow Condensed'}}>{totalConfirmados}/12</strong>
          {totalConfirmados===12&&<span style={{color:'var(--green)',marginLeft:8}}>✓ Listo para asignar terceros</span>}
        </div>
      </div>

      <div className="grupos-grid">
        {Object.keys(EQUIPOS_GRUPOS).sort().map(grupo=>{
          const tablaBase=standings[grupo]||[];
          const bg=bgData[grupo]||{};
          const confirmado=bg.confirmado;
          const completo=tablaBase.completo;
          const orden=getOrden(grupo);
          const statsMap={};
          tablaBase.forEach(e=>statsMap[e.n]=e);
          const tieneEmpate=hayEmpate(tablaBase);
          const ordenModificado=JSON.stringify(orden)!==JSON.stringify(tablaBase.map(e=>e.n));
          const enEdicion=modoEdicion[grupo]||false;

          return (
            <div key={grupo} className={`grupo-card ${confirmado?'confirmado':''}`}>
              {/* Header */}
              <div className="grupo-header">
                <span className="grupo-label">GRUPO {grupo}</span>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{fontSize:9,color:completo?'var(--green)':'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:1}}>
                    {completo?'FINAL':`${tablaBase.jugados||0}/3`}
                  </span>
                  {tieneEmpate&&!confirmado&&(
                    <span style={{fontSize:8,background:'rgba(255,100,100,.2)',color:'#FF9999',padding:'1px 5px',borderRadius:3,fontFamily:'Barlow Condensed',fontWeight:700}}>
                      EMPATE
                    </span>
                  )}
                  {confirmado&&<span className="grupo-ok">✓</span>}
                </div>
              </div>

              {/* Alerta de empate técnico */}
              {tieneEmpate&&!confirmado&&(
                <div style={{background:'rgba(255,100,100,.08)',border:'1px solid rgba(255,100,100,.25)',borderRadius:5,padding:'5px 8px',marginBottom:6,fontSize:10,color:'#FF9999',lineHeight:1.5}}>
                  ⚠️ Empate técnico detectado. Usa ↑↓ para ajustar el orden según fair play o ranking FIFA.
                </div>
              )}

              {/* Tabla con flechas de reordenamiento */}
              {tablaBase.length>0 ? (
                <div>
                  {orden.map((nombre,i)=>{
                    const eq=statsMap[nombre]||{pts:0,dg:0,gf:0};
                    const puedeSubir=i>0&&!confirmado;
                    const puedeBajar=i<orden.length-1&&!confirmado;
                    // Detectar si este equipo está empatado técnicamente con algún adyacente
                    const eqPrev=i>0?statsMap[orden[i-1]]:null;
                    const eqNext=i<orden.length-1?statsMap[orden[i+1]]:null;
                    const empatadoArriba=eqPrev&&eq.pts===eqPrev.pts&&eq.dg===eqPrev.dg&&eq.gf===eqPrev.gf;
                    const empatadoAbajo=eqNext&&eq.pts===eqNext.pts&&eq.dg===eqNext.dg&&eq.gf===eqNext.gf;
                    const empatado=empatadoArriba||empatadoAbajo;

                    return (
                      <div key={nombre} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 0',
                        borderBottom:i<3?'1px solid rgba(255,255,255,.05)':'none',
                        background:empatado&&!confirmado?'rgba(255,100,100,.04)':i===2?'rgba(245,166,35,.04)':'transparent',
                        borderRadius:4}}>
                        {/* Flechas solo si no confirmado */}
                        {!confirmado ? (
                          <div style={{display:'flex',flexDirection:'column',gap:1,flexShrink:0}}>
                            <button onClick={()=>moverEquipo(grupo,i,-1)} disabled={!puedeSubir}
                              style={{background:'none',border:'none',cursor:puedeSubir?'pointer':'default',
                                color:puedeSubir?(empatadoArriba?'#FF9999':'var(--gm)'):'rgba(255,255,255,.15)',
                                fontSize:9,lineHeight:1,padding:'1px 2px'}}>▲</button>
                            <button onClick={()=>moverEquipo(grupo,i,1)} disabled={!puedeBajar}
                              style={{background:'none',border:'none',cursor:puedeBajar?'pointer':'default',
                                color:puedeBajar?(empatadoAbajo?'#FF9999':'var(--gm)'):'rgba(255,255,255,.15)',
                                fontSize:9,lineHeight:1,padding:'1px 2px'}}>▼</button>
                          </div>
                        ):(
                          <div style={{width:14}}/>
                        )}
                        <span style={{fontFamily:'Barlow Condensed',fontSize:11,fontWeight:800,
                          color:i===0?'var(--gold)':i===1?'var(--green)':i===2?'rgba(245,166,35,.6)':'var(--gt)',
                          minWidth:14}}>{i+1}°</span>
                        <Flag name={nombre} size={14}/>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700,flex:1,
                          color:i<2?'var(--white)':i===2?'rgba(255,255,255,.65)':'var(--gt)'}}>{nombre}</span>
                        <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:800,
                          color:i<2?'var(--gold)':'var(--gm)',minWidth:22}}>{eq.pts}p</span>
                        <span style={{fontSize:10,color:eq.dg>0?'var(--green)':eq.dg<0?'#FF6666':'var(--gm)',minWidth:24,textAlign:'right'}}>
                          {eq.dg>0?'+':''}{eq.dg}
                        </span>
                      </div>
                    );
                  })}
                </div>
              ):(
                <div style={{fontSize:11,color:'var(--gm)',padding:'8px 0',fontStyle:'italic'}}>Sin resultados aún</div>
              )}

              {/* Botones */}
              <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                {!confirmado ? (
                  <>
                    {ordenModificado&&(
                      <button className="btn btn-s btn-xs" onClick={()=>resetOrden(grupo)} title="Volver al orden calculado automáticamente">
                        ↺ Reset
                      </button>
                    )}
                    <button className="btn btn-p btn-sm" style={{flex:1}}
                      onClick={()=>confirmarGrupo(grupo)} disabled={saving===grupo||tablaBase.length<4}>
                      {saving===grupo?'Guardando...`':`✓ CONFIRMAR`}
                    </button>
                  </>
                ):(
                  <>
                    <div style={{flex:1,fontSize:10,color:'var(--green)',display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
                      ✓ {bg.primero} · {bg.segundo} · {bg.tercero}
                    </div>
                    <button className="btn btn-s btn-xs" onClick={()=>desconfirmarGrupo(grupo)} disabled={saving===grupo}>
                      ✏️ Editar
                    </button>
                  </>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}



// ── ADMIN: TERCEROS v2 — tabla reordenable + asignación de slots ──────
function AdminTerceros({partidosGrupos, showMsg, onRefresh}) {
  const [bgData, setBgData] = React.useState({});
  const [seleccionados, setSeleccionados] = React.useState({});
  const [ordenManual, setOrdenManual] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [loadingBg, setLoadingBg] = React.useState(true);
  const [dragIdx, setDragIdx] = React.useState(null);
  const [dragOver, setDragOver] = React.useState(null);

  React.useEffect(()=>{
    sb('bracket_grupos?select=*&order=grupo').then(rows=>{
      const m={}; rows.forEach(r=>m[r.grupo]=r);
      setBgData(m); setLoadingBg(false);
    }).catch(e=>{showMsg('Error: '+e.message,'error');setLoadingBg(false);});
  },[]);

  const gruposConfirmados = Object.values(bgData).filter(d=>d.confirmado).length;

  const tercerosAuto = React.useMemo(()=>{
    const g={};
    partidosGrupos.forEach(p=>{
      if(!g[p.grupo])g[p.grupo]={};
      [p.equipo_a,p.equipo_b].forEach(eq=>{
        if(eq&&!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0};
      });
      if(!p.finalizado||p.goles_a===null)return;
      const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
      if(!a||!b)return;
      a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
      if(p.goles_a>p.goles_b)a.pts+=3;else if(p.goles_b>p.goles_a)b.pts+=3;else{a.pts++;b.pts++;}
    });
    const lista=[];
    Object.keys(g).sort().forEach(grupo=>{
      if(!bgData[grupo]?.confirmado)return;
      const tabla=Object.entries(g[grupo]).map(([n,s])=>({n,...s,dg:s.gf-s.gc})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
      if(tabla.length>=3) lista.push({grupo,equipo:tabla[2].n,pts:tabla[2].pts,dg:tabla[2].dg,gf:tabla[2].gf,j:tabla[2].j});
    });
    return lista.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  },[partidosGrupos,bgData]);

  const terceros = ordenManual || tercerosAuto;

  // Greedy slot assignment: proceso más restrictivo primero para evitar duplicados
  const sugerencia = React.useMemo(()=>{
    const asignados={};const slotsUsados=new Set();const gruposUsados=new Set();
    const slotsOrdenados=Object.entries(SLOTS_TERCEROS).sort((a,b)=>a[1].length-b[1].length);
    for(const [slot,grupos] of slotsOrdenados){
      if(Object.keys(asignados).length>=8)break;
      const cand=terceros.find(t=>grupos.includes(t.grupo)&&!slotsUsados.has(slot)&&!gruposUsados.has(t.grupo));
      if(cand){asignados[cand.grupo]=slot;slotsUsados.add(slot);gruposUsados.add(cand.grupo);}
    }
    return asignados;
  },[terceros]);

  React.useEffect(()=>{
    if(Object.keys(sugerencia).length>0&&Object.keys(seleccionados).length===0)
      setSeleccionados(sugerencia);
  },[sugerencia]);

  function toggleSlot(grupo,slot){
    setSeleccionados(prev=>{
      const nuevo={...prev};
      Object.keys(nuevo).forEach(g=>{ if(nuevo[g]===slot&&g!==grupo) delete nuevo[g]; });
      if(nuevo[grupo]===slot) delete nuevo[grupo]; else nuevo[grupo]=slot;
      return nuevo;
    });
  }

  function onDragStart(i){setDragIdx(i);}
  function onDragEnter(i){setDragOver(i);}
  function onDragEnd(){
    if(dragIdx===null||dragOver===null||dragIdx===dragOver){setDragIdx(null);setDragOver(null);return;}
    const arr=[...terceros];
    const [moved]=arr.splice(dragIdx,1);
    arr.splice(dragOver,0,moved);
    setOrdenManual(arr);setSeleccionados({});
    setDragIdx(null);setDragOver(null);
  }
  function moverArriba(i){
    if(i===0)return;
    const arr=[...terceros];[arr[i-1],arr[i]]=[arr[i],arr[i-1]];
    setOrdenManual(arr);setSeleccionados({});
  }
  function moverAbajo(i){
    if(i>=terceros.length-1)return;
    const arr=[...terceros];[arr[i],arr[i+1]]=[arr[i+1],arr[i]];
    setOrdenManual(arr);setSeleccionados({});
  }

  const slotCount={};
  Object.values(seleccionados).forEach(s=>{slotCount[s]=(slotCount[s]||0)+1;});
  const hayConflicto=Object.values(slotCount).some(c=>c>1);
  const totalSel=Object.keys(seleccionados).length;

  async function confirmarTerceros(){
    if(totalSel!==8){showMsg('Asigna exactamente 8 terceros','error');return;}
    if(hayConflicto){showMsg('Hay conflicto de slots — revisa','error');return;}
    setSaving(true);
    try{
      for(const [grupo,slot] of Object.entries(seleccionados)){
        const t=terceros.find(x=>x.grupo===grupo);
        if(!t)continue;
        await sb(`partidos_ko?numero=eq.${slot}`,{method:'PATCH',prefer:'return=minimal',
          body:JSON.stringify({equipo_b:t.equipo})});
      }
      await sb('etapas_ko?orden=eq.1',{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({abierta:true})});
      showMsg('✓ 8 terceros asignados — 16avos ABIERTOS');onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
    setSaving(false);
  }

  if(loadingBg) return <div className="loading"><div className="spinner"/></div>;
  if(gruposConfirmados<12) return(
    <div className="card">
      <div className="card-title">🥉 Mejores Terceros</div>
      <div className="alert al-warn">Confirma los 12 grupos primero ({gruposConfirmados}/12 listos).</div>
    </div>
  );

  return(
    <div className="card">
      <div className="card-title">🥉 Asignar 8 Mejores Terceros → Abre 16avos</div>
      <div className="alert al-inf" style={{marginBottom:10}}>

// Recibe partidos RAW (de BD, sin resolver) para mostrar y editar valores reales
function AdminFixture({partidos, showMsg, onRefresh}) {
  const [edits, setEdits] = React.useState({});
  const [saving, setSaving] = React.useState(null);
  const [filtroEtapa, setFiltroEtapa] = React.useState('1');
  const [limpiando, setLimpiando] = React.useState(false);

  const ETAPA_LABEL = {1:'16avos',2:'8vos',3:'4tos',4:'Semis',5:'3er Puesto',6:'Final'};
  const ETAPA_COLOR = {1:'var(--blue)',2:'var(--gold)',3:'#FF9800',4:'var(--red)',5:'#9C27B0',6:'var(--green)'};

  const partOrden = [...partidos].sort((a,b)=>parseInt(a.numero.replace('P',''))-parseInt(b.numero.replace('P','')));
  const etapaIds  = [...new Set(partidos.map(p=>String(p.etapa_id)))].sort((a,b)=>Number(a)-Number(b));
  const filtrados  = filtroEtapa==='TODOS' ? partOrden : partOrden.filter(p=>String(p.etapa_id)===filtroEtapa);

  // Los valores mostrados son siempre de BD (equipo_a/b real), no los resueltos
  function getVal(p, campo) {
    return edits[p.id]?.[campo] !== undefined ? edits[p.id][campo] : (p[campo] ?? '');
  }
  function setVal(p, campo, val) {
    setEdits(prev => ({...prev, [p.id]: {...prev[p.id], [campo]: val}}));
  }
  function hasChanges(p) {
    if (!edits[p.id]) return false;
    return Object.entries(edits[p.id]).some(([k,v]) => String(p[k] ?? '') !== String(v));
  }
  function cancelar(id) {
    setEdits(prev => { const n={...prev}; delete n[id]; return n; });
  }

  async function guardar(p) {
    if (!hasChanges(p)) return;
    const changes = edits[p.id];
    const eqA = changes.equipo_a !== undefined ? changes.equipo_a : p.equipo_a;
    const eqB = changes.equipo_b !== undefined ? changes.equipo_b : p.equipo_b;
    if (eqA && eqB && eqA.trim() === eqB.trim()) {
      showMsg('Equipo A y B no pueden ser el mismo', 'error'); return;
    }
    setSaving(p.id);
    try {
      const payload = {};
      Object.entries(changes).forEach(([k,v]) => { payload[k] = v === '' ? null : v; });
      await sb(`partidos_ko?id=eq.${p.id}`, {method:'PATCH', prefer:'return=minimal', body:JSON.stringify(payload)});
      showMsg('✓ ' + p.numero + ' guardado');
      cancelar(p.id);
      onRefresh();
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
    setSaving(null);
  }

  async function intercambiar(p) {
    if (!p.equipo_a && !p.equipo_b) { showMsg('No hay equipos en BD para intercambiar', 'warn'); return; }
    const a = p.equipo_a || '(vacío)';
    const b = p.equipo_b || '(vacío)';
    if (!confirm('¿Intercambiar ' + a + ' ↔ ' + b + '? Esto actualiza la BD directamente.')) return;
    setSaving(p.id);
    try {
      await sb(`partidos_ko?id=eq.${p.id}`, {method:'PATCH', prefer:'return=minimal',
        body: JSON.stringify({equipo_a: p.equipo_b || null, equipo_b: p.equipo_a || null})});
      showMsg('✓ ' + p.numero + ': lados intercambiados');
      onRefresh();
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
    setSaving(null);
  }

  async function limpiarEstimaciones() {
    const p16 = partidos.filter(p => p.etapa_id === 1 && !p.finalizado);
    if (!p16.length) { showMsg('No hay 16avos pendientes que limpiar', 'warn'); return; }
    if (!confirm('¿Borrar equipo_a y equipo_b de los ' + p16.length + ' partidos de 16avos sin resultado? El bracket los calculará en vivo desde los grupos.')) return;
    setLimpiando(true);
    try {
      for (const p of p16)
        await sb(`partidos_ko?id=eq.${p.id}`, {method:'PATCH', prefer:'return=minimal',
          body: JSON.stringify({equipo_a: null, equipo_b: null})});
      showMsg('✓ ' + p16.length + ' partidos limpiados — el bracket calcula en vivo');
      onRefresh();
    } catch(e) { showMsg('Error: ' + e.message, 'error'); }
    setLimpiando(false);
  }

  const hay16sinFinalizar = partidos.some(p => p.etapa_id === 1 && !p.finalizado && (p.equipo_a || p.equipo_b));

  return (
    <div>
      {/* Aviso explicativo */}
      <div className="alert al-inf" style={{marginBottom:12}}>
        <strong>Para qué sirve esta pantalla:</strong> permite corregir el equipo, la fecha o la hora de cualquier partido KO si la BD tiene datos incorrectos.
        <br/>Los <strong>16avos de final</strong> no necesitan equipos en BD — el bracket y el calendario los calculan en vivo desde los grupos.
        Si ves estimaciones antiguas aquí, usa el botón rojo para borrarlas.
      </div>

      {/* Filtros de etapa */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
        {['TODOS',...etapaIds].map(id=>(
          <button key={id}
            className={'btn btn-sm ' + (filtroEtapa===id ? 'btn-p' : 'btn-s')}
            onClick={()=>setFiltroEtapa(id)}>
            {id==='TODOS' ? 'Todos' : (ETAPA_LABEL[Number(id)] || 'Etapa '+id)}
          </button>
        ))}
        {hay16sinFinalizar && (
          <button onClick={limpiarEstimaciones} disabled={limpiando}
            style={{marginLeft:'auto',background:'rgba(255,100,100,.15)',
              border:'1px solid rgba(255,100,100,.4)',borderRadius:6,
              color:'#FF8888',cursor:'pointer',fontSize:12,padding:'6px 14px',
              fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>
            {limpiando ? 'Limpiando...' : '🧹 Limpiar estimaciones 16avos'}
          </button>
        )}
      </div>

      {/* Tarjetas por partido */}
      {filtrados.map(p => {
        const changed = hasChanges(p);
        const isSaving = saving === p.id;
        const etColor = ETAPA_COLOR[p.etapa_id] || 'var(--gm)';
        const eqAval = getVal(p, 'equipo_a');
        const eqBval = getVal(p, 'equipo_b');

        return (
          <div key={p.id} style={{
            background: p.finalizado ? 'rgba(74,219,138,.04)' : changed ? 'rgba(245,166,35,.05)' : 'rgba(255,255,255,.03)',
            border: '1px solid ' + (p.finalizado ? 'rgba(74,219,138,.2)' : changed ? 'rgba(245,166,35,.3)' : 'rgba(255,255,255,.08)'),
            borderRadius:10, padding:'12px 14px', marginBottom:8, transition:'all .2s'
          }}>

            {/* Header: número + etapa + estado */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
              <span style={{fontFamily:'Barlow Condensed',fontSize:15,fontWeight:800,color:'var(--gold)'}}>{p.numero}</span>
              <span style={{background:etColor,color:'#000',fontSize:9,fontWeight:800,
                fontFamily:'Barlow Condensed',letterSpacing:1,padding:'2px 7px',borderRadius:3,opacity:.85}}>
                {ETAPA_LABEL[p.etapa_id]||''}
              </span>
              <span style={{fontSize:11,color:'var(--gm)'}}>{p.fecha} · {p.hora} IQ</span>
              {p.finalizado && <span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>✓ Finalizado</span>}
              {changed && !isSaving && <span style={{fontSize:10,color:'var(--gold)',fontWeight:700}}>● Cambios sin guardar</span>}
              {isSaving && <span style={{fontSize:10,color:'var(--gm)'}}>Guardando...</span>}
            </div>

            {/* Equipos: campo A — botón intercambiar — campo B */}
            <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8,alignItems:'start',marginBottom:10}}>

              {/* Equipo A */}
              <div>
                <div style={{fontSize:9,color:'var(--gt)',fontStyle:'italic',marginBottom:4,lineHeight:1.3}}>{p.slot_a}</div>
                <div style={{display:'flex',alignItems:'center',gap:6,
                  background:'rgba(0,0,0,.25)',borderRadius:7,padding:'8px 10px',
                  border:'1px solid rgba(255,255,255,.1)'}}>
                  <Flag name={eqAval} size={18}/>
                  <input className="inp" style={{flex:1,fontSize:13,padding:'2px 0',
                    background:'none',border:'none',color:'#fff',minWidth:0}}
                    value={eqAval}
                    onChange={e=>setVal(p,'equipo_a',e.target.value)}
                    placeholder="— sin equipo —"/>
                </div>
              </div>

              {/* Botón intercambiar */}
              <div style={{paddingTop:22,textAlign:'center'}}>
                <button onClick={()=>intercambiar(p)} disabled={isSaving||(!p.equipo_a&&!p.equipo_b)}
                  title="Intercambiar A ↔ B en BD"
                  style={{background:'rgba(100,150,255,.15)',border:'1px solid rgba(100,150,255,.3)',
                    borderRadius:6,color:'#AAC0FF',cursor:'pointer',fontSize:16,
                    width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',
                    opacity:(isSaving||(!p.equipo_a&&!p.equipo_b))?.4:1}}>
                  ↔
                </button>
              </div>

              {/* Equipo B */}
              <div>
                <div style={{fontSize:9,color:'var(--gt)',fontStyle:'italic',marginBottom:4,lineHeight:1.3}}>{p.slot_b}</div>
                <div style={{display:'flex',alignItems:'center',gap:6,
                  background:'rgba(0,0,0,.25)',borderRadius:7,padding:'8px 10px',
                  border:'1px solid rgba(255,255,255,.1)'}}>
                  <Flag name={eqBval} size={18}/>
                  <input className="inp" style={{flex:1,fontSize:13,padding:'2px 0',
                    background:'none',border:'none',color:'#fff',minWidth:0}}
                    value={eqBval}
                    onChange={e=>setVal(p,'equipo_b',e.target.value)}
                    placeholder="— sin equipo —"/>
                </div>
              </div>
            </div>

            {/* Fecha y hora + acciones */}
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <label style={{fontSize:10,color:'var(--gm)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>FECHA</label>
                <input className="inp" type="date" style={{fontSize:12,padding:'4px 8px',width:130}}
                  value={getVal(p,'fecha')}
                  onChange={e=>setVal(p,'fecha',e.target.value)}/>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <label style={{fontSize:10,color:'var(--gm)',fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:.5}}>HORA IQ</label>
                <input className="inp" type="time" style={{fontSize:12,padding:'4px 8px',width:90}}
                  value={getVal(p,'hora')}
                  onChange={e=>setVal(p,'hora',e.target.value)}/>
              </div>
              <div style={{flex:1}}/>
              {changed && (
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-s btn-sm" onClick={()=>cancelar(p.id)}>Cancelar</button>
                  <button className="btn btn-p btn-sm" onClick={()=>guardar(p)} disabled={isSaving}>
                    {isSaving ? 'Guardando...' : '✓ Guardar'}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {filtrados.length === 0 && (
        <div style={{textAlign:'center',padding:30,color:'var(--gm)',fontSize:13}}>
          No hay partidos en esta etapa.
        </div>
      )}
    </div>
  );
}




// ── ADMIN: RESULTADOS KO ──────────────────────────────────
function AdminResultados({partidos, etapas, pronosticos, podios, showMsg, onRefresh}) {
  const [step, setStep] = useState(0);
  const [selId, setSelId] = useState(null);
  const [gA, setGA] = useState('');
  const [gB, setGB] = useState('');
  const [prorroga, setProrroga] = useState(false);
  const [penales, setPenales] = useState(false);
  const [clasificado, setClasificado] = useState('');
  const [filtroEtapa, setFiltroEtapa] = useState('TODOS');
  const [editId, setEditId] = useState(null);
  const [editA, setEditA] = useState('');
  const [editB, setEditB] = useState('');
  const [editProrroga, setEditProrroga] = useState(false);
  const [editPenales, setEditPenales] = useState(false);
  const [editClasificado, setEditClasificado] = useState('');

  const etapaMap = useMemo(()=>{const m={};etapas.forEach(e=>m[e.id]=e);return m;},[etapas]);

  async function propagarResultado(partido, clasificadoEquipo) {
    // Buscar partidos que usan este partido como slot_origen
    const numero = partido.numero;
    const siguiente = partidos.filter(p=>p.slot_origen_a===numero||p.slot_origen_b===numero);
    for (const sig of siguiente) {
      const updates = {};
      const esPerdedor = sig.slot_a?.startsWith('Per.') || sig.slot_b?.startsWith('Per.');
      // Para P103 (3er puesto): usar perdedor
      if (sig.numero==='P103') {
        const perdedor = clasificadoEquipo===partido.equipo_a ? partido.equipo_b : partido.equipo_a;
        if (sig.slot_origen_a===numero) updates.equipo_a = perdedor;
        if (sig.slot_origen_b===numero) updates.equipo_b = perdedor;
      } else {
        if (sig.slot_origen_a===numero) updates.equipo_a = clasificadoEquipo;
        if (sig.slot_origen_b===numero) updates.equipo_b = clasificadoEquipo;
      }
      if (Object.keys(updates).length>0) {
        await sb(`partidos_ko?id=eq.${sig.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify(updates)});
      }
    }
  }

  async function recalcularPartido(pid, ra, rb, clasificadoReal) {
    if (!confirm('¿Recalcular puntos de este partido? Sobreescribe los puntos actuales.')) return;
    try {
      await calcularPuntosPartido(pid, ra, rb, clasificadoReal);
      showMsg('✓ Puntos recalculados correctamente');
      onRefresh();
    } catch(e) { showMsg('Error: '+e.message,'error'); }
  }

  async function calcularPuntosPartido(pid, ra, rb, clasificadoReal) {
    const prons = pronosticos.filter(x=>x.partido_ko_id===pid);
    for (const pr of prons) {
      const ptsMarcador = calcPtsKO(pr.pred_a,pr.pred_b,ra,rb);
      const clasPred = pr.clasificado_pred;
      const ptsClasificado = clasPred && clasificadoReal && clasPred===clasificadoReal ? 2 : 0;
      await sb(`pronosticos_ko?id=eq.${pr.id}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({puntos_marcador:ptsMarcador,puntos_clasificado:ptsClasificado,puntos_total:ptsMarcador+ptsClasificado})});
    }
  }

  async function guardar() {
    if (!selId||gA===''||gB==='') { showMsg('Completa goles y clasificado','error'); return; }
    const ra=parseInt(gA), rb=parseInt(gB);
    if (isNaN(ra)||isNaN(rb)||ra<0||rb<0) { showMsg('Goles inválidos','error'); return; }
    const partido = partidos.find(p=>p.id===selId);
    // Inferir clasificado si no hay empate
    let clasFinal = clasificado;
    if (!clasFinal) {
      if (ra>rb) clasFinal=partido.equipo_a;
      else if (rb>ra) clasFinal=partido.equipo_b;
      else { showMsg('Empate: debes seleccionar quién clasifica','error'); return; }
    }
    try {
      await sb(`partidos_ko?id=eq.${selId}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({goles_a:ra,goles_b:rb,hubo_prorroga:prorroga,hubo_penales:penales,clasificado:clasFinal,finalizado:true})});
      await calcularPuntosPartido(selId,ra,rb,clasFinal);
      await propagarResultado({...partido,goles_a:ra,goles_b:rb},clasFinal);
      // Verificar si todos los partidos de la etapa actual están terminados
      // Si sí, abrir la siguiente etapa automáticamente
      const etapaActualId = selPartido?.etapa_id;
      if(etapaActualId){
        const partidosEtapa = partidos.filter(p=>p.etapa_id===etapaActualId);
        const todosTerminados = partidosEtapa.every(p=>p.id===selId||p.finalizado);
        if(todosTerminados){
          // Buscar etapa actual y siguiente
          const etapaActual = etapas.find(e=>e.id===etapaActualId);
          if(etapaActual){
            const siguienteEtapa = etapas.find(e=>e.orden===etapaActual.orden+1);
            if(siguienteEtapa&&!siguienteEtapa.abierta){
              await sb(`etapas_ko?id=eq.${siguienteEtapa.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({abierta:true})});
              showMsg(`✓ Resultado guardado — ${siguienteEtapa.nombre} ABIERTA para pronósticos 🎯`);
            } else {
              showMsg('✓ Resultado guardado, puntos calculados y bracket actualizado');
            }
          }
        } else {
          showMsg('✓ Resultado guardado, puntos calculados y bracket actualizado');
        }
      } else {
        showMsg('✓ Resultado guardado, puntos calculados y bracket actualizado');
      }
      // ── PODIO: calcular puntos si es Final (P104) o 3er puesto (P103) ──
      const numPartido = selPartido?.numero;
      if (numPartido === 'P104' || numPartido === 'P103') {
        const esFinal = numPartido === 'P104';
        // ganador/perdedor del partido
        const ra2 = parseInt(gA), rb2 = parseInt(gB);
        const ganador2 = ra2 > rb2 ? selPartido.equipo_a : rb2 > ra2 ? selPartido.equipo_b : clasFinal;
        const perdedor2 = ganador2 === selPartido.equipo_a ? selPartido.equipo_b : selPartido.equipo_a;
        // Para cada pronóstico de podio, calcular puntos
        for (const pod of podios) {
          let patchPodio = {};
          if (esFinal) {
            // P104: campeón = ganador, subcampeón = perdedor
            patchPodio.pts_campeon   = pod.pred_campeon   === ganador2 ? 5 : 0;
            patchPodio.pts_subcampeon = pod.pred_subcampeon === perdedor2 ? 5 : 0;
          } else {
            // P103: 3er lugar = ganador de este partido
            patchPodio.pts_tercero = pod.pred_tercero === ganador2 ? 5 : 0;
          }
          await sb(`pronostico_podio?id=eq.${pod.id}`, {
            method: 'PATCH', prefer: 'return=minimal',
            body: JSON.stringify(patchPodio)
          });
        }
        if (esFinal) showMsg('✓ Final registrada — puntos de campeón y subcampeón calculados 🏆');
        else showMsg('✓ 3er puesto registrado — puntos de podio calculados 🥉');
      }
      setStep(0);setSelId(null);setGA('');setGB('');setProrroga(false);setPenales(false);setClasificado('');
      onRefresh();
    } catch(e){showMsg('Error: '+e.message,'error');}
  }

  async function guardarEdit(pid) {
    const ra=parseInt(editA), rb=parseInt(editB);
    if (isNaN(ra)||isNaN(rb)) { showMsg('Valores inválidos','error'); return; }
    let clasFinal=editClasificado;
    const partido=partidos.find(p=>p.id===pid);
    if(!clasFinal){if(ra>rb)clasFinal=partido.equipo_a;else if(rb>ra)clasFinal=partido.equipo_b;}
    try {
      // Despropagar primero (el clasificado puede haber cambiado)
      if (partido) await despropagar(partido.numero);
      await sb(`partidos_ko?id=eq.${pid}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({goles_a:ra,goles_b:rb,hubo_prorroga:editProrroga,hubo_penales:editPenales,clasificado:clasFinal,finalizado:true})});
      await calcularPuntosPartido(pid,ra,rb,clasFinal);
      // Re-propagar con el nuevo clasificado
      if (partido && clasFinal) await propagarResultado({...partido,goles_a:ra,goles_b:rb},clasFinal);
      showMsg('✓ Resultado actualizado y bracket recalculado');setEditId(null);onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }

  // Despropagar: limpia equipo_a/b de partidos downstream que dependían de este,
  // y cascadea si esos partidos también tenían resultados (los anula también)
  async function despropagar(numero) {
    const siguiente = partidos.filter(p=>p.slot_origen_a===numero||p.slot_origen_b===numero);
    for (const sig of siguiente) {
      const updates = {};
      if (sig.slot_origen_a===numero) updates.equipo_a = null;
      if (sig.slot_origen_b===numero) updates.equipo_b = null;
      // Si el siguiente también estaba finalizado, anularlo también en cascada
      if (sig.finalizado) {
        updates.goles_a = null; updates.goles_b = null;
        updates.hubo_prorroga = false; updates.hubo_penales = false;
        updates.clasificado = null; updates.finalizado = false;
        // Limpiar puntos de pronósticos de ese partido
        for(const pr of pronosticos.filter(x=>x.partido_ko_id===sig.id))
          await sb(`pronosticos_ko?id=eq.${pr.id}`,{method:'PATCH',prefer:'return=minimal',
            body:JSON.stringify({puntos_marcador:0,puntos_clasificado:0,puntos_total:0})});
        // Cascadear recursivamente
        await despropagar(sig.numero);
      }
      if (Object.keys(updates).length>0) {
        await sb(`partidos_ko?id=eq.${sig.id}`,{method:'PATCH',prefer:'return=minimal',
          body:JSON.stringify(updates)});
      }
    }
  }

  async function anular(pid) {
    if(!confirm('¿Anular este resultado? Se limpiarán también los equipos propagados a rondas siguientes.')) return;
    try {
      const partido = partidos.find(p=>p.id===pid);
      // 1. Resetear el partido anulado
      await sb(`partidos_ko?id=eq.${pid}`,{method:'PATCH',prefer:'return=minimal',
        body:JSON.stringify({goles_a:null,goles_b:null,hubo_prorroga:false,hubo_penales:false,clasificado:null,finalizado:false})});
      // 2. Resetear puntos de pronósticos de este partido
      for(const pr of pronosticos.filter(x=>x.partido_ko_id===pid))
        await sb(`pronosticos_ko?id=eq.${pr.id}`,{method:'PATCH',prefer:'return=minimal',
          body:JSON.stringify({puntos_marcador:0,puntos_clasificado:0,puntos_total:0})});
      // 3. Limpiar propagación downstream en cascada
      if (partido) await despropagar(partido.numero);
      showMsg('✓ Resultado anulado y bracket limpiado');onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }

  const etapaMap2 = {};etapas.forEach(e=>etapaMap2[e.id]=e);
  // Etapa activa = la de menor orden que tenga partidos sin finalizar (con o sin equipos)
  const etapasConPend = etapas.filter(e=>partidos.some(p=>p.etapa_id===e.id&&!p.finalizado)).sort((a,b)=>a.orden-b.orden);
  const etapaActivaIdRes = etapasConPend.length>0 ? String(etapasConPend[0].id) : 'TODOS';
  // Si el filtro manual sigue en TODOS, usar la etapa activa automáticamente
  const filtroEfectivo = filtroEtapa==='TODOS' ? etapaActivaIdRes : filtroEtapa;
  const pendientes = partidos.filter(p=>!p.finalizado&&p.equipo_a&&p.equipo_b).sort((a,b)=>a.fecha?.localeCompare(b.fecha)||a.hora?.localeCompare(b.hora));
  const terminados = partidos.filter(p=>p.finalizado&&p.goles_a!==null).sort((a,b)=>b.fecha?.localeCompare(a.fecha)||b.hora?.localeCompare(a.hora));
  const etapasFiltro=['TODOS',...etapas.sort((a,b)=>a.orden-b.orden).map(e=>String(e.id))];
  const pendFiltrados = filtroEfectivo==='TODOS'?pendientes:pendientes.filter(p=>String(p.etapa_id)===filtroEfectivo);

  const selPartido = partidos.find(p=>p.id===selId);
  const eqA = selPartido?.equipo_a||'';
  const eqB = selPartido?.equipo_b||'';

  return (
    <div>
      {/* Cargar nuevo resultado */}
      <div className="card" style={{marginBottom:12}}>
        <div className="card-title">⚽ Cargar Resultado</div>
        {step===0 ? (
          <>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              {etapasFiltro.map(id=>{
                const etapaObj=id==='TODOS'?null:etapaMap2[Number(id)];
                const isActive = filtroEfectivo===id;
                return <button key={id} className={`btn btn-xs ${isActive?'btn-p':'btn-s'}`}
                  onClick={()=>setFiltroEtapa(id)}>{id==='TODOS'?'Todos':etapaObj?.nombre||id}</button>;
              })}
            </div>
            {pendFiltrados.length===0
              ? <div className="empty" style={{padding:16}}>No hay partidos pendientes con equipos confirmados.</div>
              : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:8}}>
                {pendFiltrados.map(p=>{
                  const etapaObj=etapaMap2[p.etapa_id];
                  return (
                    <div key={p.id} style={{background:'rgba(255,255,255,.04)',border:'2px solid rgba(255,255,255,.08)',borderRadius:10,padding:12,cursor:'pointer',transition:'all .2s'}}
                      onClick={()=>{setSelId(p.id);setGA('');setGB('');setProrroga(false);setPenales(false);setClasificado('');setStep(1);}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor='var(--gold)'}
                      onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,.08)'}>
                      <div style={{fontSize:10,color:'var(--gm)',fontFamily:'Barlow Condensed',letterSpacing:1,marginBottom:6}}>
                        {p.numero} · {etapaObj?.nombre} · {p.fecha} {p.hora} IQ
                      </div>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,flex:1}}>
                          <Flag name={p.equipo_a} size={20}/>
                          <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700,textAlign:'center'}}>{p.equipo_a}</span>
                        </div>
                        <span style={{color:'var(--gm)',fontFamily:'Barlow Condensed',fontSize:12}}>VS</span>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,flex:1}}>
                          <Flag name={p.equipo_b} size={20}/>
                          <span style={{fontFamily:'Barlow Condensed',fontSize:12,fontWeight:700,textAlign:'center'}}>{p.equipo_b}</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </>
        ) : (
          selPartido && (
            <>
              <button className="btn btn-s btn-sm" style={{marginBottom:14}} onClick={()=>{setStep(0);setSelId(null);}}>← Volver</button>
              <div style={{textAlign:'center',fontFamily:'Barlow Condensed',fontSize:11,color:'var(--gold)',letterSpacing:1.5,marginBottom:4}}>
                {etapaMap[selPartido.etapa_id]?.nombre?.toUpperCase()} · {selPartido.numero} · {selPartido.fecha} {selPartido.hora} IQ
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20,flexWrap:'wrap',margin:'16px 0'}}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                  <Flag name={eqA} size={44}/>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,textAlign:'center',maxWidth:130}}>{eqA}</span>
                  <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={gA}
                    onChange={e=>setGA(e.target.value)} style={{fontSize:28,width:72,padding:10}}/>
                </div>
                <span style={{color:'var(--gm)',fontSize:32,fontWeight:300,paddingTop:40}}>–</span>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                  <Flag name={eqB} size={44}/>
                  <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,textAlign:'center',maxWidth:130}}>{eqB}</span>
                  <input className="e-inp" type="number" min="0" max="20" placeholder="0" value={gB}
                    onChange={e=>setGB(e.target.value)} style={{fontSize:28,width:72,padding:10}}/>
                </div>
              </div>

              <div style={{background:'rgba(0,0,0,.2)',borderRadius:8,padding:'12px 14px',marginBottom:12}}>
                <Toggle on={prorroga} onToggle={()=>setProrroga(!prorroga)} label="¿Hubo prórroga?"/>
                <Toggle on={penales} onToggle={()=>setPenales(!penales)} label="¿Hubo penales?"/>
              </div>

              <div className="form-group" style={{marginBottom:12}}>
                <label className="lbl">Equipo clasificado (siempre obligatorio)</label>
                <select className="inp" value={clasificado} onChange={e=>setClasificado(e.target.value)}>
                  <option value="">— Selecciona quién clasifica —</option>
                  {eqA&&<option value={eqA}>{eqA}</option>}
                  {eqB&&<option value={eqB}>{eqB}</option>}
                </select>
              </div>

              {gA!==''&&gB!==''&&(
                <div style={{background:'rgba(245,166,35,.08)',border:'1px solid rgba(245,166,35,.3)',borderRadius:8,padding:'10px 14px',marginBottom:12,textAlign:'center',fontFamily:'Barlow Condensed',fontSize:14}}>
                  Resultado a guardar: <strong style={{color:'var(--gold)',fontSize:18}}>{eqA} {gA} – {gB} {eqB}</strong>
                  {prorroga&&<span style={{marginLeft:8,color:'var(--gm)'}}>⏱ Prórroga{penales?' + ⚡ Penales':''}</span>}
                </div>
              )}
              <button className="btn btn-p" style={{width:'100%',fontSize:14,padding:12}} onClick={guardar}>✓ GUARDAR Y CALCULAR PUNTOS</button>
            </>
          )
        )}
      </div>

      {/* Historial */}
      <div className="card">
        <div className="card-title">📋 {terminados.length} Resultados Registrados</div>
        {terminados.length===0
          ? <div className="empty" style={{padding:16}}>Ningún resultado registrado aún.</div>
          : <div style={{overflowX:'auto'}}>
            <table className="r-table">
              <thead><tr>
                <th>Partido</th><th>Local</th><th style={{textAlign:'center'}}>Resultado</th><th>Visitante</th><th>Clasifica</th><th style={{textAlign:'center'}}>Acciones</th>
              </tr></thead>
              <tbody>{terminados.map(p=>{
                const etapaObj=etapaMap2[p.etapa_id];
                return (
                  <tr key={p.id}>
                    <td>
                      <span style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--gold)',fontWeight:700}}>{p.numero}</span>
                      <br/><span className={`etapa-badge ${etapaBadgeClass(etapaObj?.nombre||'')}`} style={{fontSize:9}}>{etapaObj?.nombre}</span>
                      <br/><span style={{fontSize:10,color:'var(--gm)'}}>{p.fecha} {p.hora}</span>
                    </td>
                    <td><div style={{display:'flex',alignItems:'center',gap:5}}><Flag name={p.equipo_a} size={14}/><span style={{fontWeight:700,fontSize:12}}>{p.equipo_a}</span></div></td>
                    <td style={{textAlign:'center'}}>
                      {editId===p.id
                        ? <div style={{display:'flex',gap:4,alignItems:'center',justifyContent:'center'}}>
                            <input className="e-inp" type="number" min="0" max="20" value={editA} onChange={e=>setEditA(e.target.value)}/>
                            <span>–</span>
                            <input className="e-inp" type="number" min="0" max="20" value={editB} onChange={e=>setEditB(e.target.value)}/>
                          </div>
                        : <span className="sc-pill">{p.goles_a} – {p.goles_b}</span>
                      }
                      {editId===p.id && (
                        <div style={{marginTop:6}}>
                          <Toggle on={editProrroga} onToggle={()=>setEditProrroga(!editProrroga)} label="Prórroga"/>
                          <Toggle on={editPenales} onToggle={()=>setEditPenales(!editPenales)} label="Penales"/>
                          <select className="inp" value={editClasificado} onChange={e=>setEditClasificado(e.target.value)} style={{marginTop:4,fontSize:11}}>
                            <option value="">Clasifica: —</option>
                            <option value={p.equipo_a}>{p.equipo_a}</option>
                            <option value={p.equipo_b}>{p.equipo_b}</option>
                          </select>
                        </div>
                      )}
                    </td>
                    <td><div style={{display:'flex',alignItems:'center',gap:5}}><Flag name={p.equipo_b} size={14}/><span style={{fontWeight:700,fontSize:12}}>{p.equipo_b}</span></div></td>
                    <td>
                      {p.clasificado && <div style={{display:'flex',alignItems:'center',gap:4}}><Flag name={p.clasificado} size={14}/><span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>{p.clasificado}</span></div>}
                      {p.hubo_penales&&<div style={{fontSize:9,color:'var(--gm)'}}>⚡ Pen.</div>}
                      {p.hubo_prorroga&&!p.hubo_penales&&<div style={{fontSize:9,color:'var(--gm)'}}>⏱ Prórr.</div>}
                    </td>
                    <td style={{textAlign:'center'}}>
                      {editId===p.id
                        ? <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                            <button className="btn btn-p btn-xs" onClick={()=>guardarEdit(p.id)}>✓</button>
                            <button className="btn btn-s btn-xs" onClick={()=>setEditId(null)}>✕</button>
                          </div>
                        : <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                            <button className="btn btn-w btn-xs" style={{background:'rgba(245,166,35,.2)',color:'var(--gold)',border:'1px solid rgba(245,166,35,.3)'}}
                              onClick={()=>{setEditId(p.id);setEditA(String(p.goles_a));setEditB(String(p.goles_b));setEditProrroga(p.hubo_prorroga);setEditPenales(p.hubo_penales);setEditClasificado(p.clasificado||'');}}>✏️ Editar</button>
                            <button className="btn btn-xs" style={{background:'rgba(100,150,255,.15)',color:'var(--blue)',border:'1px solid rgba(100,150,255,.3)'}}
                              onClick={()=>recalcularPartido(p.id,p.goles_a,p.goles_b,p.clasificado)}
                              title="Recalcular puntos">↻ Recalc</button>
                            <button className="btn btn-d btn-xs" onClick={()=>anular(p.id)}>🗑</button>
                          </div>
                      }
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        }
      </div>
    </div>
  );
}

// ── ADMIN: PARTICIPANTES ──────────────────────────────────
function AdminParticipantes({participantes, podios, showMsg, onRefresh}) {
  const [editPin, setEditPin] = useState(null);
  const [nuevoPin, setNuevoPin] = useState('');

  const podioMap = useMemo(()=>{const m={};podios.forEach(p=>m[p.participante_ko_id]=p);return m;},[podios]);

  async function aprobar(id) {
    try {
      await sb(`participantes_ko?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({aprobado:true})});
      showMsg('✓ Participante aprobado');onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }
  async function rechazar(id) {
    if(!confirm('¿Rechazar este participante?')) return;
    try {
      await sb(`participantes_ko?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({aprobado:false})});
      showMsg('Participante rechazado');onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }
  async function cambiarPin(id) {
    if(!nuevoPin||nuevoPin.length<4) { showMsg('PIN debe tener al menos 4 caracteres','error'); return; }
    try {
      await sb(`participantes_ko?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({pin:nuevoPin})});
      showMsg('✓ PIN actualizado');setEditPin(null);setNuevoPin('');onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }

  const aprobados = participantes.filter(p=>p.aprobado);
  const pendientes = participantes.filter(p=>!p.aprobado);

  // Primer partido de 16avos para validar timestamp
  // Usamos fecha dura del spec: 2026-06-28 23:00 IQ
  const cierreRegistro = new Date('2026-06-28T23:00:00+03:00');

  function timestampOk(created_at) {
    return new Date(created_at) < cierreRegistro;
  }

  return (
    <div>
      {pendientes.length>0 && (
        <div className="card" style={{marginBottom:12}}>
          <div className="card-title">⏳ Pendientes de Aprobación ({pendientes.length})</div>
          <div className="part-list">
            {pendientes.map(p=>{
              const pod=podioMap[p.id];
              const tsOk=timestampOk(p.created_at);
              return (
                <div key={p.id} className="part-card pendiente">
                  <div className="part-name">{p.nombre}</div>
                  <div className="part-meta">
                    Registrado: {new Date(p.created_at).toLocaleString('es-VE',{timeZone:'Asia/Baghdad'})}<br/>
                    <span style={{color:tsOk?'var(--green)':'#FF6666',fontWeight:700}}>
                      {tsOk?'✅ A tiempo':'⛔ Fuera de tiempo — 0 pts en 16avos'}
                    </span>
                  </div>
                  {pod && (
                    <div style={{background:'rgba(0,0,0,.2)',borderRadius:6,padding:'6px 8px',marginBottom:8,fontSize:11}}>
                      <div style={{color:'var(--gm)',marginBottom:2}}>Pronóstico podio:</div>
                      <div>🥇 {pod.pred_campeon||'—'}</div>
                      <div>🥈 {pod.pred_subcampeon||'—'}</div>
                      <div>🥉 {pod.pred_tercero||'—'}</div>
                    </div>
                  )}
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-g btn-sm" onClick={()=>aprobar(p.id)}>✓ Aprobar</button>
                    <button className="btn btn-d btn-sm" onClick={()=>rechazar(p.id)}>✕ Rechazar</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-title">👥 Participantes Aprobados ({aprobados.length})</div>
        {aprobados.length===0
          ? <div className="empty" style={{padding:16}}>Sin participantes aprobados.</div>
          : <div className="part-list">
            {aprobados.map(p=>(
              <div key={p.id} className="part-card aprobado">
                <div className="part-name">{p.nombre}</div>
                <div className="part-meta">PIN actual: <span className="pin-display">{p.pin}</span></div>
                {editPin===p.id
                  ? <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <input className="inp" style={{width:100,fontFamily:'Barlow Condensed',fontSize:16,textAlign:'center',letterSpacing:3}}
                        placeholder="Nuevo PIN" value={nuevoPin} maxLength={10}
                        onChange={e=>setNuevoPin(e.target.value)}/>
                      <button className="btn btn-p btn-xs" onClick={()=>cambiarPin(p.id)}>✓</button>
                      <button className="btn btn-s btn-xs" onClick={()=>{setEditPin(null);setNuevoPin('');}}>✕</button>
                    </div>
                  : <button className="btn btn-s btn-xs" onClick={()=>{setEditPin(p.id);setNuevoPin('');}}>🔑 Cambiar PIN</button>
                }
              </div>
            ))}
          </div>
        }
      </div>
    </div>
  );
}

// ── ADMIN: ETAPAS ─────────────────────────────────────────
function AdminEtapas({etapas, partidos, showMsg, onRefresh}) {
  async function toggleEtapa(etapa) {
    try {
      await sb(`etapas_ko?id=eq.${etapa.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({abierta:!etapa.abierta})});
      showMsg(`✓ Etapa ${etapa.nombre} ${!etapa.abierta?'abierta':'cerrada'}`);onRefresh();
    }catch(e){showMsg('Error: '+e.message,'error');}
  }

  const etapasOrden = [...etapas].sort((a,b)=>a.orden-b.orden);

  return (
    <div className="card">
      <div className="card-title">⏱ Estado de Etapas</div>
      <div className="alert al-inf" style={{marginBottom:14}}>
        Controla qué etapas tienen pronósticos abiertos. Los pronósticos se cierran automáticamente cuando comienza el primer partido de cada etapa.
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {etapasOrden.map(e=>{
          const psEtapa=partidos.filter(p=>p.etapa_id===e.id);
          const prox=psEtapa.filter(p=>p.fecha&&!p.finalizado).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0];
          const cierreMs = prox?.fecha&&prox?.hora ? cierreEtapa(prox.fecha,prox.hora)-Date.now() : null;
          return (
            <div key={e.id} style={{background:'rgba(255,255,255,.04)',border:`1px solid ${e.abierta?'rgba(74,219,138,.4)':'rgba(255,255,255,.1)'}`,borderRadius:8,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div>
                <span style={{fontFamily:'Barlow Condensed',fontSize:15,fontWeight:700}}>{e.nombre}</span>
                {prox && <div style={{fontSize:10,color:'var(--gm)',marginTop:2}}>
                  Primer partido: {prox.fecha} {prox.hora} IQ
                  {cierreMs!==null&&cierreMs>0&&<span style={{color:'var(--gold)',marginLeft:6}}>({formatCountdown(cierreMs)})</span>}
                  {cierreMs!==null&&cierreMs<=0&&<span style={{color:'#FF6666',marginLeft:6}}>🔒 Cierre vencido</span>}
                </div>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:12,color:e.abierta?'var(--green)':'var(--gm)',fontWeight:700}}>
                  {e.abierta?'🟢 Abierta':'🔒 Cerrada'}
                </span>
                <button className={`btn btn-sm ${e.abierta?'btn-d':'btn-g'}`} onClick={()=>toggleEtapa(e)}>
                  {e.abierta?'Cerrar':'Abrir'}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ROOT ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('hoy');
  const [partidos, setPartidos] = useState([]);
  const [etapas, setEtapas] = useState([]);
  const [participantes, setParticipantes] = useState([]);
  const [pronosticos, setPronosticos] = useState([]);
  const [podios, setPodios] = useState([]);
  const [partidosGrupos, setPartidosGrupos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Sesión del usuario elevada a App para compartir con Hoy/Calendario/Bracket
  const [userKO, setUserKO] = useState(null);
  useEffect(()=>{
    try {
      const saved = sessionStorage.getItem('quiniela_ko_user');
      if (saved) {
        const u = JSON.parse(saved);
        setUserKO(u);
      }
    } catch(e){}
  }, []);

  const fetchAll = useCallback(async () => {
    try {
      const [pk,et,pa,pr,pod,pg] = await Promise.all([
        sb('partidos_ko?select=*&order=numero'),
        sb('etapas_ko?select=*&order=orden'),
        sb('participantes_ko?select=*&order=created_at'),
        sb('pronosticos_ko?select=*'),
        sb('pronostico_podio?select=*'),
        sb('partidos?select=id,fecha,hora,equipo_a,equipo_b,grupo,goles_a,goles_b,finalizado&order=fecha,hora'),
      ]);
      setPartidos(pk); setEtapas(et); setParticipantes(pa); setPronosticos(pr); setPodios(pod);
      setPartidosGrupos(pg);
      setError(null);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(()=>{ fetchAll(); }, []);

  // Calcular pronsCerradosEtapa a nivel App para compartir
  const _etapasOrd = [...etapas].sort((a,b)=>a.orden-b.orden);
  const _etapaActiva = _etapasOrd.find(e=>e.abierta&&partidos.some(p=>p.etapa_id===e.id&&!p.finalizado));
  const _primerPart = _etapaActiva
    ? partidos.filter(p=>p.etapa_id===_etapaActiva.id&&p.fecha&&p.hora&&!p.finalizado)
        .sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0]
    : null;
  const pronsCerradosApp = _primerPart
    ? Date.now() >= cierreEtapa(_primerPart.fecha, _primerPart.hora)
    : true;

  // ── Calcular standings y terceros en vivo (para enriquecer partidos en todas las pestañas) ──
  const standingsApp = React.useMemo(()=>{
    const g={};
    partidosGrupos.forEach(p=>{
      if(!g[p.grupo])g[p.grupo]={};
      [p.equipo_a,p.equipo_b].forEach(eq=>{
        if(eq&&!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0};
      });
      if(!p.finalizado||p.goles_a===null)return;
      const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
      if(!a||!b)return;
      a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
      if(p.goles_a>p.goles_b)a.pts+=3;else if(p.goles_b>p.goles_a)b.pts+=3;else{a.pts++;b.pts++;}
    });
    const result={};
    Object.keys(g).sort().forEach(grupo=>{
      result[grupo]=[...Object.entries(g[grupo])
        .map(([n,s])=>({n,...s,dg:s.gf-s.gc}))
        .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf)];
      result[grupo].completo=result[grupo].every(e=>e.j===3);
    });
    return result;
  },[partidosGrupos]);

  const tercerosApp = React.useMemo(()=>{
    return Object.keys(standingsApp).sort()
      .filter(g=>standingsApp[g].length>=3)
      .map(g=>({grupo:g,...standingsApp[g][2]}))
      .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  },[standingsApp]);

  // Greedy 3eros assignment (mismo algoritmo que en bracket)
  const SLOTS3_APP={'P74':['A','B','C','D','F'],'P77':['C','D','F','G','H'],
    'P79':['C','E','F','H','I'],'P80':['E','H','I','J','K'],
    'P81':['B','E','F','I','J'],'P82':['A','E','H','I','J'],
    'P85':['E','F','G','I','J'],'P87':['D','E','I','J','L']};

  const asig3App = React.useMemo(()=>{
    const t8=new Set(tercerosApp.slice(0,8).map(t=>t.grupo));
    // Un tercero es provisional si CUALQUIER grupo no ha terminado todavía,
    // porque el ranking de los 12 terceros puede cambiar hasta que todos cierren.
    const todosCompletos = Object.keys(standingsApp).length===12 &&
      Object.values(standingsApp).every(g=>g.completo);
    const asig={};const slotsUs=new Set();const gruposUs=new Set();
    const ord=Object.entries(SLOTS3_APP).sort((a,b)=>a[1].length-b[1].length);
    for(const [slot,grupos] of ord){
      const cand=tercerosApp.find(t=>grupos.includes(t.grupo)&&t8.has(t.grupo)&&!slotsUs.has(slot)&&!gruposUs.has(t.grupo));
      if(cand){
        // provisional=true mientras no estén todos los grupos completos
        asig[slot]={equipo:cand.n, provisional:!todosCompletos};
        slotsUs.add(slot);gruposUs.add(cand.grupo);
      }
    }
    return asig;
  },[tercerosApp,standingsApp]);

  // ── partidos enriquecidos: resuelve equipos en vivo para Hoy, Calendario y Bracket ──
  // Regla: si finalizado → BD. Si equipo_a/b en BD → directo (grupos cerrados o propagado).
  // Si no → calcular desde standings (fallback para rondas futuras sin dato aún).
  const partidosResueltos = React.useMemo(()=>{
    function resolveEq(partido, slotRaw, esA) {
      if(partido.finalizado) return {equipo: esA?partido.equipo_a:partido.equipo_b, provisional:false};
      const eqBD = esA ? partido.equipo_a : partido.equipo_b;
      if(eqBD) return {equipo: eqBD, provisional: false};
      const m1=slotRaw.match(/^([12])°\s*Grupo\s*([A-L])$/);
      if(m1){
        const pos=parseInt(m1[1])-1,grp=m1[2];
        const t=standingsApp[grp];
        if(!t||t.length<=pos) return null;
        return {equipo:t[pos].n, provisional:!t.completo};
      }
      if(slotRaw.startsWith('3°')) return asig3App[partido.numero]||null;
      if(slotRaw.startsWith('Gan.')||slotRaw.startsWith('Per.')){
        return null;
      }
      return null;
    }
    return partidos.map(p=>{
      const rA=resolveEq(p,p.slot_a||'',true);
      const rB=resolveEq(p,p.slot_b||'',false);
      return {
        ...p,
        _eqA: rA?.equipo || null,
        _eqB: rB?.equipo || null,
        _provA: !p.finalizado && (rA?.provisional||false),
        _provB: !p.finalizado && (rB?.provisional||false),
      };
    });
  },[partidos,standingsApp,asig3App]);

  const TABS = [
    {id:'hoy',l:'⚽ Hoy/Mañana'},
    {id:'calendario',l:'📅 Calendario'},
    {id:'bracket',l:'🏆 Bracket'},
    {id:'misprons',l:'🎯 Mis Pronósticos'},
    {id:'posiciones',l:'📊 Posiciones'},
    {id:'admin',l:'⚙️ Admin'},
  ];

  return (
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo-area">
            <div className="logo-ball">⚽</div>
            <div className="logo-text">
              <div className="logo-title">QUINIELA DESTIN</div>
              <div className="logo-sub">Fase Eliminatoria 2026</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <a href="./grupos.html" style={{fontSize:10,color:"var(--gm)",fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1,textDecoration:"none",padding:"3px 8px",border:"1px solid rgba(255,255,255,.15)",borderRadius:4,transition:"all .2s"}}
              onMouseEnter={e=>e.target.style.color="var(--white)"} onMouseLeave={e=>e.target.style.color="var(--gm)"}>
              ← GRUPOS
            </a>
            <div className="ko-badge">FASE KO</div>
          </div>
        </div>
        <nav className="nav-tabs">
          {TABS.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
        </nav>
      </header>
      <main className="main">
        {loading ? (
          <div className="loading"><div className="spinner"/><span style={{fontFamily:'Barlow Condensed',letterSpacing:2,fontSize:14}}>CARGANDO...</span></div>
        ) : error ? (
          <div className="card" style={{textAlign:'center',padding:30}}>
            <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
            <div style={{color:'#FF6666',fontWeight:600,marginBottom:8}}>Error de conexión</div>
            <div style={{fontSize:11,color:'var(--gm)',marginBottom:14,wordBreak:'break-all'}}>{error}</div>
            <button className="btn btn-p" onClick={()=>{setLoading(true);setError(null);fetchAll();}}>Reintentar</button>
          </div>
        ) : (
          <>
            {tab==='hoy' && <TabHoy partidos={partidosResueltos} etapas={etapas} participantes={participantes} pronosticos={pronosticos} userKO={userKO} pronsCerradosEtapa={pronsCerradosApp}/>}
            {tab==='calendario' && <TabCalendario partidos={partidosResueltos} etapas={etapas} participantes={participantes} pronosticos={pronosticos} userKO={userKO} pronsCerradosEtapa={pronsCerradosApp}/>}
            {tab==='bracket' && <TabBracket partidos={partidosResueltos} etapas={etapas} partidosGrupos={partidosGrupos} pronosticos={pronosticos} participantes={participantes} userKO={userKO} pronsCerradosEtapa={pronsCerradosApp}/>}
            {tab==='misprons' && <TabMisPron partidos={partidosResueltos} etapas={etapas} participantes={participantes} pronosticos={pronosticos} podios={podios} onRefresh={fetchAll}/>}
            {tab==='posiciones' && <TabPosiciones participantes={participantes} pronosticos={pronosticos} partidos={partidosResueltos} podios={podios} etapas={etapas}/>}
            {tab==='admin' && <TabAdmin partidos={partidos} etapas={etapas} participantes={participantes} pronosticos={pronosticos} podios={podios} partidosGrupos={partidosGrupos} onRefresh={fetchAll}/>}
          </>
        )}
      </main>
      <button className="scroll-top" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>↑</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
