    --white: #FFFFFF;

  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-ball {
    width: 44px; height: 44px;

    display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);

  .logo-text { font-family: 'Barlow Condensed', sans-serif; }
  .logo-title { font-size: 22px; font-weight: 800; letter-spacing: 1px; line-height: 1; }

    font-size: 12px; font-weight: 700; letter-spacing: 1px;

  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    padding: 10px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--gray-mid);
    border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active {
    color: var(--gold); border-bottom-color: var(--gold);
  }
  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  /* CARDS */
  .card {
    background: var(--navy);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 20px;
    margin-bottom: 16px;
  }
  .card-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px;
  }
  /* MATCH CARD */
  .match-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 10px; transition: border-color 0.2s;
  }
  .match-card:hover { border-color: rgba(245,166,35,0.3); }
  .match-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;

  .match-group {
    background: var(--red); color: var(--white);
    padding: 2px 8px; border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
  }
  .match-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: var(--gold); font-weight: 600;
  }
  .match-status-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; letter-spacing: 1px;
  }
  .badge-pending { background: rgba(176,187,221,0.15); color: var(--gray-mid); }
  .badge-done { background: rgba(26,127,75,0.2); color: #4ADB8A; }
  .match-teams {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
    flex: 1; text-align: center; line-height: 1.2;
  }
  .score-box {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 8px;
    min-width: 80px; justify-content: center;
  }
  .score-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800; line-height: 1;
    color: var(--white);
  }
  .score-sep { font-size: 20px; color: var(--gray-mid); font-weight: 300; }
  .score-pending { font-size: 13px; color: var(--gray-mid); font-style: italic; }
  /* PREDICTIONS PANEL */
  .pred-toggle {
    margin-top: 10px; width: 100%; background: none;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    color: var(--gray-mid); padding: 7px;
    font-family: 'Barlow', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .pred-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .pred-panel {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .pred-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px;
  }
  .pred-item {
    background: rgba(255,255,255,0.04);
    border-radius: 6px; padding: 8px 10px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid transparent;
  }
  .pred-item.pts-5 { border-color: rgba(245,166,35,0.5); background: rgba(245,166,35,0.08); }
  .pred-item.pts-4 { border-color: rgba(74,219,138,0.4); background: rgba(74,219,138,0.06); }
  .pred-item.pts-3 { border-color: rgba(100,150,255,0.4); background: rgba(100,150,255,0.06); }
  .pred-name { font-size: 12px; font-weight: 500; color: var(--gray-mid); }

    font-size: 15px; font-weight: 700; color: var(--white);
  }

  .pts-3-badge { background: #6496FF; color: var(--white); }

    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-transform: uppercase;

  .pts-total {

    font-size: 20px; font-weight: 800; color: var(--gold);

    .standings-table td:nth-child(5) { display: none; }
  }
</style>

// ─── SCORING ─────────────────────────────────────────────
function calcPuntos(predA, predB, realA, realB) {
  if (realA === null || realB === null) return null;
  if (predA === realA && predB === realB) return 5;
  const mismoGanador = (
    (predA > predB && realA > realB) ||
    (predA < predB && realA < realB) ||
    (predA === predB && realA === realB)
  );
  if (!mismoGanador) return 0;
  const difPred = predA - predB;
  const difReal = realA - realB;
  if (difPred === difReal) return 4;
  return 3;
}

const DIAS_ES = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function formatFechaLarga(fechaStr) {
  const [y,m,d] = fechaStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${DIAS_ES[dt.getDay()]}, ${d} de ${MESES_ES[m-1]} ${y}`;
}

function getTodayIraq() {
  const now = new Date();
  const iraqOffset = 3 * 60;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const iraqTime = new Date(utc + iraqOffset * 60000);
  const y = iraqTime.getFullYear();
  const m = String(iraqTime.getMonth()+1).padStart(2,"0");
  const d = String(iraqTime.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function MatchCard({ partido, pronosticos, participantes, showPreds }) {
  const [open, setOpen] = useState(false);
  const done = partido.finalizado && partido.goles_a !== null;

  const predsConPuntos = participantes.map(p => {
    const pred = pronosticos.find(pr => pr.participante_id === p.id && pr.partido_id === partido.id);
    if (!pred) return null;
    const pts = done ? calcPuntos(pred.pred_a, pred.pred_b, partido.goles_a, partido.goles_b) : null;
    return { nombre: p.nombre, pred_a: pred.pred_a, pred_b: pred.pred_b, pts };
  }).filter(Boolean);

  return (
    <div className="match-card">
      <div className="match-meta">
        <span className="match-group">GRUPO {partido.grupo}</span>
        <span className="match-time">⏰ {partido.hora} (Irak)</span>
        <span className={`match-status-badge ${done ? 'badge-done' : 'badge-pending'}`}>
          {done ? '✓ FINALIZADO' : 'PENDIENTE'}
        </span>
      </div>
      <div className="match-teams">
        <span className="team-name">{partido.equipo_a}</span>
        <div className="score-box">
          {done ? (
            <>
              <span className="score-num">{partido.goles_a}</span>
              <span className="score-sep">–</span>
              <span className="score-num">{partido.goles_b}</span>
            </>
          ) : (
            <span className="score-pending">vs</span>
          )}
        </div>
        <span className="team-name">{partido.equipo_b}</span>
      </div>
      {predsConPuntos.length > 0 && (
        <>
          <button className="pred-toggle" onClick={() => setOpen(!open)}>
            {open ? "▲ Ocultar pronósticos" : `▼ Ver pronósticos (${predsConPuntos.length} participantes)`}
          </button>
          {open && (
            <div className="pred-panel">
              <div className="pred-grid">
                {predsConPuntos.map(pr => (
                  <div key={pr.nombre} className={`pred-item ${pr.pts===5?'pts-5':pr.pts===4?'pts-4':pr.pts===3?'pts-3':''}`}>
                    <span className="pred-name">{pr.nombre.split(" ")[0]}</span>
                    <div style={{display:'flex',alignItems:'center'}}>
                      <span className="pred-score">{pr.pred_a}–{pr.pred_b}</span>
                      {pr.pts !== null && (
                        <span className={`pred-pts ${pr.pts===5?'pts-5-badge':pr.pts===4?'pts-4-badge':pr.pts===3?'pts-3-badge':''}`}>
                          {pr.pts > 0 ? `+${pr.pts}` : '0'}
                        </span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

  const today = getTodayIraq();
  const partidosHoy = partidos.filter(p => p.fecha === today);

  return (
    <div>
      <div className="today-header">
        <div className="today-date">{formatFechaLarga(today)}</div>
        {partidosHoy.length > 0 && (
          <span className="today-count">{partidosHoy.length} partido{partidosHoy.length>1?'s':''}</span>

function TabCalendario({ partidos, pronosticos, participantes }) {
  const fechas = [...new Set(partidos.map(p => p.fecha))].sort();
  const today = getTodayIraq();
  return (
    <div>
      {fechas.map(fecha => (
        <div key={fecha}>
          <div className="calendar-date-header">
            <span>{formatFechaLarga(fecha)}</span>
            {fecha === today && <span style={{background:'var(--red)',fontSize:10,padding:'2px 8px',borderRadius:4,fontFamily:'Barlow Condensed',fontWeight:700,letterSpacing:1}}>HOY</span>}
          </div>
          {partidos.filter(p => p.fecha === fecha).map(p => (
            <MatchCard key={p.id} partido={p} pronosticos={pronosticos} participantes={participantes} />
          ))}
        </div>
      ))}
    </div>
  );
}

function TabPosiciones({ partidos, pronosticos, participantes }) {
  const standings = participantes.map(p => {
    let pts = 0, exactos = 0, diferencia = 0, ganador = 0, pendientes = 0;
    pronosticos.filter(pr => pr.participante_id === p.id).forEach(pr => {
      const partido = partidos.find(pa => pa.id === pr.partido_id);
      if (!partido || !partido.finalizado || partido.goles_a === null) { pendientes++; return; }
      const pts_p = calcPuntos(pr.pred_a, pr.pred_b, partido.goles_a, partido.goles_b);
      pts += pts_p;
      if (pts_p === 5) exactos++;
      else if (pts_p === 4) diferencia++;
      else if (pts_p === 3) ganador++;
    });
    return { ...p, pts, exactos, diferencia, ganador, pendientes };
  }).sort((a,b) => b.pts - a.pts || b.exactos - a.exactos);

  return (
    <div className="card">
      <div className="card-header">⚽ Tabla de Posiciones — Quiniela Destin 2026</div>
      <div style={{overflowX:'auto'}}>
        <table className="standings-table">

              <th style={{textAlign:'center'}}>🎯 Diferencia</th>
              <th style={{textAlign:'center'}}>✓ Ganador</th>
              <th style={{textAlign:'center'}}>Pendientes</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((p, i) => (
              <tr key={p.id}>
                <td>
                  <div className={`pos-badge pos-${i<3?i+1:'other'}`}>{i+1}</div>
                </td>
                <td style={{fontWeight:600}}>{p.nombre}</td>
                <td style={{textAlign:'center'}}><span className="pts-total">{p.pts}</span></td>
                <td style={{textAlign:'center',color:'var(--gold)'}}>{p.exactos}</td>
                <td style={{textAlign:'center',color:'#4ADB8A'}}>{p.diferencia}</td>
                <td style={{textAlign:'center',color:'#6496FF'}}>{p.ganador}</td>
                <td style={{textAlign:'center',color:'var(--gray-mid)'}}>{p.pendientes}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:16,padding:'10px 14px',background:'rgba(0,0,0,0.2)',borderRadius:8,fontSize:12,color:'var(--gray-mid)',lineHeight:1.7}}>
        <strong style={{color:'var(--gold)'}}>Sistema de puntos:</strong>&nbsp;
        ⭐ Marcador exacto = 5 pts &nbsp;|&nbsp;
        🎯 Ganador + diferencia exacta = 4 pts &nbsp;|&nbsp;
        ✓ Solo ganador/empate = 3 pts
        <br/>
        <strong style={{color:'var(--gold)'}}>Premios:</strong>&nbsp;
        1° lugar 60% · 2° lugar 30% · 3° lugar 10% del total acumulado
      </div>
    </div>
  );
}

function calcGrupos(partidos) {
  const grupos = {};
  partidos.forEach(p => {
    if (!grupos[p.grupo]) grupos[p.grupo] = {};
    [p.equipo_a, p.equipo_b].forEach(eq => {
      if (!grupos[p.grupo][eq]) grupos[p.grupo][eq] = {pts:0,j:0,g:0,e:0,p_:0,gf:0,gc:0,dg:0};
    });
    if (!p.finalizado || p.goles_a === null) return;
    const a = grupos[p.grupo][p.equipo_a];
    const b = grupos[p.grupo][p.equipo_b];
    a.j++; b.j++;
    a.gf += p.goles_a; a.gc += p.goles_b;
    b.gf += p.goles_b; b.gc += p.goles_a;
    a.dg = a.gf - a.gc; b.dg = b.gf - b.gc;
    if (p.goles_a > p.goles_b) { a.pts+=3; a.g++; b.p_++; }
    else if (p.goles_a < p.goles_b) { b.pts+=3; b.g++; a.p_++; }
    else { a.pts+=1; b.pts+=1; a.e++; b.e++; }
  });
  return grupos;
}

function TabGrupos({ partidos }) {
  const grupos = calcGrupos(partidos);
  const letras = Object.keys(grupos).sort();

  return (
    <div>
      <div style={{background:'rgba(245,166,35,0.1)',border:'1px solid rgba(245,166,35,0.3)',borderRadius:8,padding:'10px 14px',marginBottom:20,fontSize:12,lineHeight:1.7}}>
        <strong style={{color:'var(--gold)'}}>⚠️ Nota sobre desempates:</strong>
        <span style={{color:'var(--gray-mid)'}}> El sistema calcula automáticamente por: 1) Puntos · 2) Diferencia de goles · 3) Goles a favor · 4) Head-to-head.
        Criterios como fair play (tarjetas) o ranking FIFA <strong style={{color:'var(--gold)'}}>no son calculables automáticamente</strong> — en caso de empate en todos los criterios anteriores, el desempate queda sujeto a criterios internos FIFA.</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:16}}>
        {letras.map(letra => {
          const equipos = Object.entries(grupos[letra])
            .map(([nombre, stats]) => ({ nombre, ...stats }))
            .sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
          return (
            <div key={letra} className="group-block">
              <div className="group-title">GRUPO {letra}</div>
              <table className="group-table">
                <thead>
                  <tr>
                    <th>Selección</th>
                    <th>PJ</th><th>PTS</th><th>DG</th><th>GF</th><th>GC</th>
                  </tr>
                </thead>
                <tbody>
                  {equipos.map((eq, i) => (
                    <tr key={eq.nombre}>
                      <td>
                        {i < 2 && <span className="qualify-dot" title="Clasificado directo"/>}
                        {i === 2 && <span className="third-dot" title="Posible mejor tercero"/>}
                        {eq.nombre}
                      </td>
                      <td>{eq.j}</td>
                      <td><strong style={{color:i<2?'#4ADB8A':'inherit'}}>{eq.pts}</strong></td>
                      <td style={{color:eq.dg>0?'#4ADB8A':eq.dg<0?'#FF6666':'inherit'}}>{eq.dg>0?'+':''}{eq.dg}</td>
                      <td>{eq.gf}</td><td>{eq.gc}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:16,fontSize:12,color:'var(--gray-mid)',display:'flex',gap:16,flexWrap:'wrap'}}>
        <span><span className="qualify-dot"/>Clasificado directo (1° y 2°)</span>
        <span><span className="third-dot"/>Posible mejor tercero</span>
      </div>
    </div>
  );
}

function TabAdmin({ partidos, participantes, pronosticos, onRefresh }) {
  const [authed, setAuthed] = useState(false);
  const [pass, setPass] = useState("");
  const [passErr, setPassErr] = useState(false);
  const [msg, setMsg] = useState(null);
  // resultado form
  const [selPartido, setSelPartido] = useState("");
  const [golesA, setGolesA] = useState("");
  const [golesB, setGolesB] = useState("");
  // nuevo participante
  const [newNombre, setNewNombre] = useState("");
  // csv import
  const [csvText, setCsvText] = useState("");

  const showMsg = (txt, type="success") => {
    setMsg({txt,type});
    setTimeout(() => setMsg(null), 4000);
  };

  async function guardarResultado() {
    if (!selPartido || golesA === "" || golesB === "") { showMsg("Completa todos los campos","error"); return; }
    const ga = parseInt(golesA), gb = parseInt(golesB);
    if (isNaN(ga)||isNaN(gb)||ga<0||gb<0) { showMsg("Goles inválidos","error"); return; }
    try {
      await sb(`partidos?id=eq.${selPartido}`, {
        method:"PATCH", prefer:"return=minimal",
        body: JSON.stringify({goles_a:ga, goles_b:gb, finalizado:true})
      });
      // recalcular puntos en pronosticos de ese partido
      const preds = pronosticos.filter(pr => pr.partido_id === parseInt(selPartido));
      for (const pr of preds) {
        const pts = calcPuntos(pr.pred_a, pr.pred_b, ga, gb);
        await sb(`pronosticos?id=eq.${pr.id}`, {
          method:"PATCH", prefer:"return=minimal",
          body: JSON.stringify({puntos: pts})
        });
      }
      showMsg("✓ Resultado guardado y puntos actualizados");
      setGolesA(""); setGolesB(""); setSelPartido("");
      onRefresh();
    } catch(e) { showMsg("Error: "+e.message,"error"); }
  }

  async function agregarParticipante() {
    if (!newNombre.trim()) { showMsg("Ingresa un nombre","error"); return; }
    try {
      await sb("participantes", {method:"POST", body:JSON.stringify({nombre:newNombre.trim()})});
      showMsg(`✓ ${newNombre.trim()} agregado`);
      setNewNombre("");
      onRefresh();
    } catch(e) { showMsg("Error: "+e.message,"error"); }
  }

  async function importarCSV() {
    if (!csvText.trim()) { showMsg("Pega el CSV primero","error"); return; }
    const lines = csvText.trim().split("\n").filter(l=>l.trim());
    let ok = 0;
    for (const line of lines) {
      const parts = line.split(",").map(s=>s.trim());
      if (parts.length < 2) continue;
      const nombre = parts[0];
      // buscar o crear participante
      let part = participantes.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase());
      if (!part) {
        try {
          const res = await sb("participantes",{method:"POST",body:JSON.stringify({nombre})});
          part = Array.isArray(res)?res[0]:res;
        } catch(e) { continue; }
      }
      // parts[1..72] son pronósticos formato "X-Y"
      for (let i=1; i<parts.length && i<=72; i++) {
        const sc = parts[i].split("-");
        if (sc.length!==2) continue;
        const pa=parseInt(sc[0]), pb=parseInt(sc[1]);
        if (isNaN(pa)||isNaN(pb)) continue;
        const partidoId = i;
        const exists = pronosticos.find(pr=>pr.participante_id===part.id && pr.partido_id===partidoId);
        if (!exists) {
          try { await sb("pronosticos",{method:"POST",body:JSON.stringify({participante_id:part.id,partido_id:partidoId,pred_a:pa,pred_b:pb,puntos:0})}); ok++; } catch{}
        }
      }
    }
    showMsg(`✓ Importación completada (${ok} pronósticos)`);
    onRefresh();
  }

  async function resetResultado(partidoId) {
    try {
      await sb(`partidos?id=eq.${partidoId}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:null,goles_b:null,finalizado:false})});
      const preds = pronosticos.filter(pr=>pr.partido_id===partidoId);
      for (const pr of preds) {
        await sb(`pronosticos?id=eq.${pr.id}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({puntos:0})});
      }
      showMsg("✓ Resultado eliminado"); onRefresh();
    } catch(e) { showMsg("Error: "+e.message,"error"); }
  }

  if (!authed) return (
    <div className="login-wrap">
      <div className="login-box">
        <div style={{fontSize:36,marginBottom:12}}>🔐</div>
        <h2>Panel Administrador</h2>
        <p>Ingresa la contraseña para continuar</p>
        {passErr && <div className="alert alert-error">Contraseña incorrecta</div>}
        <input className="form-input" type="password" placeholder="Contraseña"
          value={pass} onChange={e=>setPass(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}}
          style={{marginBottom:12}}/>
        <br/>
        <button className="btn btn-primary" style={{width:'100%',marginTop:8}}
          onClick={()=>{if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}>
          ENTRAR
        </button>
      </div>
    </div>
  );

  const terminados = partidos.filter(p=>p.finalizado);
  const pendientes = partidos.filter(p=>!p.finalizado);

  return (
    <div>
      {msg && <div className={`alert alert-${msg.type}`}>{msg.txt}</div>}

      {/* CARGAR RESULTADO */}
      <div className="card admin-section">
        <div className="admin-title">📊 Cargar Resultado de Partido</div>
        <div className="form-row">
          <div className="form-group" style={{flex:3}}>
            <label className="form-label">Partido</label>
            <select className="form-input" value={selPartido} onChange={e=>setSelPartido(e.target.value)}>
              <option value="">— Selecciona un partido —</option>
              {pendientes.map(p=>(
                <option key={p.id} value={p.id}>
                  [{p.fecha} {p.hora}] Grupo {p.grupo}: {p.equipo_a} vs {p.equipo_b}
                </option>
              ))}
            </select>
          </div>
          <div className="form-group" style={{flex:1,minWidth:70}}>
            <label className="form-label">{selPartido && partidos.find(p=>p.id===parseInt(selPartido))?.equipo_a || "Local"}</label>
            <input className="form-input" type="number" min="0" max="20" placeholder="0"
              value={golesA} onChange={e=>setGolesA(e.target.value)}/>
          </div>
          <div className="form-group" style={{flex:1,minWidth:70}}>
            <label className="form-label">{selPartido && partidos.find(p=>p.id===parseInt(selPartido))?.equipo_b || "Visitante"}</label>
            <input className="form-input" type="number" min="0" max="20" placeholder="0"
              value={golesB} onChange={e=>setGolesB(e.target.value)}/>
          </div>
        </div>
        <button className="btn btn-primary" onClick={guardarResultado}>GUARDAR RESULTADO</button>
      </div>

      {/* RESULTADOS CARGADOS */}
      {terminados.length > 0 && (
        <div className="card admin-section">
          <div className="admin-title">✓ Resultados Registrados ({terminados.length})</div>
          {terminados.map(p=>(
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
              <span style={{fontSize:13}}>
                <span style={{color:'var(--gold)',marginRight:8}}>[Grupo {p.grupo}]</span>
                {p.equipo_a} <strong>{p.goles_a}–{p.goles_b}</strong> {p.equipo_b}
              </span>
              <button className="btn btn-danger btn-sm" onClick={()=>resetResultado(p.id)}>Anular</button>
            </div>
          ))}
        </div>
      )}

      {/* PARTICIPANTES */}
      <div className="card admin-section">
        <div className="admin-title">👤 Gestión de Participantes</div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Nombre completo</label>
            <input className="form-input" type="text" placeholder="Ej. Pedro García"
              value={newNombre} onChange={e=>setNewNombre(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&agregarParticipante()}/>
          </div>
          <div className="form-group" style={{justifyContent:'flex-end',flex:'0 0 auto'}}>
            <label className="form-label">&nbsp;</label>
            <button className="btn btn-primary" onClick={agregarParticipante}>AGREGAR</button>
          </div>
        </div>
        <div className="section-divider"/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8}}>
          {participantes.map((p,i)=>(
            <div key={p.id} style={{background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:500}}>
                <span style={{color:'var(--gold)',marginRight:8,fontFamily:'Barlow Condensed',fontSize:12}}>{i+1}.</span>
                {p.nombre}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* IMPORTAR CSV */}
      <div className="card admin-section">
        <div className="admin-title">📁 Importar Pronósticos por CSV</div>
        <div style={{fontSize:12,color:'var(--gray-mid)',marginBottom:12,lineHeight:1.7}}>
          Formato: <code style={{color:'var(--gold)'}}>Nombre,G1-G2,G3-G4,...,G143-G144</code><br/>
          Una fila por participante. 72 marcadores (pred_a–pred_b) separados por coma.
        </div>
        <div className="csv-area" style={{marginBottom:12}}>
          Ejemplo de fila:<br/>
          Pedro García,2-1,1-0,3-1,...(72 pronósticos)
        </div>
        <textarea className="form-input" rows={5} placeholder="Pega el CSV aquí..."
          value={csvText} onChange={e=>setCsvText(e.target.value)}
          style={{marginBottom:10,resize:'vertical'}}/>
        <button className="btn btn-primary" onClick={importarCSV}>IMPORTAR CSV</button>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("hoy");
  const [partidos, setPartidos] = useState([]);
  const [participantes, setParticipantes] = useState([]);
  const [pronosticos, setPronosticos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [seeded, setSeeded] = useState(false);

  const fetchAll = useCallback(async () => {
    try {
      const [parts, partic, prons] = await Promise.all([
        sb("partidos?select=*&order=fecha,hora"),
        sb("participantes?select=*&order=created_at"),
        sb("pronosticos?select=*"),
      ]);
      setPartidos(parts);
      setParticipantes(partic);
      setPronosticos(prons);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  // Seed partidos y pronósticos iniciales si la DB está vacía
  async function seedData() {
    if (seeded) return;
    setSeeded(true);
    try {
      const existing = await sb("partidos?select=id&limit=1");
      if (existing.length > 0) return; // ya hay datos
      // Insertar 72 partidos
      await sb("partidos", {method:"POST", body:JSON.stringify(PARTIDOS_SEED)});
      // Insertar participantes del CSV
      const nombresCSV = Object.keys(CSV_PRONOSTICOS);
      const particsInsert = nombresCSV.map(n=>({nombre:n}));
      const insPartics = await sb("participantes", {method:"POST", body:JSON.stringify(particsInsert)});
      // Insertar pronósticos
      const allProns = [];
      insPartics.forEach(p => {
        const preds = CSV_PRONOSTICOS[p.nombre];
        if (!preds) return;
        preds.forEach((pred, idx) => {
          allProns.push({participante_id:p.id, partido_id:idx+1, pred_a:pred[0], pred_b:pred[1], puntos:0});
        });
      });
      // batch de 500
      for (let i=0;i<allProns.length;i+=500) {
        await sb("pronosticos",{method:"POST",body:JSON.stringify(allProns.slice(i,i+500))});
      }
      await fetchAll();
    } catch(e) { console.error("Seed error:", e); }
  }

  useEffect(() => { seedData().then(fetchAll); }, []);

  const TABS = [
    {id:"hoy", label:"⚽ Hoy"},
    {id:"calendario", label:"📅 Calendario"},
    {id:"posiciones", label:"🏆 Posiciones"},
    {id:"grupos", label:"🌍 Grupos"},
    {id:"admin", label:"⚙️ Admin"},
  ];

  return (
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo-area">
            <div className="logo-ball">⚽</div>
            <div className="logo-text">
              <div className="logo-title">QUINIELA DESTIN</div>
              <div className="logo-sub">Mundial FIFA 2026</div>
            </div>
          </div>
          <div className="prize-pill">$10 inscripción</div>
        </div>
        <nav className="nav-tabs">
          {TABS.map(t=>(
            <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </nav>
      </header>
      <main className="main">
        {loading ? (
          <div className="loading">CARGANDO DATOS...</div>
        ) : (
          <>
            {tab==="hoy" && <TabHoy partidos={partidos} pronosticos={pronosticos} participantes={participantes}/>}
            {tab==="calendario" && <TabCalendario partidos={partidos} pronosticos={pronosticos} participantes={participantes}/>}
            {tab==="posiciones" && <TabPosiciones partidos={partidos} pronosticos={pronosticos} participantes={participantes}/>}
            {tab==="grupos" && <TabGrupos partidos={partidos}/>}
            {tab==="admin" && <TabAdmin partidos={partidos} participantes={participantes} pronosticos={pronosticos} onRefresh={fetchAll}/>}
          </>
        )}
      </main>
      <button className="scroll-top" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>↑</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
