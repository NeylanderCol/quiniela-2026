<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiniela Destin — Mundial FIFA 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A1F5C;--navy-mid:#122680;--red:#CC0000;--red-l:#e60000;
  --gold:#F5A623;--gold-l:#FFB940;--white:#FFF;--gm:#B0BBDD;--gt:#6B7BAA;--bg:#060F33;
  --green:#4ADB8A;--blue:#6496FF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}

/* ── HEADER ─────────────────────────────────────────────── */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,var(--red) 100%);padding:16px 18px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-ball{width:42px;height:42px;background:radial-gradient(circle at 35% 35%,#fff 0%,#ddd 60%,#aaa 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.logo-text{font-family:'Barlow Condensed',sans-serif;}
.logo-title{font-size:21px;font-weight:800;letter-spacing:1px;line-height:1;}
.logo-sub{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.prize-pill{background:var(--gold);color:var(--navy);padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;cursor:pointer;padding:9px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--gm);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;}
.tab-btn:hover{color:var(--white);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── LAYOUT ─────────────────────────────────────────────── */
.main{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
.card{background:var(--navy);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:14px;}
.card.gold-card{border-color:rgba(245,166,35,.35);background:rgba(245,166,35,.05);}
.card.green-card{border-color:rgba(74,219,138,.3);background:rgba(74,219,138,.04);}
.card.red-card{border-color:rgba(204,0,0,.35);background:rgba(204,0,0,.05);}
.card.blue-card{border-color:rgba(100,150,255,.3);background:rgba(100,150,255,.05);}

/* ── PORTALES SELECTOR ──────────────────────────────────── */
.portales{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.portal-card{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:22px 16px;cursor:pointer;text-decoration:none;color:var(--white);display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .25s;position:relative;overflow:hidden;}
.portal-card.grupos:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.4);}
.portal-card.ko:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.4);}
.portal-icon{font-size:36px;line-height:1;}
.portal-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:1px;text-align:center;line-height:1.2;}
.portal-desc{font-size:11px;color:var(--gm);text-align:center;line-height:1.5;}
.portal-badge{padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;}
.badge-grupos{background:rgba(245,166,35,.2);color:var(--gold);}
.badge-ko{background:rgba(204,0,0,.2);color:#FF6666;}

/* ── SECCIONES REGLAMENTO ────────────────────────────────── */
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid rgba(245,166,35,.25);display:flex;align-items:center;gap:9px;}
.sec-title .ico{font-size:18px;}
p{font-size:13px;line-height:1.85;color:rgba(255,255,255,.9);}
p+p{margin-top:8px;}

/* ── PUNTUACIÓN ─────────────────────────────────────────── */
.pts-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.pts-row:last-child{border-bottom:none;padding-bottom:0;}
.pts-badge{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;min-width:50px;text-align:center;padding:5px 0;border-radius:7px;flex-shrink:0;line-height:1.1;}
.b5{background:var(--gold);color:var(--navy);}
.b4{background:var(--green);color:var(--navy);}
.b3{background:var(--blue);color:#fff;}
.b2{background:rgba(255,100,200,.8);color:#fff;}
.b0{background:rgba(255,255,255,.1);color:var(--gm);}
.pts-body{flex:1;font-size:13px;line-height:1.7;}
.pts-body strong{color:var(--white);}
.pts-ex{font-size:11px;color:var(--gm);margin-top:5px;padding:5px 8px;background:rgba(0,0,0,.2);border-radius:5px;line-height:1.7;}
.pts-ex span{color:var(--green);font-weight:700;}

/* ── COMBINACIONES ──────────────────────────────────────── */
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:8px;}
.combo-card{background:rgba(0,0,0,.25);border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,.07);}
.combo-total{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--gold);margin-bottom:3px;}
.combo-label{font-size:11px;color:var(--gm);line-height:1.5;}
.combo-breakdown{font-size:10px;color:var(--gt);margin-top:4px;}

/* ── PODIO ──────────────────────────────────────────────── */
.podio-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.podio-row:last-child{border-bottom:none;}
.podio-icon{font-size:26px;min-width:32px;text-align:center;}
.podio-pts{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gold);min-width:40px;text-align:right;}

/* ── FLUJO PASOS ────────────────────────────────────────── */
.paso{display:flex;gap:12px;margin-bottom:12px;}
.paso-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gold);min-width:26px;padding-top:1px;}
.paso-body{flex:1;font-size:13px;line-height:1.75;}
.paso-body strong{color:var(--gold);}
.paso-body em{color:var(--green);font-style:normal;}

/* ── ALERTS ─────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;line-height:1.7;}
.al-gold{background:rgba(245,166,35,.09);border:1px solid rgba(245,166,35,.3);color:var(--gold);}
.al-red{background:rgba(204,0,0,.09);border:1px solid rgba(204,0,0,.3);color:#FF9999;}
.al-green{background:rgba(74,219,138,.07);border:1px solid rgba(74,219,138,.25);color:var(--green);}
.al-blue{background:rgba(100,150,255,.07);border:1px solid rgba(100,150,255,.25);color:#AAC0FF;}

/* ── SIMULADOR ──────────────────────────────────────────── */
.sim-panel{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:16px;margin-bottom:12px;}
.sim-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gm);text-transform:uppercase;margin-bottom:8px;}
.sim-teams{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sim-team{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.sim-team-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-align:center;}
.sim-inp{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:8px;padding:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;width:64px;text-align:center;transition:border-color .2s;}
.sim-inp:focus{outline:none;border-color:var(--gold);}
.sim-inp.pred{border-color:rgba(100,150,255,.4);}
.sim-inp.real{border-color:rgba(74,219,138,.4);}
.sim-vs{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--gm);font-weight:300;}
.clasif-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.clasif-btn{padding:5px 12px;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.clasif-btn.sel{background:var(--gold);color:var(--navy);}
.clasif-btn.unsel{background:rgba(255,255,255,.08);color:var(--gm);border:1px solid rgba(255,255,255,.15);}

/* RESULTADO SIMULADOR */
.sim-result{border-radius:10px;padding:18px;margin-top:12px;transition:all .3s;}
.sim-result.none{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);}
.sim-result.show{background:rgba(10,31,92,.8);border:1px solid rgba(245,166,35,.4);}
.sim-pts-total{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;line-height:1;text-align:center;margin-bottom:4px;}
.sim-pts-label{font-size:11px;color:var(--gm);text-align:center;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;margin-bottom:14px;}
.sim-breakdown{display:flex;flex-direction:column;gap:6px;}
.sim-br-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;}
.sim-br-ok{background:rgba(74,219,138,.1);border:1px solid rgba(74,219,138,.2);}
.sim-br-no{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);}
.sim-br-pts{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;min-width:32px;text-align:center;}
.sim-br-desc{font-size:12px;flex:1;line-height:1.5;}

/* EJEMPLOS RÁPIDOS */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:10px;}
.quick-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:8px 10px;cursor:pointer;text-align:center;transition:all .2s;color:var(--white);}
.quick-btn:hover{border-color:var(--gold);background:rgba(245,166,35,.07);}
.quick-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--gold);margin-bottom:3px;}
.quick-sub{font-size:10px;color:var(--gm);line-height:1.4;}

/* ETAPAS TABLA */
.etapa-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.etapa-row:last-child{border-bottom:none;}
.etapa-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;}
.eb16{background:rgba(100,150,255,.2);color:var(--blue);}
.eb8{background:rgba(245,166,35,.2);color:var(--gold);}
.eb4{background:rgba(74,219,138,.2);color:var(--green);}
.ebs{background:rgba(204,0,0,.2);color:#FF6666;}
.ebf{background:linear-gradient(135deg,rgba(245,166,35,.4),rgba(204,0,0,.4));color:#fff;}

/* PREMIOS */
.premio-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.premio-row:last-child{border-bottom:none;}
.premio-pct{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--gold);min-width:50px;}

/* SCROLL */
.scroll-top{position:fixed;bottom:20px;right:16px;background:var(--gold);color:var(--navy);width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:50;}
.sep{width:40px;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.4),transparent);margin:20px auto;}

@media(max-width:480px){
  .portales{grid-template-columns:1fr;}
  .combo-grid{grid-template-columns:1fr 1fr;}
  .sim-pts-total{font-size:38px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

// ── LÓGICA PUNTUACIÓN ────────────────────────────────────────
function calcMarcador(pa, pb, ra, rb) {
  if (pa==='' || pb==='' || ra==='' || rb==='') return null;
  const [pA,pB,rA,rB] = [+pa,+pb,+ra,+rb];
  if (pA===rA && pB===rB) return {pts:5, razon:'Marcador exacto'};
  const predGanaA=pA>pB, predGanaB=pB>pA, predEmp=pA===pB;
  const realGanaA=rA>rB, realGanaB=rB>rA, realEmp=rA===rB;
  const ganadorOk=(predGanaA&&realGanaA)||(predGanaB&&realGanaB)||(predEmp&&realEmp);
  if (!ganadorOk) return {pts:0, razon:'Resultado incorrecto'};
  if ((pA-pB)===(rA-rB)) return {pts:4, razon:'Ganador correcto + diferencia de goles igual'};
  return {pts:3, razon:'Ganador o empate correcto'};
}

function calcClasificado(clasPred, clasReal) {
  if (!clasPred || !clasReal) return null;
  return clasPred===clasReal
    ? {pts:2, razon:'Clasificado acertado'}
    : {pts:0, razon:'Clasificado incorrecto'};
}

// ── SIMULADOR ────────────────────────────────────────────────
function Simulador() {
  const [pA, setPA] = useState('');
  const [pB, setPB] = useState('');
  const [rA, setRA] = useState('');
  const [rB, setRB] = useState('');
  const [clasPred, setClasPred] = useState('');
  const [clasReal, setClasReal] = useState('');

  const EQUIPO_A = 'Equipo A';
  const EQUIPO_B = 'Equipo B';

  const predEmpate = pA!==''&&pB!==''&&+pA===+pB;
  const realEmpate = rA!==''&&rB!==''&&+rA===+rB;

  // Clasificado implícito si no hay empate
  const clasPredFinal = predEmpate ? clasPred : (pA!==''&&pB!=='' ? (+pA>+pB?EQUIPO_A:EQUIPO_B) : '');
  const clasRealFinal = realEmpate ? clasReal : (rA!==''&&rB!=='' ? (+rA>+rB?EQUIPO_A:EQUIPO_B) : '');

  const marcador = useMemo(()=>calcMarcador(pA,pB,rA,rB),[pA,pB,rA,rB]);
  const clasificado = useMemo(()=>calcClasificado(clasPredFinal,clasRealFinal),[clasPredFinal,clasRealFinal]);

  const total = (marcador?.pts||0) + (clasificado?.pts||0);
  const haySuficiente = pA!==''&&pB!==''&&rA!==''&&rB!==''&&(!realEmpate||clasReal)&&(!predEmpate||clasPred);

  function colorPts(pts) {
    if (pts>=5) return 'var(--gold)';
    if (pts>=3) return 'var(--green)';
    if (pts===2) return '#FF88DD';
    return 'var(--gm)';
  }

  function cargarEjemplo(e) {
    setPA(String(e.pA)); setPB(String(e.pB));
    setRA(String(e.rA)); setRB(String(e.rB));
    setClasPred(e.clasPred||''); setClasReal(e.clasReal||'');
  }

  const EJEMPLOS = [
    {label:'Exacto perfecto',sub:'Pred 2-1 / Real 2-1',pA:2,pB:1,rA:2,rB:1,clasPred:'',clasReal:''},
    {label:'Ganador + dif igual',sub:'Pred 2-0 / Real 3-1',pA:2,pB:0,rA:3,rB:1,clasPred:'',clasReal:''},
    {label:'Solo ganador',sub:'Pred 3-1 / Real 2-1',pA:3,pB:1,rA:2,rB:1,clasPred:'',clasReal:''},
    {label:'Empate exacto',sub:'Pred 1-1 / Real 1-1',pA:1,pB:1,rA:1,rB:1,clasPred:EQUIPO_A,clasReal:EQUIPO_A},
    {label:'Empate, dif igual',sub:'Pred 0-0 / Real 1-1',pA:0,pB:0,rA:1,rB:1,clasPred:EQUIPO_A,clasReal:EQUIPO_A},
    {label:'Clasif. correcto solo',sub:'Pred 0-1 / Real 2-1',pA:0,pB:1,rA:2,rB:1,clasPred:'',clasReal:''},
    {label:'Fallo total',sub:'Pred 2-0 / Real 0-1',pA:2,pB:0,rA:0,rB:1,clasPred:'',clasReal:''},
    {label:'Empate mal clasif.',sub:'Pred 1-1 A / Real 1-1 B',pA:1,pB:1,rA:1,rB:1,clasPred:EQUIPO_A,clasReal:EQUIPO_B},
  ];

  return (
    <div>
      <div className="alert al-blue" style={{marginBottom:16}}>
        Ingresá una predicción y un resultado real para ver exactamente cuántos puntos generaría y por qué.
      </div>

      {/* PREDICCIÓN */}
      <div className="sim-panel">
        <div className="sim-label">🎯 Tu predicción</div>
        <div className="sim-teams">
          <div className="sim-team">
            <div className="sim-team-name">Equipo A</div>
            <input className="sim-inp pred" type="number" min="0" max="20"
              placeholder="0" value={pA} onChange={e=>{setPA(e.target.value);setClasPred('');}}/>
          </div>
          <div className="sim-vs">–</div>
          <div className="sim-team">
            <input className="sim-inp pred" type="number" min="0" max="20"
              placeholder="0" value={pB} onChange={e=>{setPB(e.target.value);setClasPred('');}}/>
            <div className="sim-team-name">Equipo B</div>
          </div>
        </div>
        {predEmpate && pA!=='' && (
          <div>
            <div style={{fontSize:12,color:'var(--gold)',fontFamily:'Barlow Condensed',fontWeight:700,marginBottom:6}}>
              ⚠️ Predecís empate — ¿quién clasificaría?
            </div>
            <div className="clasif-row">
              <button className={`clasif-btn ${clasPred===EQUIPO_A?'sel':'unsel'}`} onClick={()=>setClasPred(EQUIPO_A)}>Equipo A</button>
              <button className={`clasif-btn ${clasPred===EQUIPO_B?'sel':'unsel'}`} onClick={()=>setClasPred(EQUIPO_B)}>Equipo B</button>
            </div>
          </div>
        )}
        {!predEmpate && pA!=='' && pB!=='' && (
          <div style={{fontSize:11,color:'var(--gm)',marginTop:4}}>
            Clasificado implícito: <strong style={{color:'var(--white)'}}>{+pA>+pB?'Equipo A':'Equipo B'}</strong> (se asume automáticamente)
          </div>
        )}
      </div>

      {/* RESULTADO REAL */}
      <div className="sim-panel">
        <div className="sim-label">✅ Resultado real (a 120 min)</div>
        <div className="sim-teams">
          <div className="sim-team">
            <div className="sim-team-name">Equipo A</div>
            <input className="sim-inp real" type="number" min="0" max="20"
              placeholder="0" value={rA} onChange={e=>{setRA(e.target.value);setClasReal('');}}/>
          </div>
          <div className="sim-vs">–</div>
          <div className="sim-team">
            <input className="sim-inp real" type="number" min="0" max="20"
              placeholder="0" value={rB} onChange={e=>{setRB(e.target.value);setClasReal('');}}/>
            <div className="sim-team-name">Equipo B</div>
          </div>
        </div>
        {realEmpate && rA!=='' && (
          <div>
            <div style={{fontSize:12,color:'var(--green)',fontFamily:'Barlow Condensed',fontWeight:700,marginBottom:6}}>
              Empate en 120 min — ¿quién clasificó (penales)?
            </div>
            <div className="clasif-row">
              <button className={`clasif-btn ${clasReal===EQUIPO_A?'sel':'unsel'}`} onClick={()=>setClasReal(EQUIPO_A)}>Equipo A</button>
              <button className={`clasif-btn ${clasReal===EQUIPO_B?'sel':'unsel'}`} onClick={()=>setClasReal(EQUIPO_B)}>Equipo B</button>
            </div>
          </div>
        )}
        {!realEmpate && rA!=='' && rB!=='' && (
          <div style={{fontSize:11,color:'var(--gm)',marginTop:4}}>
            Clasificado: <strong style={{color:'var(--white)'}}>{+rA>+rB?'Equipo A':'Equipo B'}</strong>
          </div>
        )}
      </div>

      {/* RESULTADO */}
      <div className={`sim-result ${haySuficiente?'show':'none'}`}>
        {haySuficiente ? (
          <>
            <div className="sim-pts-total" style={{color:colorPts(total)}}>{total}</div>
            <div className="sim-pts-label">puntos totales</div>
            <div className="sim-breakdown">
              {marcador && (
                <div className={`sim-br-row ${marcador.pts>0?'sim-br-ok':'sim-br-no'}`}>
                  <div className="sim-br-pts" style={{color:marcador.pts>=5?'var(--gold)':marcador.pts>=3?'var(--green)':'var(--gm)'}}>
                    {marcador.pts>0?`+${marcador.pts}`:'✗'}
                  </div>
                  <div className="sim-br-desc">
                    <strong>Marcador:</strong> {marcador.razon}
                    {marcador.pts===4&&<div style={{fontSize:10,color:'var(--gm)',marginTop:2}}>
                      Pred {pA}–{pB} (dif {+pA-+pB>0?'+':''}{+pA-+pB}) · Real {rA}–{rB} (dif {+rA-+rB>0?'+':''}{+rA-+rB})
                    </div>}
                  </div>
                </div>
              )}
              {clasificado && (
                <div className={`sim-br-row ${clasificado.pts>0?'sim-br-ok':'sim-br-no'}`}>
                  <div className="sim-br-pts" style={{color:clasificado.pts>0?'#FF88DD':'var(--gm)'}}>
                    {clasificado.pts>0?`+${clasificado.pts}`:'✗'}
                  </div>
                  <div className="sim-br-desc">
                    <strong>Clasificado:</strong> {clasificado.razon}
                    <div style={{fontSize:10,color:'var(--gm)',marginTop:2}}>
                      Predijiste: {clasPredFinal} · Real: {clasRealFinal}
                    </div>
                  </div>
                </div>
              )}
              {total===7&&(
                <div style={{textAlign:'center',marginTop:8,fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,color:'var(--gold)'}}>
                  🌟 ¡Puntaje máximo posible en un partido!
                </div>
              )}
            </div>
          </>
        ) : (
          <div style={{textAlign:'center',color:'var(--gm)',fontSize:12,padding:'10px 0'}}>
            Completá los campos para ver el resultado
          </div>
        )}
      </div>

      {/* EJEMPLOS RÁPIDOS */}
      <div style={{marginTop:16}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,fontWeight:700,letterSpacing:1.5,color:'var(--gm)',marginBottom:8,textTransform:'uppercase'}}>
          Ejemplos rápidos →
        </div>
        <div className="quick-grid">
          {EJEMPLOS.map((e,i)=>(
            <button key={i} className="quick-btn" onClick={()=>cargarEjemplo(e)}>
              <div className="quick-title">{e.label}</div>
              <div className="quick-sub">{e.sub}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

          {ico:'📱',t:'Guardá tu PIN','d':'Sin PIN no podés ingresar a las rondas siguientes. El admin puede restablecerlo, pero es tu responsabilidad no perderlo.'},
          {ico:'⚖️',t:'Decisión del admin','d':'Cualquier situación no contemplada en este reglamento será resuelta por el administrador. Su decisión es final.'},
        ].map((r,i)=>(
          <div key={i} className="pts-row">

          </div>

      </div>
    </div>
  );
}
