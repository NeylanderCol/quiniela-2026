<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiniela Destin — Mundial FIFA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A1F5C;--navy-mid:#122680;--red:#CC0000;
  --gold:#F5A623;--gold-l:#FFB940;--white:#FFF;--gm:#B0BBDD;--bg:#060F33;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  position:relative;
  overflow:hidden;
}

/* Fondo animado sutil */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(18,38,128,.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(204,0,0,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(245,166,35,.08) 0%, transparent 50%);
  pointer-events:none;
}

.wrap{
  position:relative;
  z-index:1;
  width:100%;
  max-width:480px;
  text-align:center;
}

/* Logo */
.logo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:40px;
}
.ball{
  width:72px;height:72px;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#ddd 60%,#aaa 100%);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  margin-bottom:16px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;
  font-weight:800;
  letter-spacing:2px;
  line-height:1;
  margin-bottom:6px;
}
.subtitle{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;
  color:var(--gold);
  letter-spacing:3px;
  text-transform:uppercase;
}

/* Selector */
.selector-label{
  font-size:12px;
  color:var(--gm);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:20px;
  font-family:'Barlow Condensed',sans-serif;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:32px;
}

.portal-card{
  background:rgba(255,255,255,.04);
  border:2px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:24px 16px;
  cursor:pointer;
  text-decoration:none;
  color:var(--white);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  transition:all .25s;
  position:relative;
  overflow:hidden;
}
.portal-card::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .25s;
  border-radius:14px;
}
.portal-card.grupos::before{
  background:linear-gradient(135deg,rgba(10,31,92,.8),rgba(18,38,128,.4));
}
.portal-card.ko::before{
  background:linear-gradient(135deg,rgba(204,0,0,.2),rgba(245,166,35,.15));
}
.portal-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.portal-card.grupos:hover{
  border-color:var(--gold);
}
.portal-card.ko:hover{
  border-color:var(--red);
}
.portal-card:hover::before{opacity:1;}

.card-icon{
  font-size:38px;
  line-height:1;
  position:relative;
  z-index:1;
}
.card-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;
  font-weight:800;
  letter-spacing:1px;
  position:relative;
  z-index:1;
  text-align:center;
  line-height:1.2;
}
.card-desc{
  font-size:11px;
  color:var(--gm);
  position:relative;
  z-index:1;
  text-align:center;
  line-height:1.5;
}
.card-badge{
  position:relative;
  z-index:1;
  padding:3px 10px;
  border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;
  font-weight:700;
  letter-spacing:1px;
  margin-top:2px;
}
.badge-grupos{background:rgba(245,166,35,.2);color:var(--gold);}
.badge-ko{background:rgba(204,0,0,.2);color:#FF6666;}

/* Inscripción */
.inscripcion{
  font-size:11px;
  color:var(--gm);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.inscripcion strong{color:var(--gold);}

/* Separador */
.sep{
  width:40px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(245,166,35,.4),transparent);
  margin:0 auto 24px;
}

@media(max-width:380px){
  .cards{grid-template-columns:1fr;}
  .title{font-size:26px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="ball">⚽</div>
    <div class="title">QUINIELA DESTIN</div>
    <div class="subtitle">Mundial FIFA 2026</div>
  </div>

  <div class="selector-label">¿A dónde quieres ir?</div>

  <div class="cards">
    <a href="./grupos.html" class="portal-card grupos">
      <div class="card-icon">🌍</div>
      <div class="card-name">Fase de<br/>Grupos</div>
      <div class="card-desc">Partidos, pronósticos y posiciones de la fase inicial</div>
      <div class="card-badge badge-grupos">72 PARTIDOS</div>
    </a>

    <a href="./ko.html" class="portal-card ko">
      <div class="card-icon">🏆</div>
      <div class="card-name">Fase<br/>Eliminatoria</div>
      <div class="card-desc">Bracket, 16avos hasta la Gran Final</div>
      <div class="card-badge badge-ko">FASE KO</div>
    </a>
  </div>

  <div class="sep"></div>

  <div class="inscripcion">
    Inscripción <strong>$10 USD</strong> · Premio acumulado entre todos
  </div>

</div>
</body>
</html>
