.match-time{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);font-weight:600;}
.match-status{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.badge-pending{background:rgba(176,187,221,.15);color:var(--gray-mid);}
.badge-done{background:rgba(26,127,75,.2);color:#4ADB8A;}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:6px;}

.team-flag{font-size:22px;line-height:1;}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:center;line-height:1.2;}
.score-box{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);padding:6px 12px;border-radius:8px;min-width:80px;justify-content:center;flex-shrink:0;}
.score-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.score-sep{font-size:20px;color:var(--gray-mid);font-weight:300;}
.score-pending{font-size:13px;color:var(--gray-mid);font-style:italic;}
.pred-toggle{margin-top:8px;width:100%;background:none;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--gray-mid);padding:6px;font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}

.pred-score{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.pred-pts{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;}

.pts-3-b{background:#6496FF;color:#fff;}

function calcPts(pA,pB,rA,rB){
  if(rA===null||rB===null)return null;
  if(pA===rA&&pB===rB)return 5;
  const ok=(pA>pB&&rA>rB)||(pA<pB&&rA<rB)||(pA===pB&&rA===rB);
  if(!ok)return 0;
  return (pA-pB)===(rA-rB)?4:3;
}

const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function fLarga(f){const[y,m,d]=f.split("-").map(Number);const dt=new Date(y,m-1,d);return `${DIAS[dt.getDay()]}, ${d} de ${MESES[m-1]} ${y}`;}
function todayIQ(){const n=new Date();const u=n.getTime()+n.getTimezoneOffset()*60000;const iq=new Date(u+10800000);return `${iq.getFullYear()}-${String(iq.getMonth()+1).padStart(2,"0")}-${String(iq.getDate()).padStart(2,"0")}`;}

function TeamBlock({name, align="center"}){
  return(
    <div className="team-block" style={{alignItems: align==="right"?"flex-end":align==="left"?"flex-start":"center"}}>
      <span className="team-flag">{F(name)}</span>
      <span className="team-name">{name}</span>
    </div>
  );
}

function MatchCard({p, prons, parts}){
  const[open,setOpen]=useState(false);
  const done=p.finalizado&&p.goles_a!==null;
  const preds=parts.map(pt=>{
    const pr=prons.find(x=>x.participante_id===pt.id&&x.partido_id===p.id);
    if(!pr)return null;
    const pts=done?calcPts(pr.pred_a,pr.pred_b,p.goles_a,p.goles_b):null;
    return{nombre:pt.nombre,pa:pr.pred_a,pb:pr.pred_b,pts};
  }).filter(Boolean);
  return(
    <div className="match-card">
      <div className="match-meta">
        <span className="match-group-badge">GRUPO {p.grupo}</span>
        <span className="match-time">⏰ {p.hora} (Irak)</span>
        <span className={`match-status ${done?"badge-done":"badge-pending"}`}>{done?"✓ FINALIZADO":"PENDIENTE"}</span>
      </div>
      <div className="match-teams">
        <TeamBlock name={p.equipo_a}/>
        <div className="score-box">
          {done?<><span className="score-num">{p.goles_a}</span><span className="score-sep">–</span><span className="score-num">{p.goles_b}</span></>:<span className="score-pending">vs</span>}
        </div>
        <TeamBlock name={p.equipo_b}/>
      </div>
      {preds.length>0&&<>
        <button className="pred-toggle" onClick={()=>setOpen(!open)}>
          {open?"▲ Ocultar pronósticos":`▼ Ver pronósticos (${preds.length} participantes)`}
        </button>
        {open&&<div className="pred-panel"><div className="pred-grid">
          {preds.map(pr=>(
            <div key={pr.nombre} className={`pred-item ${pr.pts===5?"pts-5":pr.pts===4?"pts-4":pr.pts===3?"pts-3":""}`}>
              <span className="pred-name">{pr.nombre.split(" ")[0]}</span>
              <div style={{display:"flex",alignItems:"center"}}>
                <span className="pred-score">{pr.pa}–{pr.pb}</span>
                {pr.pts!==null&&<span className={`pred-pts ${pr.pts===5?"pts-5-b":pr.pts===4?"pts-4-b":pr.pts===3?"pts-3-b":""}`}>{pr.pts>0?`+${pr.pts}`:"0"}</span>}
              </div>
            </div>
          ))}
        </div></div>}
      </>}
    </div>
  );
}

function TabHoy({partidos,prons,parts}){
  const today=todayIQ();
  const hoy=partidos.filter(p=>p.fecha===today);
  return(
    <div>
      <div className="today-header">
        <div className="today-date">{fLarga(today)}</div>
        {hoy.length>0&&<span className="today-count">{hoy.length} partido{hoy.length>1?"s":""}</span>}
      </div>
      {hoy.length===0
        ?<div className="empty-state"><div style={{fontSize:36,marginBottom:10}}>⚽</div><div>No hay partidos programados hoy.</div><div style={{marginTop:6,fontSize:11,color:"#6B7BAA"}}>Revisa el Calendario completo.</div></div>
        :hoy.map(p=><MatchCard key={p.id} p={p} prons={prons} parts={parts}/>)}
    </div>
  );
}

function TabCalendario({partidos,prons,parts}){
  const fechas=[...new Set(partidos.map(p=>p.fecha))].sort();
  const today=todayIQ();
  return(
    <div>
      {fechas.map(f=>(
        <div key={f}>
          <div className="cal-date-hdr">
            <span>{fLarga(f)}</span>
            {f===today&&<span style={{background:"var(--red)",fontSize:9,padding:"2px 6px",borderRadius:3,fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1}}>HOY</span>}
          </div>
          {partidos.filter(p=>p.fecha===f).map(p=><MatchCard key={p.id} p={p} prons={prons} parts={parts}/>)}
        </div>
      ))}
    </div>
  );
}

function TabPosiciones({partidos,prons,parts}){
  const rows=parts.map(p=>{
    let pts=0,e5=0,e4=0,e3=0,e0=0,pend=0;
    prons.filter(pr=>pr.participante_id===p.id).forEach(pr=>{
      const pa=partidos.find(x=>x.id===pr.partido_id);
      if(!pa||!pa.finalizado||pa.goles_a===null){pend++;return;}
      const v=calcPts(pr.pred_a,pr.pred_b,pa.goles_a,pa.goles_b);
      pts+=v;
      if(v===5)e5++;else if(v===4)e4++;else if(v===3)e3++;else e0++;
    });
    return{...p,pts,e5,e4,e3,e0,pend};
  }).sort((a,b)=>b.pts-a.pts||b.e5-a.e5||b.e4-a.e4);
  return(
    <div className="card">
      <div className="card-header">🏆 Tabla de Posiciones — Quiniela Destin 2026</div>
      <div style={{overflowX:"auto"}}>
        <table className="standings-table">
          <thead><tr>

function TabGrupos({partidos}){
  const g={};
  partidos.forEach(p=>{
    if(!g[p.grupo])g[p.grupo]={};
    [p.equipo_a,p.equipo_b].forEach(eq=>{if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gn:0,e:0,pe:0,gf:0,gc:0,dg:0};});
    if(!p.finalizado||p.goles_a===null)return;
    const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
    a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
    a.dg=a.gf-a.gc;b.dg=b.gf-b.gc;
    if(p.goles_a>p.goles_b){a.pts+=3;a.gn++;b.pe++;}
    else if(p.goles_a<p.goles_b){b.pts+=3;b.gn++;a.pe++;}
    else{a.pts++;b.pts++;a.e++;b.e++;}
  });
  const letras=Object.keys(g).sort();
  return(
    <div>
      <div style={{background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,padding:"10px 12px",marginBottom:16,fontSize:11,lineHeight:1.8}}>
        <strong style={{color:"var(--gold)"}}>⚠️ Desempates automáticos:</strong>
        <span style={{color:"var(--gray-mid)"}}> 1) Puntos · 2) Diferencia de goles · 3) Goles a favor · 4) Head-to-head.
        <strong style={{color:"var(--gold)"}}> Fair play (tarjetas), ranking FIFA y sorteo</strong> no son calculables — en igualdad total aplican criterios internos FIFA.</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
        {letras.map(l=>{
          const eqs=Object.entries(g[l]).map(([n,s])=>({n,...s})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
          return(
            <div key={l} className="group-block">
              <div className="group-title-bar">GRUPO {l}</div>
              <table className="group-table">
                <thead><tr><th>Selección</th><th>PJ</th><th>PTS</th><th>DG</th><th>GF</th><th>GC</th><th>G</th><th>E</th><th>P</th></tr></thead>
                <tbody>{eqs.map((eq,i)=>(
                  <tr key={eq.n}>
                    <td>
                      {i<2&&<span className="q-dot"/>}
                      {i===2&&<span className="t-dot"/>}
                      <span style={{marginRight:5}}>{F(eq.n)}</span>
                      <span style={{fontWeight:600}}>{eq.n}</span>
                    </td>
                    <td>{eq.j}</td>
                    <td><strong style={{color:i<2?"#4ADB8A":"inherit"}}>{eq.pts}</strong></td>
                    <td style={{color:eq.dg>0?"#4ADB8A":eq.dg<0?"#FF6666":"inherit"}}>{eq.dg>0?"+":""}{eq.dg}</td>
                    <td>{eq.gf}</td><td>{eq.gc}</td><td>{eq.gn}</td><td>{eq.e}</td><td>{eq.pe}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,fontSize:11,color:"var(--gray-mid)",display:"flex",gap:14,flexWrap:"wrap"}}>
        <span><span className="q-dot"/>Clasificado directo (1° y 2°)</span>
        <span><span className="t-dot"/>Posible mejor tercero</span>
      </div>
    </div>
  );
}

  return(

              <th>Partido</th>
              {partFiltrados.map(p=><th key={p.id}>{p.nombre.split(" ")[0]}</th>)}
            </tr></thead>
            <tbody>{pFiltrados.map(pa=>{
              const done=pa.finalizado&&pa.goles_a!==null;
              return(
                <tr key={pa.id}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>

                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                      <span>{F(pa.equipo_b)}</span>
                      <span style={{fontSize:11,fontWeight:700}}>{pa.equipo_b}</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--gray-mid)"}}>{pa.fecha} {pa.hora} · G{pa.grupo}</div>
                    {done&&<div style={{fontSize:11,color:"var(--gold)",fontFamily:"Barlow Condensed",fontWeight:700}}>✓ {pa.goles_a}–{pa.goles_b}</div>}
                  </td>
                  {partFiltrados.map(pt=>{
                    const pr=prons.find(x=>x.participante_id===pt.id&&x.partido_id===pa.id);
                    if(!pr)return<td key={pt.id}><span style={{color:"var(--gray-mid)"}}>—</span></td>;
                    const pts=done?calcPts(pr.pred_a,pr.pred_b,pa.goles_a,pa.goles_b):null;
                    const c=pts===5?"c5":pts===4?"c4":pts===3?"c3":pts===0?"c0":"cn";
                    return(
                      <td key={pt.id}>
                        <span className={`pc ${c}`}>{pr.pred_a}–{pr.pred_b}</span>
                        {pts!==null&&<div style={{fontSize:9,fontWeight:700,color:pts===5?"var(--gold)":pts===4?"#4ADB8A":pts===3?"#6496FF":"#FF6666"}}>{pts>0?`+${pts}`:"✗"}</div>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}</tbody>
          </table>
        </div>

    </div>
  );
}

function TabAdmin({partidos,parts,prons,onRefresh}){
  const[authed,setAuthed]=useState(false);
  const[pass,setPass]=useState("");
  const[passErr,setPassErr]=useState(false);
  const[msg,setMsg]=useState(null);
  const[atab,setAtab]=useState("resultados");
  const[selP,setSelP]=useState("");
  const[gA,setGA]=useState("");
  const[gB,setGB]=useState("");
  const[editId,setEditId]=useState(null);
  const[editA,setEditA]=useState("");
  const[editB,setEditB]=useState("");
  const[newN,setNewN]=useState("");
  const[csv,setCsv]=useState("");
  const[csvInfo,setCsvInfo]=useState("");
  const[copied,setCopied]=useState(false);

  const msg2=(t,type="success")=>{setMsg({t,type});setTimeout(()=>setMsg(null),4500);};

  async function recalc(pid,ra,rb){
    const ps=prons.filter(pr=>pr.partido_id===pid);
    for(const pr of ps){
      const pts=calcPts(pr.pred_a,pr.pred_b,ra,rb);
      await sb(`pronosticos?id=eq.${pr.id}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({puntos:pts})});
    }
  }
  async function guardar(){
    if(!selP||gA===""||gB===""){msg2("Completa todos los campos","error");return;}
    const ra=parseInt(gA),rb=parseInt(gB);
    if(isNaN(ra)||isNaN(rb)||ra<0||rb<0){msg2("Goles inválidos","error");return;}
    try{
      await sb(`partidos?id=eq.${selP}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:ra,goles_b:rb,finalizado:true})});
      await recalc(parseInt(selP),ra,rb);
      msg2("✓ Resultado guardado y puntos recalculados");
      setGA("");setGB("");setSelP("");onRefresh();
    }catch(e){msg2("Error: "+e.message,"error");}
  }
  async function guardarEdit(pid){
    const ra=parseInt(editA),rb=parseInt(editB);
    if(isNaN(ra)||isNaN(rb)||ra<0||rb<0){msg2("Valores inválidos","error");return;}
    try{
      await sb(`partidos?id=eq.${pid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:ra,goles_b:rb,finalizado:true})});
      await recalc(pid,ra,rb);
      setEditId(null);msg2("✓ Resultado actualizado");onRefresh();
    }catch(e){msg2("Error: "+e.message,"error");}
  }
  async function anular(pid){
    try{
      await sb(`partidos?id=eq.${pid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:null,goles_b:null,finalizado:false})});
      const ps=prons.filter(pr=>pr.partido_id===pid);
      for(const pr of ps)await sb(`pronosticos?id=eq.${pr.id}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({puntos:0})});
      msg2("✓ Resultado anulado");onRefresh();
    }catch(e){msg2("Error: "+e.message,"error");}
  }
  async function addPart(){
    if(!newN.trim()){msg2("Ingresa un nombre","error");return;}
    try{
      await sb("participantes",{method:"POST",body:JSON.stringify({nombre:newN.trim()})});
      msg2("✓ "+newN.trim()+" agregado");setNewN("");onRefresh();
    }catch(e){msg2("Error: "+e.message,"error");}
  }
  function normalizar(){
    if(!csv.trim()){setCsvInfo("Pega los datos primero");return;}
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    let out=[];
    for(const l of lines){
      const parts=l.split(",").map(s=>s.trim());
      if(parts.length<2)continue;
      const nombre=parts[0];
      const preds=parts.slice(1).filter(p=>/^\d+-\d+$/.test(p));
      if(preds.length>0)out.push(nombre+","+preds.join(","));
    }
    setCsv(out.join("\n"));
    setCsvInfo("✓ "+out.length+" filas normalizadas, listas para importar");
  }
  async function importar(){
    if(!csv.trim()){msg2("Pega el CSV primero","error");return;}
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    let ok=0,err=0;
    for(const line of lines){
      const cols=line.split(",").map(s=>s.trim());
      if(cols.length<2)continue;
      const nombre=cols[0];
      let pt=parts.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase());
      if(!pt){
        try{const r=await sb("participantes",{method:"POST",body:JSON.stringify({nombre})});pt=Array.isArray(r)?r[0]:r;}
        catch{err++;continue;}
      }
      for(let i=1;i<cols.length&&i<=72;i++){
        const sc=cols[i].split("-");
        if(sc.length!==2)continue;
        const pa=parseInt(sc[0]),pb=parseInt(sc[1]);
        if(isNaN(pa)||isNaN(pb))continue;
        const exists=prons.find(pr=>pr.participante_id===pt.id&&pr.partido_id===i);
        if(!exists){
          try{await sb("pronosticos",{method:"POST",prefer:"return=minimal",body:JSON.stringify({participante_id:pt.id,partido_id:i,pred_a:pa,pred_b:pb,puntos:0})});ok++;}
          catch{err++;}
        }
      }
    }
    msg2(`✓ Importación completa: ${ok} pronósticos${err>0?` (${err} errores)`:""}`);
    onRefresh();
  }
  function copyPrompt(){
    navigator.clipboard.writeText(CSV_PROMPT).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  }

  if(!authed) return(
    <div className="login-wrap">
      <div className="login-box">
        <div style={{fontSize:32,marginBottom:10}}>🔐</div>
        <h2>Panel Admin</h2>
        <p>Acceso restringido</p>
        {passErr&&<div className="alert alert-error">Contraseña incorrecta</div>}
        <input className="form-input" type="password" placeholder="Contraseña"
          value={pass} onChange={e=>{setPass(e.target.value);setPassErr(false);}}
          onKeyDown={e=>{if(e.key==="Enter"){if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}}
          style={{marginBottom:10}}/>
        <button className="btn btn-primary" style={{width:"100%",marginTop:6}}
          onClick={()=>{if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}>
          ENTRAR
        </button>
      </div>
    </div>
  );

  const terminados=partidos.filter(p=>p.finalizado&&p.goles_a!==null).sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.hora.localeCompare(a.hora));
  const pendientes=partidos.filter(p=>!p.finalizado).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));
  const selPartido=partidos.find(p=>p.id===parseInt(selP));

  return(
    <div>
      {msg&&<div className={`alert alert-${msg.type}`}>{msg.t}</div>}
      <div className="admin-tabs">
        {[["resultados","📊 Registrar"],["historial","📋 Historial ("+terminados.length+")"],["participantes","👥 Participantes"],["csv","📁 CSV"]].map(([id,lbl])=>(
          <button key={id} className={`btn btn-sm ${atab===id?"btn-primary":"btn-secondary"}`} onClick={()=>setAtab(id)}>{lbl}</button>
        ))}
      </div>

      {atab==="resultados"&&(
        <div className="card">
          <div style={{fontFamily:"Barlow Condensed",fontSize:15,fontWeight:700,color:"var(--gold)",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>📊 Registrar Resultado</div>
          <div className="form-group" style={{marginBottom:12}}>
            <label className="form-label">Selecciona el partido</label>
            <select className="form-input" value={selP} onChange={e=>setSelP(e.target.value)}>
              <option value="">— Elige un partido pendiente —</option>
              {pendientes.map(p=>(
                <option key={p.id} value={p.id}>[{p.fecha} {p.hora}] G{p.grupo}: {p.equipo_a} vs {p.equipo_b}</option>
              ))}
            </select>
          </div>
          {selPartido&&(
            <div style={{background:"rgba(0,0,0,.25)",borderRadius:8,padding:"14px",marginBottom:10}}>
              <div style={{fontFamily:"Barlow Condensed",fontSize:11,color:"var(--gray-mid)",marginBottom:10,letterSpacing:1}}>INGRESA EL RESULTADO FINAL</div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
                  <span style={{fontSize:22}}>{F(selPartido.equipo_a)}</span>
                  <span style={{fontFamily:"Barlow Condensed",fontSize:14,fontWeight:700}}>{selPartido.equipo_a}</span>
                  <input className="edit-input" type="number" min="0" max="20" placeholder="0" value={gA} onChange={e=>setGA(e.target.value)} style={{width:60,fontSize:22,padding:"6px"}}/>
                </div>
                <span style={{color:"var(--gray-mid)",fontSize:22,fontWeight:300}}>–</span>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
                  <span style={{fontSize:22}}>{F(selPartido.equipo_b)}</span>
                  <span style={{fontFamily:"Barlow Condensed",fontSize:14,fontWeight:700}}>{selPartido.equipo_b}</span>
                  <input className="edit-input" type="number" min="0" max="20" placeholder="0" value={gB} onChange={e=>setGB(e.target.value)} style={{width:60,fontSize:22,padding:"6px"}}/>
                </div>

              <button className="btn btn-primary" style={{width:"100%",marginTop:14}} onClick={guardar}>✓ GUARDAR Y CALCULAR PUNTOS</button>

          <div style={{fontFamily:"Barlow Condensed",fontSize:15,fontWeight:700,color:"var(--gold)",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>📁 Importar Pronósticos CSV</div>
          <div className="prompt-box">
            <div className="prompt-label">Prompt para normalizar con IA (ChatGPT / Claude)</div>
            <button className="prompt-copy-btn" onClick={copyPrompt}>{copied?"✓ COPIADO":"COPIAR"}</button>
            <div className="prompt-text">{CSV_PROMPT}</div>
          </div>
          <div style={{fontSize:11,color:"var(--gray-mid)",marginBottom:12,lineHeight:1.8}}>
            <strong style={{color:"var(--gold)"}}>Flujo recomendado:</strong><br/>
            1. Copia el prompt de arriba → pégalo en ChatGPT o Claude<br/>
            2. Pega los datos de tu Excel al final del prompt<br/>
            3. Copia el CSV que genera la IA<br/>
            4. Pégalo abajo → Normalizar → Importar
          </div>
          <label className="form-label" style={{marginBottom:6,display:"block"}}>CSV a importar:</label>
          <textarea className="form-input" rows={6}
            placeholder={"Pedro García,2-1,1-0,3-1,...\nAna Torres,1-1,2-0,..."}
            value={csv} onChange={e=>setCsv(e.target.value)}
            style={{resize:"vertical",fontFamily:"monospace",fontSize:12,marginBottom:8}}/>
          {csvInfo&&<div className="alert alert-info" style={{marginBottom:8}}>{csvInfo}</div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn btn-secondary" onClick={normalizar}>🔧 NORMALIZAR</button>
            <button className="btn btn-primary" onClick={importar}>⬆️ IMPORTAR</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("hoy");
  const[partidos,setPartidos]=useState([]);
  const[parts,setParts]=useState([]);
  const[prons,setProns]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const seedDone=useRef(false);

  const fetchAll=useCallback(async()=>{
    try{
      const[pa,pt,pr]=await Promise.all([
        sb("partidos?select=*&order=fecha,hora"),
        sb("participantes?select=*&order=created_at"),
        sb("pronosticos?select=*"),
      ]);
      setPartidos(pa);setParts(pt);setProns(pr);setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  async function seed(){
    if(seedDone.current)return;
    seedDone.current=true;
    try{
      const ex=await sb("partidos?select=id&limit=1");
      if(ex.length>0){await fetchAll();return;}
      // Partidos en lotes de 12
      for(let i=0;i<PARTIDOS_SEED.length;i+=12)
        await sb("partidos",{method:"POST",prefer:"return=minimal",body:JSON.stringify(PARTIDOS_SEED.slice(i,i+12))});
      // Participantes uno a uno para obtener IDs
      const inserted=[];
      for(const nombre of Object.keys(CSV_PRONOSTICOS)){
        const r=await sb("participantes",{method:"POST",body:JSON.stringify({nombre})});
        inserted.push(Array.isArray(r)?r[0]:r);
      }
      // Pronósticos en lotes de 72
      const all=[];
      inserted.forEach(p=>{
        const preds=CSV_PRONOSTICOS[p.nombre];
        if(!preds)return;
        preds.forEach((pr,idx)=>all.push({participante_id:p.id,partido_id:idx+1,pred_a:pr[0],pred_b:pr[1],puntos:0}));
      });
      for(let i=0;i<all.length;i+=72)
        await sb("pronosticos",{method:"POST",prefer:"return=minimal",body:JSON.stringify(all.slice(i,i+72))});
    }catch(e){setError("Error cargando datos iniciales: "+e.message);setLoading(false);return;}
    await fetchAll();
  }

  useEffect(()=>{seed();},[]);

  const TABS=[
    {id:"hoy",l:"⚽ Hoy"},
    {id:"calendario",l:"📅 Calendario"},
    {id:"posiciones",l:"🏆 Posiciones"},
    {id:"grupos",l:"🌍 Grupos"},
    {id:"pronosticos",l:"📊 Pronósticos"},
    {id:"admin",l:"⚙️ Admin"},
  ];

  return(
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo-area">
            <div className="logo-ball">⚽</div>
            <div className="logo-text">
              <div className="logo-title">QUINIELA DESTIN</div>
              <div className="logo-sub">Mundial FIFA 2026</div>
            </div>
          </div>
          <div className="prize-pill">Inscripción $10</div>
        </div>
        <nav className="nav-tabs">
          {TABS.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
        </nav>
      </header>
      <main className="main">
        {loading?(
          <div className="loading"><div className="spinner"/><span style={{fontFamily:"Barlow Condensed",letterSpacing:2,fontSize:14}}>CARGANDO...</span></div>
        ):error?(
          <div className="card" style={{textAlign:"center",padding:30}}>
            <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
            <div style={{color:"#FF6666",fontWeight:600,marginBottom:8}}>Error de conexión</div>
            <div style={{fontSize:12,color:"var(--gray-mid)",marginBottom:14,wordBreak:"break-all"}}>{error}</div>
            <button className="btn btn-primary" onClick={()=>{setLoading(true);setError(null);seed();}}>Reintentar</button>
          </div>
        ):(
          <>
            {tab==="hoy"&&<TabHoy partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="calendario"&&<TabCalendario partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="posiciones"&&<TabPosiciones partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="grupos"&&<TabGrupos partidos={partidos}/>}
            {tab==="pronosticos"&&<TabPronosticos partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="admin"&&<TabAdmin partidos={partidos} parts={parts} prons={prons} onRefresh={fetchAll}/>}
          </>
        )}
      </main>
      <button className="scroll-top" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>↑</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
