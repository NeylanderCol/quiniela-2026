<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>Quiniela Destin — Mundial FIFA 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0A1F5C;--navy-mid:#122680;--red:#CC0000;--red-l:#e60000;--gold:#F5A623;--gold-l:#FFB940;--white:#FFF;--gm:#B0BBDD;--gt:#6B7BAA;--bg:#060F33;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,var(--red) 100%);padding:14px 18px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-ball{width:40px;height:40px;background:radial-gradient(circle at 35% 35%,#fff 0%,#ddd 60%,#aaa 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0;}
.logo-text{font-family:'Barlow Condensed',sans-serif;}
.logo-title{font-size:20px;font-weight:800;letter-spacing:1px;line-height:1;}
.logo-sub{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.prize-pill{background:var(--gold);color:var(--navy);padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;cursor:pointer;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--gm);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;}
.tab-btn:hover{color:var(--white);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{max-width:960px;margin:0 auto;padding:18px 14px 60px;}
.card{background:var(--navy);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;margin-bottom:14px;}
.match-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.grp-badge{background:var(--red);color:#fff;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;}
.match-time{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);font-weight:600;}
.match-st{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.st-pend{background:rgba(176,187,221,.15);color:var(--gm);}
.st-done{background:rgba(26,127,75,.2);color:#4ADB8A;}
.match-teams{display:flex;align-items:center;gap:8px;}
.team-blk{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
.team-flag{font-size:28px;line-height:1;display:block;}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:center;line-height:1.2;}
.score-box{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);padding:6px 14px;border-radius:8px;min-width:84px;justify-content:center;flex-shrink:0;}
.score-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;}
.score-sep{font-size:20px;color:var(--gm);font-weight:300;}
.score-vs{font-size:13px;color:var(--gm);font-style:italic;}
.pred-toggle{margin-top:8px;width:100%;background:none;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--gm);padding:6px;font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.pred-toggle:hover{border-color:var(--gold);color:var(--gold);}
.pred-panel{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);}
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px;}
.pred-item{background:rgba(255,255,255,.04);border-radius:6px;padding:7px 9px;display:flex;justify-content:space-between;align-items:center;border:1px solid transparent;}
.pi-5{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.08);}
.pi-4{border-color:rgba(74,219,138,.4);background:rgba(74,219,138,.06);}
.pi-3{border-color:rgba(100,150,255,.4);background:rgba(100,150,255,.06);}
.pred-name{font-size:11px;color:var(--gm);}
.pred-sc{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.pred-pts{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;}
.b5{background:var(--gold);color:var(--navy);}
.b4{background:#4ADB8A;color:var(--navy);}
.b3{background:#6496FF;color:#fff;}
/* STANDINGS */
.st-table{width:100%;border-collapse:collapse;}
.st-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-align:left;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.1);text-transform:uppercase;}
.st-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);}
.st-table tr:hover td{background:rgba(255,255,255,.03);}
.pos-b{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;}
.p1{background:var(--gold);color:var(--navy);}
.p2{background:var(--gm);color:var(--navy);}
.p3{background:#CD7F32;color:#fff;}
.px{background:rgba(255,255,255,.1);color:#fff;}
.pts-big{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gold);}
/* GROUPS */
.g-blk{margin-bottom:16px;}
.g-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;background:var(--red);padding:5px 12px;border-radius:6px 6px 0 0;display:inline-block;margin-bottom:1px;}
.g-table{width:100%;border-collapse:collapse;}
.g-table th{background:rgba(255,255,255,.06);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gm);text-align:center;padding:5px 6px;text-transform:uppercase;}
.g-table th:first-child{text-align:left;}
.g-table td{padding:7px 6px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05);}
.g-table td:first-child{text-align:left;padding-left:8px;}
.g-table tr:nth-child(1) td,.g-table tr:nth-child(2) td{background:rgba(26,127,75,.08);}
.qdot{display:inline-block;width:6px;height:6px;background:#4ADB8A;border-radius:50%;margin-right:4px;vertical-align:middle;}
.tdot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin-right:4px;vertical-align:middle;}
/* ALL PREDS */
.ap-wrap{overflow-x:auto;}
.ap-table{border-collapse:collapse;font-size:11px;min-width:500px;width:100%;}
.ap-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);text-align:center;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.12);text-transform:uppercase;background:rgba(0,0,0,.2);white-space:nowrap;}
.ap-table th:first-child{text-align:left;position:sticky;left:0;background:#0d1e52;z-index:2;min-width:170px;}
.ap-table td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;white-space:nowrap;}
.ap-table td:first-child{text-align:left;position:sticky;left:0;background:#060F33;z-index:1;padding-left:6px;}
.ap-table tr:hover td{background:rgba(255,255,255,.03);}
.ap-table tr:hover td:first-child{background:#0d1e52;}
.pc{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;}
.pc5{color:var(--gold);}
.pc4{color:#4ADB8A;}
.pc3{color:#6496FF;}
.pc0{color:#FF6666;}
.pcn{color:var(--gm);}
/* FORMS */
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px;}
.lbl{font-size:10px;font-weight:600;color:var(--gm);letter-spacing:1px;text-transform:uppercase;}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:8px 10px;color:#fff;font-family:'Barlow',sans-serif;font-size:13px;transition:border-color .2s;width:100%;}
.inp:focus{outline:none;border-color:var(--gold);}
.inp option{background:#0A1F5C;}
.btn{padding:9px 18px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn-p{background:var(--gold);color:var(--navy);}
.btn-p:hover{background:var(--gold-l);}
.btn-d{background:var(--red);color:#fff;}
.btn-d:hover{background:var(--red-l);}
.btn-s{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-s:hover{background:rgba(255,255,255,.15);}
.btn-w{background:#E6A817;color:var(--navy);}
.btn-w:hover{background:var(--gold-l);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
/* LOGIN */
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--navy);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;width:100%;max-width:340px;text-align:center;}
.login-box h2{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;margin-bottom:5px;}
.login-box p{font-size:12px;color:var(--gm);margin-bottom:20px;}
.alert{padding:9px 12px;border-radius:6px;font-size:12px;margin-bottom:10px;}
.al-ok{background:rgba(26,127,75,.2);border:1px solid #4ADB8A;color:#4ADB8A;}
.al-err{background:rgba(204,0,0,.2);border:1px solid var(--red);color:#FF6666;}
.al-inf{background:rgba(100,150,255,.15);border:1px solid #6496FF;color:#AAC0FF;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--gm);gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(245,166,35,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px;color:var(--gm);font-size:13px;}
.today-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.today-date{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;}
.today-cnt{background:var(--red);color:#fff;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;}
.cal-hdr{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--gold);padding:8px 0 5px;border-bottom:1px solid rgba(245,166,35,.3);margin-bottom:8px;margin-top:18px;display:flex;align-items:center;gap:8px;}
.cal-hdr:first-child{margin-top:0;}
.scroll-top{position:fixed;bottom:20px;right:16px;background:var(--gold);color:var(--navy);width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:transform .2s;}
.scroll-top:hover{transform:scale(1.1);}
/* ADMIN RESULTS TABLE */
.r-table{width:100%;border-collapse:collapse;font-size:12px;}
.r-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);text-align:left;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.12);text-transform:uppercase;background:rgba(0,0,0,.2);}
.r-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;}
.r-table tr:hover td{background:rgba(255,255,255,.03);}
.sc-pill{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;background:rgba(0,0,0,.3);padding:3px 10px;border-radius:5px;color:var(--gold);}
.e-inp{background:rgba(255,255,255,.08);border:1px solid rgba(245,166,35,.4);border-radius:4px;padding:5px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;width:52px;text-align:center;}
.e-inp:focus{outline:none;border-color:var(--gold);}
/* ADMIN MATCH PICKER */
.match-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:14px;}
.picker-card{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;}
.picker-card:hover{border-color:var(--gold);background:rgba(245,166,35,.06);}
.picker-card.selected{border-color:var(--gold);background:rgba(245,166,35,.1);}
.picker-meta{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gm);letter-spacing:1px;margin-bottom:6px;}
.picker-teams{display:flex;align-items:center;justify-content:center;gap:8px;}
.picker-team{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.picker-flag{font-size:22px;}
.picker-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-align:center;line-height:1.2;}
/* CSV PROMPT */
.prompt-box{background:rgba(0,0,0,.35);border:1px solid rgba(245,166,35,.25);border-radius:10px;padding:16px;margin-bottom:14px;position:relative;}
.prompt-copy{position:absolute;top:10px;right:10px;background:var(--gold);color:var(--navy);border:none;border-radius:5px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;}
.prompt-copy:hover{background:var(--gold-l);}
.prompt-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.prompt-txt{font-size:11px;color:#d0d8f0;line-height:1.9;font-family:monospace;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow-y:auto;}
.adm-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
@media(max-width:600px){
  .header{padding:10px 12px 0;}
  .main{padding:12px 8px 60px;}
  .team-name{font-size:12px;}
  .team-flag{font-size:22px;}
  .score-n{font-size:22px;}
  .pred-grid{grid-template-columns:repeat(2,1fr);}
  .match-picker-grid{grid-template-columns:1fr;}
}

/* TERCEROS + BRACKET LIVE */
.grp-card-live{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.grp-card-live.completo{border-color:rgba(74,219,138,.2);}
.ko-pill{background:rgba(100,150,255,.15);color:#AAC0FF;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;}
</style>

function calcPts(pA,pB,rA,rB){
  if(rA===null||rB===null)return null;
  if(pA===rA&&pB===rB)return 5;
  const ok=(pA>pB&&rA>rB)||(pA<pB&&rA<rB)||(pA===pB&&rA===rB);
  if(!ok)return 0;
  return (pA-pB)===(rA-rB)?4:3;
}

const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function fLarga(f){const[y,m,d]=f.split("-").map(Number);const dt=new Date(y,m-1,d);return`${DIAS[dt.getDay()]}, ${d} de ${MESES[m-1]} ${y}`;}
function todayIQ(){const n=new Date();const iq=new Date(n.getTime()+n.getTimezoneOffset()*60000+10800000);return`${iq.getFullYear()}-${String(iq.getMonth()+1).padStart(2,"0")}-${String(iq.getDate()).padStart(2,"0")}`;}

function TeamBlock({name}){
  return(
    <div className="team-blk">
      <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>
        <Flag name={name} size={26}/>
      </div>
      <span className="team-name">{name}</span>
    </div>
  );
}

function MatchCard({p,prons,parts}){
  const[open,setOpen]=useState(false);
  const done=p.finalizado&&p.goles_a!==null;
  const preds=parts.map(pt=>{
    const pr=prons.find(x=>x.participante_id===pt.id&&x.partido_id===p.id);
    if(!pr)return null;
    const pts=done?calcPts(pr.pred_a,pr.pred_b,p.goles_a,p.goles_b):null;
    return{nombre:pt.nombre,pa:pr.pred_a,pb:pr.pred_b,pts};
  }).filter(Boolean);
  return(
    <div className="match-card">
      <div className="match-meta">
        <span className="grp-badge">GRUPO {p.grupo}</span>
        <span className="match-time">⏰ {p.hora} (Irak)</span>
        <span className={`match-st ${done?"st-done":"st-pend"}`}>{done?"✓ FINALIZADO":"PENDIENTE"}</span>
      </div>
      <div className="match-teams">
        <TeamBlock name={p.equipo_a}/>
        <div className="score-box">
          {done?<><span className="score-n">{p.goles_a}</span><span className="score-sep">–</span><span className="score-n">{p.goles_b}</span></>:<span className="score-vs">vs</span>}
        </div>
        <TeamBlock name={p.equipo_b}/>
      </div>
      {preds.length>0&&<>
        <button className="pred-toggle" onClick={()=>setOpen(!open)}>
          {open?"▲ Ocultar pronósticos":`▼ Ver pronósticos (${preds.length} participantes)`}
        </button>
        {open&&<div className="pred-panel"><div className="pred-grid">
          {preds.map(pr=>(
            <div key={pr.nombre} className={`pred-item ${pr.pts===5?"pi-5":pr.pts===4?"pi-4":pr.pts===3?"pi-3":""}`}>
              <span className="pred-name">{pr.nombre.split(" ")[0]}</span>
              <div style={{display:"flex",alignItems:"center"}}>
                <span className="pred-sc">{pr.pa}–{pr.pb}</span>
                {pr.pts!==null&&<span className={`pred-pts ${pr.pts===5?"b5":pr.pts===4?"b4":pr.pts===3?"b3":""}`}>{pr.pts>0?`+${pr.pts}`:"✗"}</span>}
              </div>
            </div>
          ))}
        </div></div>}
      </>}
    </div>
  );
}

  const today=todayIQ();
  const hoy=partidos.filter(p=>p.fecha===today);
  return(

function TabPosiciones({partidos,prons,parts}){
  const rows=parts.map(p=>{
    let pts=0,e5=0,e4=0,e3=0,e0=0,pend=0;
    prons.filter(pr=>pr.participante_id===p.id).forEach(pr=>{
      const pa=partidos.find(x=>x.id===pr.partido_id);
      if(!pa||!pa.finalizado||pa.goles_a===null){pend++;return;}
      const v=calcPts(pr.pred_a,pr.pred_b,pa.goles_a,pa.goles_b);
      pts+=v;
      if(v===5)e5++;else if(v===4)e4++;else if(v===3)e3++;else e0++;
    });
    return{...p,pts,e5,e4,e3,e0,pend};
  }).sort((a,b)=>b.pts-a.pts||b.e5-a.e5||b.e4-a.e4);
  return(
    <div className="card">
      <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)",marginBottom:14}}>🏆 Tabla de Posiciones</div>
      <div style={{overflowX:"auto"}}>
        <table className="st-table">
          <thead><tr>
            <th>#</th><th>Participante</th>
            <th style={{textAlign:"center"}}>Pts</th>
            <th style={{textAlign:"center"}}>⭐<br/><span style={{fontSize:9,fontWeight:400,color:"var(--gm)"}}>5pts</span></th>
            <th style={{textAlign:"center"}}>🎯<br/><span style={{fontSize:9,fontWeight:400,color:"var(--gm)"}}>4pts</span></th>
            <th style={{textAlign:"center"}}>✓<br/><span style={{fontSize:9,fontWeight:400,color:"var(--gm)"}}>3pts</span></th>
            <th style={{textAlign:"center"}}>✗<br/><span style={{fontSize:9,fontWeight:400,color:"var(--gm)"}}>0pts</span></th>
            <th style={{textAlign:"center"}}>⏳</th>
          </tr></thead>
          <tbody>{rows.map((p,i)=>(
            <tr key={p.id}>
              <td><div className={`pos-b ${i===0?"p1":i===1?"p2":i===2?"p3":"px"}`}>{i+1}</div></td>
              <td style={{fontWeight:600}}>{p.nombre}</td>
              <td style={{textAlign:"center"}}><span className="pts-big">{p.pts}</span></td>
              <td style={{textAlign:"center",color:"var(--gold)",fontWeight:700}}>{p.e5}</td>
              <td style={{textAlign:"center",color:"#4ADB8A",fontWeight:700}}>{p.e4}</td>
              <td style={{textAlign:"center",color:"#6496FF",fontWeight:700}}>{p.e3}</td>
              <td style={{textAlign:"center",color:"#FF6666",fontWeight:700}}>{p.e0}</td>
              <td style={{textAlign:"center",color:"var(--gm)"}}>{p.pend}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{marginTop:12,padding:"10px 12px",background:"rgba(0,0,0,.2)",borderRadius:8,fontSize:11,color:"var(--gm)",lineHeight:1.8}}>
        <strong style={{color:"var(--gold)"}}>Puntuación:</strong> ⭐ Exacto = 5pts · 🎯 Ganador + diferencia = 4pts · ✓ Ganador/empate = 3pts<br/>
        <strong style={{color:"var(--gold)"}}>Premios:</strong> 🥇 1er lugar 60% · 🥈 2do 30% · 🥉 3er 10%
      </div>
    </div>
  );
}

function TabGrupos({partidos}){
  const g={};
  partidos.forEach(p=>{
    if(!g[p.grupo])g[p.grupo]={};
    [p.equipo_a,p.equipo_b].forEach(eq=>{if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gn:0,e:0,pe:0,gf:0,gc:0,dg:0};});
    if(!p.finalizado||p.goles_a===null)return;
    const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
    a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
    a.dg=a.gf-a.gc;b.dg=b.gf-b.gc;
    if(p.goles_a>p.goles_b){a.pts+=3;a.gn++;b.pe++;}
    else if(p.goles_a<p.goles_b){b.pts+=3;b.gn++;a.pe++;}
    else{a.pts++;b.pts++;a.e++;b.e++;}
  });
  return(
    <div>
      <div style={{background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,padding:"10px 12px",marginBottom:16,fontSize:11,lineHeight:1.8}}>
        <strong style={{color:"var(--gold)"}}>⚠️ Desempates:</strong>
        <span style={{color:"var(--gm)"}}> Automáticos por: Puntos → Diferencia de goles → Goles a favor → Head-to-head.
        <strong style={{color:"var(--gold)"}}> Fair play, ranking FIFA y sorteo</strong> no son calculables — aplican criterios internos FIFA.</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))",gap:14}}>
        {Object.keys(g).sort().map(l=>{
          const eqs=Object.entries(g[l]).map(([n,s])=>({n,...s})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
          return(
            <div key={l} className="g-blk">
              <div className="g-title">GRUPO {l}</div>
              <table className="g-table">
                <thead><tr><th>Selección</th><th>PJ</th><th>PTS</th><th>DG</th><th>GF</th><th>GC</th><th>G</th><th>E</th><th>P</th></tr></thead>
                <tbody>{eqs.map((eq,i)=>(
                  <tr key={eq.n}>
                    <td>
                      {i<2&&<span className="qdot"/>}{i===2&&<span className="tdot"/>}
                      <span style={{marginRight:5,verticalAlign:"middle",display:"inline-flex",alignItems:"center"}}>
                        <Flag name={eq.n} size={14}/>
                      </span>
                      <span style={{fontWeight:600,verticalAlign:"middle"}}>{eq.n}</span>
                    </td>
                    <td>{eq.j}</td>
                    <td><strong style={{color:i<2?"#4ADB8A":"inherit"}}>{eq.pts}</strong></td>
                    <td style={{color:eq.dg>0?"#4ADB8A":eq.dg<0?"#FF6666":"inherit"}}>{eq.dg>0?"+":""}{eq.dg}</td>
                    <td>{eq.gf}</td><td>{eq.gc}</td><td>{eq.gn}</td><td>{eq.e}</td><td>{eq.pe}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,fontSize:11,color:"var(--gm)",display:"flex",gap:14,flexWrap:"wrap"}}>
        <span><span className="qdot"/>Clasificado (1° y 2°)</span>
        <span><span className="tdot"/>Posible mejor 3°</span>
      </div>
    </div>
  );
}

function TabPronosticos({partidos,prons,parts}){

  const grupos=["TODOS",...[...new Set(partidos.map(p=>p.grupo))].sort()];
  const pF=partidos.filter(p=>fg==="TODOS"||p.grupo===fg);
  const ptF=fp==="TODOS"?parts:parts.filter(p=>p.id===fp);
  return(
    <div>
      <div className="card" style={{marginBottom:12}}>
        <div className="form-row">
          <div className="form-group">
            <label className="lbl">Grupo</label>
            <select className="inp" value={fg} onChange={e=>setFg(e.target.value)}>
              {grupos.map(g=><option key={g} value={g}>{g==="TODOS"?"Todos los grupos":"Grupo "+g}</option>)}
            </select>
          </div>

            <label className="lbl">Participante</label>
            <select className="inp" value={fp} onChange={e=>setFp(e.target.value)}>

            <thead><tr>
              <th>Partido</th>
              {ptF.map(p=><th key={p.id}>{p.nombre.split(" ")[0]}</th>)}
            </tr></thead>
            <tbody>{pF.map(pa=>{
              const done=pa.finalizado&&pa.goles_a!==null;
              return(
                <tr key={pa.id}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}>
                      <Flag name={pa.equipo_a} size={13}/>
                      <span style={{fontSize:11,fontWeight:700}}>{pa.equipo_a}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}>
                      <Flag name={pa.equipo_b} size={13}/>
                      <span style={{fontSize:11,fontWeight:700}}>{pa.equipo_b}</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--gm)"}}>{pa.hora} · G{pa.grupo}</div>
                    {done&&<div style={{fontSize:11,color:"var(--gold)",fontFamily:"Barlow Condensed",fontWeight:700}}>✓ {pa.goles_a}–{pa.goles_b}</div>}
                  </td>
                  {ptF.map(pt=>{
                    const pr=prons.find(x=>x.participante_id===pt.id&&x.partido_id===pa.id);
                    if(!pr)return<td key={pt.id}><span style={{color:"var(--gm)"}}>—</span></td>;
                    const pts=done?calcPts(pr.pred_a,pr.pred_b,pa.goles_a,pa.goles_b):null;
                    const c=pts===5?"pc5":pts===4?"pc4":pts===3?"pc3":pts===0?"pc0":"pcn";
                    return(
                      <td key={pt.id}>
                        <span className={`pc ${c}`}>{pr.pred_a}–{pr.pred_b}</span>
                        {pts!==null&&<div style={{fontSize:9,fontWeight:700,color:pts===5?"var(--gold)":pts===4?"#4ADB8A":pts===3?"#6496FF":"#FF6666"}}>{pts>0?`+${pts}`:"✗"}</div>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ────────────────────────────────────────────────
function TabAdmin({partidos,parts,prons,onRefresh}){
  const[authed,setAuthed]=useState(false);
  const[pass,setPass]=useState("");
  const[passErr,setPassErr]=useState(false);
  const[msg,setMsg]=useState(null);
  const[atab,setAtab]=useState("cargar");
  // cargar resultado: step 0=lista, 1=detalle
  const[step,setStep]=useState(0);
  const[selId,setSelId]=useState(null);
  const[gA,setGA]=useState("");
  const[gB,setGB]=useState("");
  const[filtroFecha,setFiltroFecha]=useState("HOY");
  // historial edición
  const[editId,setEditId]=useState(null);
  const[editA,setEditA]=useState("");
  const[editB,setEditB]=useState("");
  // participante
  const[newN,setNewN]=useState("");
  // csv
  const[csv,setCsv]=useState("");
  const[csvInfo,setCsvInfo]=useState("");
  const[copied,setCopied]=useState(false);
  // confirmación importación
  const[confirm2,setConfirm2]=useState(null); // {nombre, encontrado, preds, csvLine}

  const showMsg=(t,type="success")=>{setMsg({t,type});setTimeout(()=>setMsg(null),4500);};

  async function recalc(pid,ra,rb){
    for(const pr of prons.filter(x=>x.partido_id===pid)){
      const pts=calcPts(pr.pred_a,pr.pred_b,ra,rb);
      await sb(`pronosticos?id=eq.${pr.id}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({puntos:pts})});
    }
  }
  async function guardar(){
    if(!selId||gA===""||gB===""){showMsg("Selecciona partido e ingresa goles","error");return;}
    const ra=parseInt(gA),rb=parseInt(gB);
    if(isNaN(ra)||isNaN(rb)||ra<0||rb<0){showMsg("Goles inválidos","error");return;}
    try{
      await sb(`partidos?id=eq.${selId}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:ra,goles_b:rb,finalizado:true})});
      await recalc(selId,ra,rb);
      showMsg("✓ Resultado guardado y puntos actualizados");
      setSelId(null);setGA("");setGB("");setStep(0);onRefresh();
    }catch(e){showMsg("Error: "+e.message,"error");}
  }
  async function guardarEdit(pid){
    const ra=parseInt(editA),rb=parseInt(editB);
    if(isNaN(ra)||isNaN(rb)||ra<0||rb<0){showMsg("Valores inválidos","error");return;}
    try{
      await sb(`partidos?id=eq.${pid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:ra,goles_b:rb,finalizado:true})});
      await recalc(pid,ra,rb);
      setEditId(null);showMsg("✓ Resultado actualizado");onRefresh();
    }catch(e){showMsg("Error: "+e.message,"error");}
  }
  async function anular(pid){
    if(!confirm("¿Anular este resultado? Los puntos se resetearán."))return;
    try{
      await sb(`partidos?id=eq.${pid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({goles_a:null,goles_b:null,finalizado:false})});
      for(const pr of prons.filter(x=>x.partido_id===pid))
        await sb(`pronosticos?id=eq.${pr.id}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({puntos:0})});
      showMsg("✓ Resultado anulado");onRefresh();
    }catch(e){showMsg("Error: "+e.message,"error");}
  }
  async function addPart(){
    if(!newN.trim()){showMsg("Ingresa un nombre","error");return;}
    try{
      await sb("participantes",{method:"POST",body:JSON.stringify({nombre:newN.trim()})});
      showMsg("✓ "+newN.trim()+" agregado");setNewN("");onRefresh();
    }catch(e){showMsg("Error: "+e.message,"error");}
  }
  function normalizar(){
    if(!csv.trim()){setCsvInfo("Pega los datos primero");return;}
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    let out=[];
    for(const l of lines){
      const cols=l.split(",").map(s=>s.trim());
      if(cols.length<2)continue;
      const nombre=cols[0];
      const preds=cols.slice(1).filter(p=>/^\d+-\d+$/.test(p));
      if(preds.length>0)out.push(nombre+","+preds.join(","));
    }
    setCsv(out.join("\n"));
    setCsvInfo("✓ "+out.length+" filas normalizadas");
  }
  function previsualizarCSV(){
    if(!csv.trim()){setCsvInfo("Pega los datos primero");return;}
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    const previews=[];
    for(const line of lines){
      const cols=line.split(",").map(s=>s.trim());
      if(cols.length<2)continue;
      const nombre=cols[0];
      const preds=cols.slice(1).filter(p=>/^\d+-\d+$/.test(p));
      if(preds.length<1)continue;
      const encontrado=parts.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase());
      previews.push({nombre, encontrado: encontrado||null, preds, csvLine:line});
    }
    if(previews.length===0){setCsvInfo("No se encontraron filas válidas");return;}
    setConfirm2(previews);
  }
  async function importarConfirmado(){
    if(!confirm2)return;
    let ok=0,err=0;
    for(const item of confirm2){
      let pt=item.encontrado;
      if(!pt){
        try{const r=await sb("participantes",{method:"POST",body:JSON.stringify({nombre:item.nombre})});pt=Array.isArray(r)?r[0]:r;}
        catch{err++;continue;}
      }
      for(let i=0;i<item.preds.length&&i<72;i++){
        const sc=item.preds[i].split("-");
        if(sc.length!==2)continue;
        const pa=parseInt(sc[0]),pb=parseInt(sc[1]);
        if(isNaN(pa)||isNaN(pb))continue;
        const exists=prons.find(pr=>pr.participante_id===pt.id&&pr.partido_id===i+1);
        if(!exists){
          try{await sb("pronosticos",{method:"POST",prefer:"return=minimal",body:JSON.stringify({participante_id:pt.id,partido_id:i+1,pred_a:pa,pred_b:pb,puntos:0})});ok++;}
          catch{err++;}
        }
      }
    }
    showMsg(`✓ ${ok} pronósticos importados${err>0?` (${err} errores)`:""}`);
    setConfirm2(null);setCsv("");setCsvInfo("");
    onRefresh();
  }

  if(!authed) return(
    <div className="login-wrap">
      <div className="login-box">
        <div style={{fontSize:32,marginBottom:10}}>🔐</div>
        <h2>Panel Admin</h2>
        <p>Acceso restringido</p>
        {passErr&&<div className="alert al-err">Contraseña incorrecta</div>}
        <input className="inp" type="password" placeholder="Contraseña"
          value={pass} onChange={e=>{setPass(e.target.value);setPassErr(false);}}
          onKeyDown={e=>{if(e.key==="Enter"){if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}}
          style={{marginBottom:10}}/>
        <button className="btn btn-p" style={{width:"100%",marginTop:6}}
          onClick={()=>{if(pass===ADMIN_PASS)setAuthed(true);else setPassErr(true);}}>ENTRAR</button>
      </div>
    </div>
  );

  const today=todayIQ();
  const pendientes=partidos.filter(p=>!p.finalizado).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));
  const terminados=partidos.filter(p=>p.finalizado&&p.goles_a!==null).sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.hora.localeCompare(a.hora));

  // Filtrar pendientes por fecha seleccionada
  const fechasPend=[...new Set(pendientes.map(p=>p.fecha))].sort();
  const pendFiltrados=filtroFecha==="TODOS"?pendientes:pendientes.filter(p=>p.fecha===filtroFecha);
  const selPartido=partidos.find(p=>p.id===selId);

  return(
    <div>
      {msg&&<div className={`alert ${msg.type==="success"?"al-ok":msg.type==="error"?"al-err":"al-inf"}`}>{msg.t}</div>}
      <div className="adm-tabs">
        {[["cargar","⚽ Cargar Resultado"],["historial",`📋 Historial (${terminados.length})`],["participantes","👥 Participantes"],["csv","📁 CSV"]].map(([id,lbl])=>(
          <button key={id} className={`btn btn-sm ${atab===id?"btn-p":"btn-s"}`} onClick={()=>setAtab(id)}>{lbl}</button>
        ))}
      </div>

      {/* ─── CARGAR RESULTADO ─── */}
      {atab==="cargar"&&(
        <div className="card">
          {step===0?(
            <>
              <div style={{fontFamily:"Barlow Condensed",fontSize:15,fontWeight:700,color:"var(--gold)",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>⚽ Selecciona el Partido</div>
              {/* Filtros fecha */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                <button className={`btn btn-sm ${filtroFecha==="HOY"?"btn-p":"btn-s"}`} onClick={()=>setFiltroFecha("HOY")}>📅 Hoy</button>
                <button className={`btn btn-sm ${filtroFecha==="TODOS"?"btn-p":"btn-s"}`} onClick={()=>setFiltroFecha("TODOS")}>Todos</button>
                {fechasPend.filter(f=>f!==today).map(f=>(
                  <button key={f} className={`btn btn-sm ${filtroFecha===f?"btn-p":"btn-s"}`} onClick={()=>setFiltroFecha(f)}>
                    {f.slice(5).replace("-","/")}
                  </button>
                ))}
              </div>
              {pendFiltrados.length===0
                ?<div className="empty" style={{padding:20}}>
                    No hay partidos pendientes{filtroFecha==="HOY"?" para hoy":""}.
                    {filtroFecha==="HOY"&&<><br/><button className="btn btn-s btn-sm" style={{marginTop:8}} onClick={()=>setFiltroFecha("TODOS")}>Ver todos los pendientes</button></>}
                  </div>
                :<div className="match-picker-grid">
                  {pendFiltrados.map(p=>(
                    <div key={p.id} className="picker-card" onClick={()=>{setSelId(p.id);setGA("");setGB("");setStep(1);}}>
                      <div className="picker-meta">{p.fecha} {p.hora} IQ &nbsp;·&nbsp; GRUPO {p.grupo}</div>
                      <div className="picker-teams">
                        <div className="picker-team">
                          <div style={{display:"flex",justifyContent:"center"}}><Flag name={p.equipo_a} size={22}/></div>
                          <span className="picker-name">{p.equipo_a}</span>
                        </div>
                        <span style={{color:"var(--gm)",fontFamily:"Barlow Condensed",fontSize:13,fontWeight:700}}>VS</span>
                        <div className="picker-team">
                          <div style={{display:"flex",justifyContent:"center"}}><Flag name={p.equipo_b} size={22}/></div>
                          <span className="picker-name">{p.equipo_b}</span>

                      </div>
                    </div>

                </div>

                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,flexWrap:"wrap",marginBottom:20}}>

// ── TABLA DE MEJORES TERCEROS ────────────────────────────────
function TabTerceros({partidos}){
  // Calcular standings por grupo
  const g={};
  partidos.forEach(p=>{
    if(!g[p.grupo])g[p.grupo]={};
    [p.equipo_a,p.equipo_b].forEach(eq=>{
      if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0,gn:0,e:0,pe:0};
    });
    if(!p.finalizado||p.goles_a===null)return;
    const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
    a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
    const dg=(x)=>x.gf-x.gc;
    if(p.goles_a>p.goles_b){a.pts+=3;a.gn++;b.pe++;}
    else if(p.goles_a<p.goles_b){b.pts+=3;b.gn++;a.pe++;}
    else{a.pts++;b.pts++;a.e++;b.e++;}
  });

  // Extraer el 3ero de cada grupo
  const terceros=[];
  Object.keys(g).sort().forEach(grupo=>{
    const tabla=Object.entries(g[grupo])
      .map(([n,s])=>({n,...s,dg:s.gf-s.gc}))
      .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
    if(tabla.length>=3){
      const completo=tabla.every(e=>e.j===3);
      terceros.push({grupo,...tabla[2],completo});
    }
  });

  // Ordenar por criterios FIFA: pts → dg → gf
  const ordenados=[...terceros].sort((a,b)=>b.pts-a.pts||(b.dg-a.dg)||b.gf-a.gf);
  const clasifican=ordenados.slice(0,8);
  const eliminados=ordenados.slice(8);

  return(
    <div>
      <div style={{background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:11,lineHeight:1.8,color:"var(--gm)"}}>
        <strong style={{color:"var(--gold)"}}>Criterios FIFA para mejores 3eros:</strong>{" "}
        Puntos → Diferencia de goles → Goles a favor → Fair play (tarjetas) → Ranking FIFA<br/>
        <strong style={{color:"var(--gold)"}}>⚠️</strong> Fair play y Ranking FIFA no se calculan aquí — aplican solo si hay empate en los primeros 3 criterios.
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div style={{fontFamily:"Barlow Condensed",fontSize:12,fontWeight:800,letterSpacing:2,color:"#4ADB8A",marginBottom:10}}>
          ✅ CLASIFICAN AL BRACKET KO (Top 8)
        </div>
        <div style={{overflowX:"auto"}}>
          <table className="st-table">
            <thead><tr>
              <th>#</th><th>Grp</th><th>Equipo</th>
              <th style={{textAlign:"center"}}>PJ</th>
              <th style={{textAlign:"center"}}>Pts</th>
              <th style={{textAlign:"center"}}>DG</th>
              <th style={{textAlign:"center"}}>GF</th>
              <th style={{textAlign:"center"}}>GC</th>
              <th style={{textAlign:"center"}}>Estado</th>
            </tr></thead>
            <tbody>
              {clasifican.map((t,i)=>(
                <tr key={t.grupo}>
                  <td><div className={`pos-b p${i<3?i+1:"x"}`} style={{background:i<8?"rgba(74,219,138,.3)":undefined,color:i<8?"#4ADB8A":undefined}}>{i+1}</div></td>
                  <td><span className="grp-badge">G{t.grupo}</span></td>
                  <td><div style={{display:"flex",alignItems:"center",gap:6}}><Flag name={t.n} size={16}/><span style={{fontWeight:600,fontSize:13}}>{t.n}</span></div></td>
                  <td style={{textAlign:"center",color:"var(--gm)",fontSize:12}}>{t.j}</td>
                  <td style={{textAlign:"center"}}><span className="pts-big">{t.pts}</span></td>
                  <td style={{textAlign:"center",color:t.dg>0?"#4ADB8A":t.dg<0?"#FF6666":"var(--gm)",fontWeight:700}}>{t.dg>0?"+":""}{t.dg}</td>
                  <td style={{textAlign:"center",fontSize:12}}>{t.gf}</td>
                  <td style={{textAlign:"center",fontSize:12,color:"var(--gm)"}}>{t.gc}</td>
                  <td style={{textAlign:"center"}}>
                    <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1,
                      background:t.completo?"rgba(74,219,138,.15)":"rgba(245,166,35,.15)",
                      color:t.completo?"#4ADB8A":"var(--gold)"}}>
                      {t.completo?"FINAL":"EN CURSO"}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {eliminados.length>0&&(
        <div className="card">
          <div style={{fontFamily:"Barlow Condensed",fontSize:12,fontWeight:800,letterSpacing:2,color:"#FF6666",marginBottom:10}}>
            ❌ NO CLASIFICAN (posiciones 9-12)
          </div>
          <div style={{overflowX:"auto"}}>
            <table className="st-table">
              <thead><tr>
                <th>#</th><th>Grp</th><th>Equipo</th>
                <th style={{textAlign:"center"}}>Pts</th>
                <th style={{textAlign:"center"}}>DG</th>
                <th style={{textAlign:"center"}}>GF</th>
              </tr></thead>
              <tbody>
                {eliminados.map((t,i)=>(
                  <tr key={t.grupo} style={{opacity:.6}}>
                    <td><div className="pos-b px">{i+9}</div></td>
                    <td><span className="grp-badge">G{t.grupo}</span></td>
                    <td><div style={{display:"flex",alignItems:"center",gap:6}}><Flag name={t.n} size={16}/><span style={{fontWeight:600,fontSize:13}}>{t.n}</span></div></td>
                    <td style={{textAlign:"center"}}><span className="pts-big" style={{color:"var(--gm)"}}>{t.pts}</span></td>
                    <td style={{textAlign:"center",color:t.dg>0?"#4ADB8A":t.dg<0?"#FF6666":"var(--gm)",fontWeight:700}}>{t.dg>0?"+":""}{t.dg}</td>
                    <td style={{textAlign:"center",fontSize:12}}>{t.gf}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── BRACKET KO LIVE (vista provisional desde grupos) ─────────
function TabBracketLive({partidos}){
  // Calcular standings en vivo
  const standings=useMemo(()=>{
    const g={};
    partidos.forEach(p=>{
      if(!g[p.grupo])g[p.grupo]={};
      [p.equipo_a,p.equipo_b].forEach(eq=>{
        if(!g[p.grupo][eq])g[p.grupo][eq]={pts:0,j:0,gf:0,gc:0};
      });
      if(!p.finalizado||p.goles_a===null)return;
      const a=g[p.grupo][p.equipo_a],b=g[p.grupo][p.equipo_b];
      a.j++;b.j++;a.gf+=p.goles_a;a.gc+=p.goles_b;b.gf+=p.goles_b;b.gc+=p.goles_a;
      if(p.goles_a>p.goles_b)a.pts+=3;
      else if(p.goles_b>p.goles_a)b.pts+=3;
      else{a.pts++;b.pts++;}
    });
    const r={};
    Object.keys(g).sort().forEach(grupo=>{
      r[grupo]=Object.entries(g[grupo])
        .map(([n,s])=>({n,...s,dg:s.gf-s.gc}))
        .sort((a,b)=>b.pts-a.pts||(b.dg-a.dg)||b.gf-a.gf);
      r[grupo].completo=r[grupo].every(e=>e.j===3);
    });
    return r;
  },[partidos]);

  // Top 8 terceros
  const terceros=useMemo(()=>{
    return Object.keys(standings).sort()
      .filter(g=>standings[g].length>=3)
      .map(g=>({grupo:g,...standings[g][2]}))
      .sort((a,b)=>b.pts-a.pts||(b.dg-a.dg)||b.gf-a.gf);
  },[standings]);
  // top8 now computed inside asignacionTerceros

  function getEq(grupo,pos){
    const t=standings[grupo];
    if(!t||t.length<=pos)return null;
    return{equipo:t[pos].n,prov:!t.completo};
  }
  // Asignación única de terceros a slots (sin duplicados)
  const asignacionTerceros=React.useMemo(()=>{
    const SLOTS={'P74':['A','B','C','D','F'],'P77':['C','D','F','G','H'],
      'P79':['C','E','F','H','I'],'P80':['E','H','I','J','K'],
      'P81':['B','E','F','I','J'],'P82':['A','E','H','I','J'],
      'P85':['E','F','G','I','J'],'P87':['D','E','I','J','L']};
    const t8=new Set(terceros.slice(0,8).map(t=>t.grupo));
    const result={};
    const usados=new Set();
    // Slots más restrictivos primero
    const ord=Object.entries(SLOTS).sort((a,b)=>a[1].length-b[1].length).map(([s])=>s);
    for(const slot of ord){
      const cand=terceros.find(t=>SLOTS[slot].includes(t.grupo)&&t8.has(t.grupo)&&!usados.has(t.grupo));
      if(cand){result[slot]={equipo:cand.n,prov:!standings[cand.grupo]?.completo};usados.add(cand.grupo);}
    }
    return result;
  },[terceros,standings]);

  function getBest3(slot){
    return asignacionTerceros[slot]||null;
  }

  // Definición de los 16 partidos KO
  const p16=[
    {num:"P73",la:"2°A",a:getEq("A",1),lb:"2°B",b:getEq("B",1)},
    {num:"P74",la:"1°E",a:getEq("E",0),lb:"3°A/B/C/D/F",b:getBest3("P74")},
    {num:"P75",la:"1°F",a:getEq("F",0),lb:"2°C",b:getEq("C",1)},
    {num:"P76",la:"1°C",a:getEq("C",0),lb:"2°F",b:getEq("F",1)},
    {num:"P77",la:"1°I",a:getEq("I",0),lb:"3°C/D/F/G/H",b:getBest3("P77")},
    {num:"P78",la:"2°E",a:getEq("E",1),lb:"2°I",b:getEq("I",1)},
    {num:"P79",la:"1°A",a:getEq("A",0),lb:"3°C/E/F/H/I",b:getBest3("P79")},
    {num:"P80",la:"1°L",a:getEq("L",0),lb:"3°E/H/I/J/K",b:getBest3("P80")},
    {num:"P81",la:"1°D",a:getEq("D",0),lb:"3°B/E/F/I/J",b:getBest3("P81")},
    {num:"P82",la:"1°G",a:getEq("G",0),lb:"3°A/E/H/I/J",b:getBest3("P82")},
    {num:"P83",la:"2°K",a:getEq("K",1),lb:"2°L",b:getEq("L",1)},
    {num:"P84",la:"1°H",a:getEq("H",0),lb:"2°J",b:getEq("J",1)},
    {num:"P85",la:"1°B",a:getEq("B",0),lb:"3°E/F/G/I/J",b:getBest3("P85")},
    {num:"P86",la:"1°J",a:getEq("J",0),lb:"2°H",b:getEq("H",1)},
    {num:"P87",la:"1°K",a:getEq("K",0),lb:"3°D/E/I/J/L",b:getBest3("P87")},
    {num:"P88",la:"2°D",a:getEq("D",1),lb:"2°G",b:getEq("G",1)},
  ];

  function EqRow({eq,label}){
    if(!eq)return(
      <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 0"}}>
        <div style={{width:18,height:13,background:"rgba(255,255,255,.08)",borderRadius:2,flexShrink:0}}/>
        <span style={{fontFamily:"Barlow Condensed",fontSize:11,color:"var(--gt)",fontStyle:"italic"}}>{label}</span>
      </div>
    );
    return(
      <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 0"}}>
        <Flag name={eq.equipo} size={13}/>
        <span style={{fontFamily:"Barlow Condensed",fontSize:12,fontWeight:700,flex:1,
          color:eq.prov?"rgba(255,255,255,.55)":"var(--white)"}}>{eq.equipo}</span>
        {eq.prov&&<span style={{fontSize:8,color:"var(--gold)",fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:.5}}>PROV</span>}
      </div>
    );
  }

  // Agrupar por fecha España (referencia)
  const fechas=[
    {label:"Dom 28 Jun",nums:["P73"]},
    {label:"Lun 29 Jun",nums:["P74","P75","P76"]},
    {label:"Mar 30 Jun",nums:["P77","P78","P79"]},
    {label:"Mié 1 Jul",nums:["P80","P81","P82"]},
    {label:"Jue 2 Jul",nums:["P83","P84","P85"]},
    {label:"Vie 3 Jul",nums:["P86","P87","P88"]},
  ];

  return(
    <div>
      <div style={{background:"rgba(100,150,255,.08)",border:"1px solid rgba(100,150,255,.25)",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:11,color:"var(--gm)",lineHeight:1.8}}>
        <strong style={{color:"#AAC0FF"}}>Vista provisional del bracket KO</strong> — se actualiza automáticamente con los resultados de grupos.
        <span style={{color:"var(--gold)"}}> PROV</span> = grupo aún no terminó (puede cambiar).{" "}
        <a href="./ko.html" style={{color:"var(--gold)",fontWeight:700}}>Ver portal KO completo →</a>
      </div>

      {fechas.map(({label,nums})=>(
        <div key={label}>
          <div className="cal-hdr" style={{marginTop:16}}>{label} — 16avos de Final</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8,marginBottom:8}}>
            {nums.map(num=>{
              const p=p16.find(x=>x.num===num);
              if(!p)return null;
              return(
                <div key={num} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:8,padding:"9px 10px"}}>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:9,color:"var(--gt)",letterSpacing:1,marginBottom:5}}>{num}</div>
                  <EqRow eq={p.a} label={p.la}/>
                  <div style={{borderTop:"1px solid rgba(255,255,255,.07)",margin:"3px 0"}}/>
                  <EqRow eq={p.b} label={p.lb}/>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      <div style={{marginTop:16,padding:"10px 14px",background:"rgba(0,0,0,.2)",borderRadius:8,fontSize:11,color:"var(--gm)"}}>
        Cruces KO confirmados por FIFA. Los equipos definitivos se conocen al terminar todos los grupos (27 junio).
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("hoy");
  const[partidos,setPartidos]=useState([]);
  const[parts,setParts]=useState([]);
  const[prons,setProns]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const seedDone=useRef(false);

  const fetchAll=useCallback(async()=>{
    try{
      const[pa,pt,pr]=await Promise.all([
        sb("partidos?select=*&order=fecha,hora"),
        sb("participantes?select=*&order=created_at"),
        sb("pronosticos?select=*"),
      ]);
      setPartidos(pa);setParts(pt);setProns(pr);setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  async function seed(){
    if(seedDone.current)return;
    seedDone.current=true;
    try{
      const ex=await sb("partidos?select=id&limit=1");
      if(ex.length>0){await fetchAll();return;}
      for(let i=0;i<PARTIDOS_SEED.length;i+=12)
        await sb("partidos",{method:"POST",prefer:"return=minimal",body:JSON.stringify(PARTIDOS_SEED.slice(i,i+12))});
      const inserted=[];
      for(const nombre of Object.keys(CSV_PRONS)){
        const r=await sb("participantes",{method:"POST",body:JSON.stringify({nombre})});
        inserted.push(Array.isArray(r)?r[0]:r);
      }
      const all=[];
      inserted.forEach(p=>{
        (CSV_PRONS[p.nombre]||[]).forEach((pr,idx)=>all.push({participante_id:p.id,partido_id:idx+1,pred_a:pr[0],pred_b:pr[1],puntos:0}));
      });
      for(let i=0;i<all.length;i+=72)
        await sb("pronosticos",{method:"POST",prefer:"return=minimal",body:JSON.stringify(all.slice(i,i+72))});
    }catch(e){setError("Error cargando datos: "+e.message);setLoading(false);return;}
    await fetchAll();
  }

  useEffect(()=>{seed();},[]);

  const TABS=[{id:"hoy",l:"⚽ Hoy"},{id:"calendario",l:"📅 Calendario"},{id:"posiciones",l:"🏆 Posiciones"},{id:"grupos",l:"🌍 Grupos"},{id:"terceros",l:"🥉 Mejores 3eros"},{id:"bracket_live",l:"🏆 Bracket KO"},{id:"pronosticos",l:"📊 Pronósticos"},{id:"admin",l:"⚙️ Admin"}];

  return(
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo-area">
            <div className="logo-ball">⚽</div>
            <div className="logo-text">
              <div className="logo-title">QUINIELA DESTIN</div>
              <div className="logo-sub">Mundial FIFA 2026</div>
            </div>
          </div>
          <div className="prize-pill">Inscripción $10</div>
        </div>
        <nav className="nav-tabs">
          {TABS.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
        </nav>
      </header>
      <main className="main">
        {loading?(
          <div className="loading"><div className="spinner"/><span style={{fontFamily:"Barlow Condensed",letterSpacing:2,fontSize:14}}>CARGANDO...</span></div>
        ):error?(
          <div className="card" style={{textAlign:"center",padding:30}}>
            <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
            <div style={{color:"#FF6666",fontWeight:600,marginBottom:8}}>Error de conexión</div>
            <div style={{fontSize:11,color:"var(--gm)",marginBottom:14,wordBreak:"break-all"}}>{error}</div>
            <button className="btn btn-p" onClick={()=>{setLoading(true);setError(null);seedDone.current=false;seed();}}>Reintentar</button>
          </div>
        ):(
          <>
            {tab==="hoy"&&<TabHoy partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="calendario"&&<TabCalendario partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="posiciones"&&<TabPosiciones partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="grupos"&&<TabGrupos partidos={partidos}/>}
            {tab==="terceros"&&<TabTerceros partidos={partidos}/>}
            {tab==="bracket_live"&&<TabBracketLive partidos={partidos}/>}
            {tab==="pronosticos"&&<TabPronosticos partidos={partidos} prons={prons} parts={parts}/>}
            {tab==="admin"&&<TabAdmin partidos={partidos} parts={parts} prons={prons} onRefresh={fetchAll}/>}
          </>
        )}
      </main>
      <button className="scroll-top" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>↑</button>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
